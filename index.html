    <script>
        tailwind.config = {
            safelist: [
                'bg-purple-100','text-purple-700',
                'bg-purple-300','bg-purple-400',

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Prompt', sans-serif; }

        /* ========= SIDEBAR ========= */
        #app-sidebar {
            width: 16rem;
            transition: width 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            will-change: width;
        }
        #app-sidebar.collapsed { width: 4rem; }

        /* toggle button */
        #app-sidebar #sidebar-toggle-wrap {
            display: flex;
            justify-content: flex-start;
            transition: justify-content 0s;
        }
        #app-sidebar.collapsed #sidebar-toggle-wrap {
            justify-content: center;
        }
        #app-sidebar .sidebar-toggle-inner {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.7rem 0.65rem;
            border-radius: 0.625rem;
            transition: padding 0.35s cubic-bezier(0.4,0,0.2,1), background-color 0.15s ease;
        }
        #app-sidebar:not(.collapsed) .sidebar-toggle-inner {
            width: 100%;
        }
        #app-sidebar.collapsed .sidebar-toggle-inner {
            width: 2.75rem;
            padding: 0.7rem;
            justify-content: center;
        }
        #app-sidebar .sidebar-toggle-inner i {
            width: 1.25rem;
            text-align: center;
            flex-shrink: 0;
            font-size: 1rem;
        }

        /* nav wrapper */
        #sidebar-nav { padding-left: 0.5rem; padding-right: 0.5rem; }

        /* nav item — expanded */
        #app-sidebar .nav-item {
            width: 100%;
            padding: 0.625rem 0.75rem;
            border-radius: 0.625rem;
            justify-content: flex-start;
            transition: padding 0.35s cubic-bezier(0.4,0,0.2,1),
                        border-radius 0.35s cubic-bezier(0.4,0,0.2,1),
                        background-color 0.15s ease;
        }

        /* nav item — collapsed: กลายเป็น square pill กึ่งกลาง */
        #app-sidebar.collapsed #sidebar-nav { padding-left: 0; padding-right: 0; display: flex; flex-direction: column; align-items: center; gap: 0.125rem; }
        #app-sidebar.collapsed .nav-item {
            width: 2.75rem;
            padding: 0.7rem;
            border-radius: 0.75rem;
            justify-content: center;
        }

        /* icon */
        #app-sidebar .nav-item i,
        #app-sidebar .sidebar-toggle-inner > i {
            width: 1.25rem; text-align: center; flex-shrink: 0; font-size: 1rem;
            transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
        }
        #app-sidebar.collapsed .nav-item i { transform: scale(1.05); }

        /* label */
        #app-sidebar .nav-item .sidebar-text { margin-left: 0.65rem; }
        #app-sidebar.collapsed .nav-item .sidebar-text { margin-left: 0; }

        /* fade/slide text */
        #app-sidebar .sidebar-text,
        #app-sidebar .admin-panel-text,
        #app-sidebar .footer-text {
            opacity: 1; transform: translateX(0); pointer-events: auto;
            transition: opacity 0.2s ease 0.1s, transform 0.2s ease 0.05s;
            white-space: nowrap; overflow: hidden;
        }
        #app-sidebar.collapsed .sidebar-text,
        #app-sidebar.collapsed .admin-panel-text,
        #app-sidebar.collapsed .footer-text {
            opacity: 0; transform: translateX(-6px); pointer-events: none;
            transition: opacity 0.1s ease, transform 0.1s ease;
        }

        /* collapsed footer badge */
        #app-sidebar .collapsed-footer-text {
            opacity: 0; transform: scale(0.8); pointer-events: none;
            transition: opacity 0.2s ease 0.15s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1) 0.15s;
        }
        #app-sidebar.collapsed .collapsed-footer-text {
            opacity: 1; transform: scale(1); pointer-events: auto;
        }

        /* admin divider — ซ่อนแค่ label+border ตอน collapsed ไม่ซ่อน items */
        #app-sidebar.collapsed .admin-divider-border { display: none; }

        /* ========= MOBILE BOTTOM NAV ========= */
        #mobile-bottom-nav {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 50;
            background: #18181b;
            border-top: 1px solid #27272a;
            padding-bottom: env(safe-area-inset-bottom, 0px);
        }
        #mobile-bottom-nav .mob-nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 3px;
            padding: 8px 4px;
            color: #71717a;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            cursor: pointer;
            transition: color 0.15s ease;
            border: none;
            background: none;
            min-width: 0;
        }
        #mobile-bottom-nav .mob-nav-item i {
            font-size: 1.1rem;
            transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
        }
        #mobile-bottom-nav .mob-nav-item.active {
            color: #eab308;
        }
        #mobile-bottom-nav .mob-nav-item.active i {
            transform: scale(1.15);
        }
        #mobile-bottom-nav .mob-nav-more-btn {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 3px;
            padding: 8px 4px;
            color: #71717a;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            cursor: pointer;
            border: none;
            background: none;
        }

        /* ========= MOBILE SIDEBAR DRAWER ========= */
        #mobile-sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            z-index: 60;
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
        }
        #mobile-sidebar-overlay.open { display: block; }

        #mobile-sidebar-drawer {
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            width: 280px;
            max-width: 85vw;
            background: #18181b;
            z-index: 70;
            transform: translateX(-100%);
            transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
            overflow-y: auto;
            overflow-x: hidden;
            padding-bottom: env(safe-area-inset-bottom, 20px);
        }
        #mobile-sidebar-drawer.open { transform: translateX(0); }

        /* ========= MOBILE RESPONSIVE TYPOGRAPHY & LAYOUT ========= */
        @media (max-width: 767px) {
            /* แสดง bottom nav, ซ่อน sidebar ปกติ */
            #app-sidebar { display: none !important; }
            #mobile-bottom-nav { display: flex; }

            /* content area ต้องมี padding-bottom สำหรับ bottom nav */
            #content-wrapper {
                padding-bottom: calc(60px + env(safe-area-inset-bottom, 0px)) !important;
            }

            /* Topbar — safe area top */
            #app-topbar {
                padding-top: env(safe-area-inset-top, 0px);
                height: calc(3.5rem + env(safe-area-inset-top, 0px));
                padding-left: 0.75rem !important;
                padding-right: 0.75rem !important;
            }

            /* ลด heading ใหญ่ */
            .text-5xl { font-size: 2rem !important; }
            .text-4xl { font-size: 1.75rem !important; }
            .text-3xl { font-size: 1.25rem !important; }
            .text-2xl { font-size: 1.1rem !important; }
            .text-xl  { font-size: 1rem !important; }

            /* page header titles */
            h1, h2 { word-break: break-word; }

            /* ป้องกันข้อความล้น */
            * { min-width: 0; }

            /* ตาราง scroll แนวนอนได้ */
            .overflow-x-auto { overflow-x: auto !important; -webkit-overflow-scrolling: touch; }
            table { min-width: max-content; }

            /* card padding ลดบน mobile */
            .rounded-\[2rem\] { border-radius: 1.25rem !important; }
            .p-8  { padding: 1rem !important; }
            .p-10 { padding: 1.25rem !important; }
            .p-12 { padding: 1.5rem !important; }
            .px-8 { padding-left: 1rem !important; padding-right: 1rem !important; }
            .py-8 { padding-top: 1rem !important; padding-bottom: 1rem !important; }

            /* page content padding */
            .p-6 { padding: 0.875rem !important; }
            .p-6.lg\:p-8 { padding: 0.875rem !important; }
            .p-6.lg\:p-10 { padding: 0.875rem !important; }

            /* notification panel เต็มจอ */
            #notif-panel {
                position: fixed !important;
                top: calc(3.5rem + env(safe-area-inset-top, 0px)) !important;
                left: 0.5rem !important;
                right: 0.5rem !important;
                width: auto !important;
                max-height: 75vh;
                overflow-y: auto;
                border-radius: 1.25rem !important;
            }

            /* modal ปรับขนาดบน mobile */
            .fixed.inset-0 > .bg-white,
            .fixed.inset-0 > div > .bg-white,
            .fixed.inset-0 > div > .bg-zinc-900 {
                margin: 0.5rem;
                max-height: calc(100vh - 1rem);
                border-radius: 1.25rem !important;
                overflow-y: auto;
            }

            /* modal bottom-sheet style */
            .fixed.inset-0 .rounded-2xl,
            .fixed.inset-0 .rounded-3xl {
                border-radius: 1.25rem !important;
            }

            /* grid cols ลด */
            .grid-cols-4 { grid-template-columns: repeat(2, minmax(0, 1fr)) !important; }
            .sm\:grid-cols-4 { grid-template-columns: repeat(2, minmax(0, 1fr)) !important; }
            .grid-cols-3 { grid-template-columns: repeat(2, minmax(0, 1fr)) !important; }

            /* นาฬิกา clock page ให้ใหญ่และชัด */
            #current-time-display { font-size: 2.5rem !important; letter-spacing: 0.08em !important; }

            /* tracking ที่ทำให้ล้น */
            .tracking-widest { letter-spacing: 0.05em !important; }
            .tracking-wider  { letter-spacing: 0.03em !important; }

            /* truncate ป้องกัน overflow */
            .truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 100%; }

            /* executive dashboard cards */
            .ex-kpi-val { font-size: 1.35rem !important; }

            /* ปุ่มลงเวลาใหญ่ขึ้นบน mobile — touch friendly */
            #btn-clock-in, #btn-clock-out { min-height: 3.5rem; font-size: 1.1rem !important; }

            /* calendar cells เล็กลงเล็กน้อยบน mobile */
            .cal-cell { border-radius: 0.5rem !important; font-size: 0.8rem !important; }
            .cal-label { font-size: 0.4rem !important; }

            /* gap ในหน้าต่างๆ */
            .gap-8 { gap: 1rem !important; }
            .gap-6 { gap: 0.875rem !important; }
            .space-y-6 > * + * { margin-top: 0.875rem !important; }
            .space-y-8 > * + * { margin-top: 1rem !important; }

            /* pr-modal */
            #pr-modal-rec .overflow-y-auto,
            #pr-modal-create .overflow-y-auto {
                max-height: calc(100vh - 6rem);
            }

            /* announcement editor บน mobile */
            #ann-editor-panel { display: none; }
        }

        /* ========= PAGE TRANSITIONS ========= */
        #page-content {
            will-change: opacity;
        }
        @keyframes pageFadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        /* ========= LOADING OVERLAY (unused, kept for init) ========= */
        #page-loader { display: none !important; }

        /* ========= SCROLLBAR ========= */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #d4d4d8; border-radius: 10px; }
    </style>
</head>
<body class="bg-zinc-50 flex h-screen overflow-hidden text-zinc-800">

        // ================================================================
        // GLOBAL THAILAND TIMEZONE HELPERS (UTC+7)
        // ================================================================
        const TH_TZ = 'Asia/Bangkok';
        const TH_OFFSET_MS = 7 * 60 * 60 * 1000; // +07:00

        /**
         * คืนวันที่วันนี้ในรูปแบบ 'YYYY-MM-DD' ตามเวลาไทย (ไม่ใช้ toISOString ที่เป็น UTC)
         */
        window.todayTH = function() {
            return nowTH().slice(0, 10);
        };

        /**
         * คืน ISO string ปัจจุบันโดยใช้ offset ของไทย (UTC+7)
         * ใช้แทน new Date().toISOString() เมื่อต้องการ local date ที่ถูกต้อง
         */
        window.nowTH = function() {
            const now = new Date();
            // shift เวลาเป็น UTC+7 แล้วตัด timezone ออก ให้ได้ local ISO string
            const shifted = new Date(now.getTime() + TH_OFFSET_MS);
            return shifted.toISOString().replace('Z', '+07:00');
        };

        /**
         * แปลง Date object เป็น 'YYYY-MM-DD' ตามเวลาไทย
         */
        window.dateToTHStr = function(d) {
            if (!d) return '';
            const shifted = new Date(d.getTime() + TH_OFFSET_MS);
            return shifted.toISOString().slice(0, 10);
        };

        /**
         * คืน new Date() ที่ shift ให้เป็นเวลาไทยแล้ว (ใช้แทน new Date() ในการหา local date)
         */
        window.newDateTH = function() {
            return new Date(new Date().getTime() + TH_OFFSET_MS);
        };

        /**
         * สร้าง ISO timestamp string สำหรับบันทึกลง Firestore
         * ยังคงเป็น UTC ISO string (ถูกต้องสำหรับ Firestore) แต่ใช้เวลา device ปัจจุบัน
         */
        window.nowISO = function() {

        };

         */
        window.parseDateTH = function(ds) {
            if (!ds) return null;
            // force parse เป็น noon local time เพื่อป้องกัน DST/timezone edge cases
            return new Date(ds + 'T12:00:00+07:00');

        const _CLOUDINARY_CLOUD  = 'dmxvtpqur';

        // แปลง Google Drive share link → URL รูปที่ดูได้โดยตรง
        window.convertDriveLink = function(url) {
            if (!url) return '';
            if (!url.includes('drive.google.com')) return url;
            const m1 = url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
            if (m1) return `https://lh3.googleusercontent.com/d/${m1[1]}`;
            const m2 = url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
            if (m2) return `https://lh3.googleusercontent.com/d/${m2[1]}`;
            const m3 = url.match(/open\?id=([a-zA-Z0-9_-]+)/);
            if (m3) return `https://lh3.googleusercontent.com/d/${m3[1]}`;
            return url;
        };

        // helper: แปลง URL รูปพร้อม fallback chain สำหรับ Safari/iOS

            if (!url) return fallback;
            // lh3.googleusercontent.com/d/ → เพิ่ม uc?export=view fallback
            const driveId = url.match(/lh3\.googleusercontent\.com\/d\/([a-zA-Z0-9_-]+)/);

                return url; // primary — ถ้า fail จะใช้ onerror

        // Global onerror handler สำหรับรูปที่โหลดไม่ได้ (Safari, CORS, expired)
        window.handleImgError = function(img) {
            const name = img.dataset.name || img.alt || '?';
            // ลอง uc?export=view ก่อน ถ้า src เป็น lh3
            const driveId = (img.src||'').match(/lh3\.googleusercontent\.com\/d\/([a-zA-Z0-9_-]+)/);
            if (driveId && !img.dataset.triedUc) {
                img.dataset.triedUc = '1';
                img.src = `https://drive.google.com/uc?export=view&id=${driveId[1]}`;
                return;
            }
            // fallback สุดท้าย: ui-avatars
            img.onerror = null;
            img.src = `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=27272a&color=eab308&bold=true&size=128`;

        // อัปโหลดรูปไป Cloudinary พร้อม progress callback
        window.uploadPhotoToStorage = async function(file, _unusedPath, onProgress) {
            if (!file) throw new Error('ไม่มีไฟล์');
            if (file.size > 10 * 1024 * 1024) throw new Error('รูปต้องไม่เกิน 10 MB');
            const allowed = ['image/jpeg','image/png','image/webp','image/gif'];
            if (!allowed.includes(file.type)) throw new Error('รองรับเฉพาะ JPG, PNG, WebP, GIF');

            return new Promise((resolve, reject) => {
                const fd = new FormData();
                fd.append('file', file);
                fd.append('upload_preset', _CLOUDINARY_PRESET);
                fd.append('folder', 'lamsang_hris');

                const xhr = new XMLHttpRequest();
                xhr.open('POST', _CLOUDINARY_URL, true);

                xhr.upload.addEventListener('progress', e => {
                    if (e.lengthComputable && typeof onProgress === 'function')
                        onProgress(Math.round(e.loaded / e.total * 100));
                });
                xhr.addEventListener('load', () => {
                    if (xhr.status === 200) {
                        try {
                            const res = JSON.parse(xhr.responseText);
                            resolve(res.secure_url);
                        } catch(e) { reject(new Error('Parse error')); }
                    } else {
                        reject(new Error(`Cloudinary error ${xhr.status}`));
                    }
                });
                xhr.addEventListener('error', () => reject(new Error('Network error')));
                xhr.send(fd);
            });
        };

        let _notifUnsubs    = [];
        let _notifItems     = [];   // { id, type, title, body, link, ts, read }
        let _notifPanelOpen = false;
        let _seenIds        = new Set(JSON.parse(localStorage.getItem('_notifSeen') || '[]'));

        function stopNotifications() {

        async function startNotifications(user, profile) {
            stopNotifications();
            const { collection, doc, query, where, orderBy, onSnapshot, limit, getDoc }
                = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js");

            const col = (name) => collection(db, 'artifacts', APP_ID, 'public', 'data', name);

            function upsertNotif(item) {
                const idx = _notifItems.findIndex(x => x.id === item.id);
                if (idx >= 0) _notifItems[idx] = item;
                else _notifItems.unshift(item);
                _notifItems.sort((a,b) => (b.ts||'').localeCompare(a.ts||''));
                if (_notifItems.length > 50) _notifItems = _notifItems.slice(0, 50);
                renderNotifPanel();
            }
            function removeNotif(id) {
                _notifItems = _notifItems.filter(x => x.id !== id);
                renderNotifPanel();
            }

            // ── 1. ประกาศใหม่ (ทุกคน) ────────────────────────────────
            const annQ = query(col('announcements'), orderBy('createdAt','desc'), limit(10));
            _notifUnsubs.push(onSnapshot(annQ, snap => {
                snap.docChanges().forEach(ch => {
                    const d  = { id: ch.doc.id, ...ch.doc.data() };
                    if (ch.type === 'removed') { removeNotif('ann_'+d.id); return; }
                    upsertNotif({
                        id:    'ann_' + d.id,

                const d = ds.length === 10 ? new Date(ds + 'T12:00:00+07:00') : new Date(ds);

        // คำนวณชั่วโมงลาตาม schedule จริงของพนักงาน
        function calcLeaveHours(startDate, startTime, endDate, endTime, schedule) {
            const workDaySet   = new Set(schedule.workDays    || [1,2,3,4,5]);
            const personalHols = new Set(schedule.holidays    || []);
            const ws0 = schedule.workStart   || '08:00';
            const we0 = schedule.workEnd     || '17:00';
            const breakMins = schedule.breakMinutes ?? 60;
        
            let total = 0;
            let cur = new Date(startDate + 'T12:00:00+07:00');
            const endDay = new Date(endDate + 'T12:00:00+07:00');
        
            while (cur <= endDay) {
                const yr  = cur.getFullYear();
                const mo  = String(cur.getMonth() + 1).padStart(2, '0');
                const dy  = String(cur.getDate()).padStart(2, '0');
                const ds  = yr + '-' + mo + '-' + dy;
        
                if (workDaySet.has(cur.getDay()) && !personalHols.has(ds) && !isPublicHoliday(ds)) {
                    const dayStart = new Date(ds + 'T' + ws0);
                    const dayEnd   = new Date(ds + 'T' + we0);
        
                    // ชั่วโมงทำงานจริงของวันนี้ (หักพักแล้ว)
                    const fullDayMins = (dayEnd - dayStart) / 60000;          // เวลาตั้งแต่เข้าถึงออก
                    const workMins    = fullDayMins - breakMins;               // หักพัก
        
                    const isFirstDay = ds === startDate;
                    const isLastDay  = ds === endDate;
                    const useStart   = isFirstDay && startTime ? new Date(ds + 'T' + startTime) : dayStart;
                    const useEnd     = isLastDay  && endTime   ? new Date(ds + 'T' + endTime)   : dayEnd;
        
                    const s = useStart < dayStart ? dayStart : useStart;
                    const e = useEnd   > dayEnd   ? dayEnd   : useEnd;
        
                    if (e > s) {
                        const slotMins = (e - s) / 60000;
                        // สัดส่วนของช่วงที่ลา เทียบกับเวลาทั้งวัน (เข้า→ออก)
                        // แล้วคูณกับชั่วโมงทำงานจริง เพื่อหักพักตามสัดส่วนอัตโนมัติ
                        const ratio = slotMins / fullDayMins;
                        total += workMins * ratio;
                    }
                }
                cur.setDate(cur.getDate() + 1);
            }
            return Math.round(total / 60 * 100) / 100; // ปัดเป็น 2 ทศนิยม
        }
        // คืนชั่วโมงทำงานต่อวันตาม schedule
        
        function getDayWorkHours(schedule) {
            const ws = schedule.workStart || '08:00';
            const we = schedule.workEnd   || '17:00';
            const [sh, sm] = ws.split(':').map(Number);
            const [eh, em] = we.split(':').map(Number);
            const totalMins  = (eh * 60 + em) - (sh * 60 + sm);
            const breakMins  = schedule.breakMinutes ?? 60;
            const workMins   = totalMins - breakMins;
            return Math.max(0.5, workMins / 60);
        }

        // คำนวณชั่วโมง OT จริง: (ออก - เข้า - พักของพนักงาน) ปัดขึ้นชั่วโมงเต็ม
        // ถ้าไม่มีบันทึกเวลา → ใช้ hpd (ค่าตาม schedule)
        function calcAutoOTHours(inTime, outTime, schedule) {
            const breakMins = schedule.breakMinutes ?? 60;
            if (inTime && outTime) {
                const [ih, im] = inTime.split(':').map(Number);
                const [oh, om] = outTime.split(':').map(Number);
                let actualMins = (oh * 60 + om) - (ih * 60 + im);
                if (actualMins < 0) actualMins += 24 * 60; // ข้ามคืน
                const workMins = Math.max(0, actualMins - breakMins);
                return Math.ceil(workMins / 60); // ปัดขึ้นชั่วโมงเต็ม
            }
            return getDayWorkHours(schedule); // ไม่มีบันทึก ใช้ hpd
        }
        
        // แสดงผลชั่วโมง → วัน+ชั่วโมง โดยใช้ workHoursPerDay จาก schedule
        function hoursToDisplay(h, schedule) {
            if (h == null || h === '') return '-';
            if (h === 0) return '0 ชม.';
            const hpd = schedule ? Math.max(0.5, getDayWorkHours(schedule)) : 8;
            const days = Math.floor(Math.round(h / hpd * 1000) / 1000);
            const rem  = Math.round((h - days * hpd) * 10) / 10;
            if (days > 0 && rem > 0) return `${days} วัน ${rem} ชม.`;
            if (days > 0)            return `${days} วัน`;
            return `${Math.round(h * 10) / 10} ชม.`;
        }

                .cal-label { font-size: 0.45rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.03em; line-height: 1; margin-top: 1px; max-width: 100%; text-align: center; padding: 0 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
            </style>
            <div class="p-4 sm:p-6 lg:p-8">
                <div class="max-w-6xl mx-auto mb-4 sm:mb-6">
                    <h2 class="text-lg sm:text-2xl font-black text-zinc-800 uppercase tracking-tight">Time & Attendance</h2>
                    <p class="text-xs sm:text-sm text-zinc-500 font-medium">ระบบลงเวลาปฏิบัติงานและประวัติย้อนหลัง</p>
                </div>
                <div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-4 sm:gap-8">
                    <div class="lg:col-span-1 space-y-4 sm:space-y-6">
                        <div class="bg-white rounded-2xl sm:rounded-[2rem] shadow-sm border border-zinc-200 p-5 sm:p-8 text-center relative overflow-hidden">
                            <div class="absolute top-0 left-0 w-full h-2 bg-yellow-500"></div>
                            <h3 class="text-sm font-bold text-zinc-400 uppercase tracking-widest mb-2 mt-2">Current Time</h3>
                            <div class="text-3xl sm:text-4xl font-black text-zinc-900 my-3 sm:my-4 tracking-wide tabular-nums" id="current-time-display">--:--:--</div>
                            <div class="text-sm font-medium text-zinc-500 mb-4 sm:mb-6" id="current-date-display">กำลังโหลด...</div>
                            <div class="bg-zinc-50 rounded-xl p-3 mb-5 sm:mb-8 text-xs font-bold flex items-center justify-center text-zinc-600 border border-zinc-100">
                                <i class="fa-solid fa-location-dot text-yellow-500 mr-2 text-lg"></i>
                                <span id="location-status">กำลังโหลดตำแหน่ง...</span>
                            </div>
                            <div class="flex flex-col space-y-3">
                                <button id="btn-clock-in" onclick="clockIn()" class="w-full bg-zinc-900 hover:bg-zinc-800 text-yellow-500 font-black py-4 rounded-2xl transition-all shadow-lg flex justify-center items-center text-base sm:text-lg uppercase tracking-wider">
                                    <i class="fa-solid fa-right-to-bracket mr-3"></i> เข้างาน
                                </button>
                                <button id="btn-clock-out" onclick="clockOut()" class="w-full bg-white hover:bg-red-50 text-red-500 border-2 border-red-200 hover:border-red-500 font-black py-4 rounded-2xl transition-all flex justify-center items-center text-base sm:text-lg uppercase tracking-wider">
                                    <i class="fa-solid fa-right-from-bracket mr-3"></i> ออกงาน
                                </button>
                            </div>
                        </div>
                        <div class="bg-white rounded-2xl sm:rounded-[2rem] shadow-sm border border-zinc-200 overflow-hidden">
                            <div class="bg-zinc-100 px-4 sm:px-6 py-3 sm:py-4 flex justify-between items-center border-b border-zinc-200">
                                <h3 class="font-black text-zinc-700 text-sm uppercase tracking-widest"><i class="fa-solid fa-list-ul text-yellow-500 mr-2"></i> บันทึกเวลา</h3>
                                <span id="selected-date-text" class="text-xs font-bold text-zinc-500 bg-white px-2 py-1 rounded-md shadow-sm">วันนี้</span>
                            </div>
                            <div class="p-4 sm:p-6"><div id="daily-logs" class="space-y-4"><div class="text-center py-8 text-zinc-400"><i class="fa-regular fa-clock text-3xl mb-3 opacity-50"></i><p class="text-sm font-medium">ไม่มีประวัติลงเวลา</p></div></div></div>
                        </div>
                    </div>
                    <div class="lg:col-span-2">
                        <div class="bg-white rounded-2xl sm:rounded-[2rem] shadow-sm border border-zinc-200 p-4 sm:p-8 h-full">
                            <div class="flex justify-between items-center mb-4 sm:mb-8">
                                <div>
                                    <h3 class="text-lg sm:text-2xl font-black text-zinc-800" id="month-display">มกราคม 2568</h3>
                                    <p class="text-xs sm:text-sm text-zinc-500 font-medium mt-0.5 sm:mt-1">สรุปการลงเวลาประจำเดือน</p>
                                </div>
                                <div class="flex space-x-2">
                                    <button id="btn-prev-month" class="w-9 h-9 sm:w-10 sm:h-10 rounded-full bg-zinc-100 hover:bg-yellow-500 hover:text-zinc-900 text-zinc-600 flex items-center justify-center transition-colors"><i class="fa-solid fa-chevron-left text-sm"></i></button>
                                    <button id="btn-next-month" class="w-9 h-9 sm:w-10 sm:h-10 rounded-full bg-zinc-100 hover:bg-yellow-500 hover:text-zinc-900 text-zinc-600 flex items-center justify-center transition-colors"><i class="fa-solid fa-chevron-right text-sm"></i></button>
                                </div>
                            </div>
                            <div class="cal-grid mb-2">
                                <div class="cal-day-header">อา</div><div class="cal-day-header">จ</div><div class="cal-day-header">อ</div>
                                <div class="cal-day-header">พ</div><div class="cal-day-header">พฤ</div><div class="cal-day-header">ศ</div><div class="cal-day-header">ส</div>
                            </div>
                            <div id="calendar-body" class="cal-grid"></div>
                            <div class="mt-4 sm:mt-6 pt-4 sm:pt-5 border-t border-zinc-100 flex flex-wrap gap-x-3 sm:gap-x-4 gap-y-2 justify-center text-xs font-bold text-zinc-500">
                                <div class="flex items-center"><div class="w-3 h-3 bg-zinc-900 rounded-full mr-1.5"></div> วันนี้</div>
                                <div class="flex items-center"><div class="w-3 h-3 bg-green-500 rounded-full mr-1.5"></div> ลงเวลาแล้ว</div>
                                <div class="flex items-center"><div class="w-3 h-3 bg-yellow-400 rounded-full mr-1.5"></div> วันที่เลือก</div>
                                <div class="flex items-center"><div class="w-3 h-3 bg-red-200 rounded-full mr-1.5"></div> วันหยุดนักขัตฤกษ์</div>
                                <div class="flex items-center"><div class="w-3 h-3 rounded-full mr-1.5" style="background:#d8b4fe"></div> วันหยุด</div>
                                <div class="flex items-center"><div class="w-3 h-3 bg-blue-100 rounded-full mr-1.5"></div> วันลา</div>
                                <div class="flex items-center"><div class="w-3 h-3 bg-orange-100 rounded-full mr-1.5"></div> รอพิจารณา</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>`,
            init: async (user, profile, db, appId) => {
                const { collection, addDoc, onSnapshot, query, where, getDocs, doc, getDoc } = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js");

                const currentDate = new Date();
                let displayMonth = currentDate.getMonth();
                let displayYear = currentDate.getFullYear();
                let selectedDateStr = getLocalISO(currentDate);
                let myLogs = [];
                let myLeaves = []; // leave requests ที่อนุมัติแล้ว
                let clockInterval;

                // ใช้ dateToTHStr (global helper UTC+7) แทน getTimezoneOffset ที่ไม่น่าเชื่อถือ
                function getLocalISO(d) {
                    return dateToTHStr(d);
                }

                // โหลด leave requests ของตัวเอง
                const lvSnap = await getDocs(query(
                    collection(db,'artifacts',appId,'public','data','leave_requests'),
                    where('uid','==',user.uid)
                ));
                myLeaves = lvSnap.docs.map(d=>d.data()).filter(l=>l.status==='approved'||l.status==='pending');

                // โหลด schedule ส่วนตัว (วันหยุดของพนักงานคนนี้)
                let mySchedule = null;
                try {
                    const schedSnap = await getDoc(doc(db,'artifacts',appId,'public','data','work_schedules',user.uid));
                    mySchedule = schedSnap.exists() ? schedSnap.data() : null;
                } catch(e) { console.warn('[TIME] schedule load error:', e); }

                // สร้าง map วันลา: date → {type, status}
                function buildLeaveMap() {
                    const map = {};
                    myLeaves.forEach(l => {
                        const start = new Date(l.startDate), end = new Date(l.endDate);
                        for (let d = new Date(start); d <= end; d.setDate(d.getDate()+1)) {
                            const ds = getLocalISO(new Date(d));
                            map[ds] = { type: l.type, status: l.status };
                        }
                    });
                    return map;
                }

                document.getElementById('location-status').textContent = profile.branch || 'Lamsang Group';

                // Clock
                function updateClock() {
                    const now = new Date();
                    const el = document.getElementById('current-time-display');
                    const del = document.getElementById('current-date-display');
                    if (el) el.textContent = now.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit', second: '2-digit', timeZone: 'Asia/Bangkok' });
                    if (del) del.textContent = now.toLocaleDateString('th-TH', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', timeZone: 'Asia/Bangkok' });
                }
                updateClock();
                clockInterval = setInterval(updateClock, 1000);

                // Calendar
                function renderCalendar() {
                    const firstDay = new Date(displayYear, displayMonth, 1).getDay();
                    const daysInMonth = new Date(displayYear, displayMonth + 1, 0).getDate();
                    const todayStr = getLocalISO(new Date());
                    const months = ["มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน","กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"];
                    const el = document.getElementById('month-display');
                    if (el) el.textContent = months[displayMonth] + ' ' + (displayYear + 543);
                    const logsMap = {};
                    myLogs.forEach(l => { logsMap[l.localDate] = true; });
                    const leaveMap = buildLeaveMap();
                    const personalHolSet = new Set((mySchedule && Array.isArray(mySchedule.holidays)) ? mySchedule.holidays : []);
                    const workDaySet = new Set((mySchedule && mySchedule.workDays) ? mySchedule.workDays : [1,2,3,4,5]);
                    const leaveTypeLabel = { sick:'ป่วย', personal:'กิจ', vacation:'พักร้อน', maternity:'คลอด', ordain:'บวช', military:'ทหาร', other:'ลา' };
                    const leaveTypeClass = { sick:'leave-sick', personal:'leave-personal', vacation:'leave-vacation', maternity:'leave-maternity', ordain:'leave-ordain', military:'leave-military', other:'leave-other' };
                    let html = '';
                    for (let i = 0; i < firstDay; i++) html += '<div class="cal-cell empty"></div>';
                    for (let d = 1; d <= daysInMonth; d++) {
                        const ds = getLocalISO(new Date(displayYear, displayMonth, d));
                        const dow = new Date(displayYear, displayMonth, d).getDay();
                        let cls = 'cal-cell';
                        let label = '';
                        const isHol = isPublicHoliday(ds);
                        const isOffDay = !workDaySet.has(dow) || personalHolSet.has(ds);
                        const lv = leaveMap[ds];
                        if (isHol) {
                            cls += ' holiday-cell';
                            const holName = getHolidayName(ds) || '\u0e2b\u0e22\u0e38\u0e14\u0e19\u0e31\u0e01\u0e02\u0e31\u0e15\u0e24\u0e01\u0e29\u0e4c';
                            const holShort = holName.length > 6 ? holName.slice(0,6)+'\u2026' : holName;
                            label = '<span class="cal-label" style="color:inherit;opacity:0.8">' + holShort + '</span>';
                        } else if (isOffDay) {
                            cls += ' personal-holiday';
                            label = '<span class="cal-label" style="color:inherit;opacity:0.8">\u0e2b\u0e22\u0e38\u0e14</span>';
                        } else if (lv) {
                            if (lv.status === 'pending') {
                                cls += ' leave-pending';
                                label = '<span class="cal-label" style="color:inherit;opacity:0.8">' + (leaveTypeLabel[lv.type]||'\u0e25\u0e32') + '?</span>';
                            } else {
                                cls += ' ' + (leaveTypeClass[lv.type] || 'leave-other');
                                label = '<span class="cal-label" style="color:inherit;opacity:0.8">' + (leaveTypeLabel[lv.type]||'\u0e25\u0e32') + '</span>';
                            }
                        }
                        if (ds === todayStr) cls += ' today';
                        if (ds === selectedDateStr) cls += ' selected';
                        const dot = logsMap[ds] ? '<div class="has-record-dot"></div>' : '';
                        html += '<div class="' + cls + '" onclick="selectCalDate(\''+ ds +'\')">' + d + label + dot + '</div>';
                    }
                    const body = document.getElementById('calendar-body');
                    if (body) body.innerHTML = html;
                }

                function renderLogs() {
                    const allLogs = myLogs.filter(l => l.localDate === selectedDateStr).sort((a,b) => new Date(a.timestamp)-new Date(b.timestamp));
                    let html = '';
                    if (!allLogs.length) {
                        html = `<div class="text-center py-8 text-zinc-400"><i class="fa-regular fa-calendar-xmark text-3xl mb-3 opacity-50"></i><p class="text-sm font-medium">ไม่มีประวัติลงเวลา</p></div>`;
                    } else {
                        // เอา clock_in แรกสุด และ clock_out หลังสุด
                        const ins  = allLogs.filter(l => l.type === 'clock_in');
                        const outs = allLogs.filter(l => l.type === 'clock_out');
                        const firstIn  = ins[0];
                        const lastOut  = outs[outs.length - 1];
                        const toShow   = [firstIn, lastOut].filter(Boolean);
                        toShow.forEach(log => {
                            const time  = new Date(log.timestamp).toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit', timeZone: 'Asia/Bangkok' });
                            const isIn  = log.type === 'clock_in';
                            html += `<div class="flex items-center justify-between p-4 bg-zinc-50 rounded-xl border border-zinc-100 shadow-sm hover:border-yellow-300 transition-all">
                                <div class="flex items-center">
                                    <div class="w-10 h-10 rounded-full flex items-center justify-center mr-3 ${isIn ? 'bg-green-100 text-green-600' : 'bg-red-100 text-red-500'}">
                                        <i class="fa-solid ${isIn ? 'fa-arrow-right-to-bracket' : 'fa-arrow-right-from-bracket'}"></i>
                                    </div>
                                    <div>
                                        <p class="font-black text-zinc-800 text-sm">${isIn ? 'เข้างาน' : 'ออกงาน'}</p>
                                        <p class="text-[10px] font-bold text-zinc-400 uppercase tracking-widest">${log.branch}</p>
                                    </div>
                                </div>
                                <div class="text-lg font-black ${isIn ? 'text-green-600' : 'text-red-500'} font-mono">${time}</div>
                            </div>`;
                        });
                        // แสดงจำนวน record ทั้งหมดถ้ามากกว่า 2
                        if (allLogs.length > 2) {
                            html += `<p class="text-center text-[10px] text-zinc-400 font-bold pt-1">มีบันทึกทั้งหมด ${allLogs.length} รายการ (แสดงเข้าแรก-ออกหลัง)</p>`;
                        }
                    }

                    // รายละเอียดวันที่เลือก (วันหยุด / วันลา)
                    const leaveMap = buildLeaveMap();
                    const isHol   = isPublicHoliday(selectedDateStr);
                    const holName = getHolidayName(selectedDateStr);
                    const lv      = leaveMap[selectedDateStr];
                    const leaveTypeLabel = { sick:'ลาป่วย', personal:'ลากิจ', vacation:'ลาพักร้อน', other:'ลาอื่นๆ' };
                    let detailHtml = '';
                    if (isHol) {
                        detailHtml = `<div class="mt-3 flex items-start gap-2.5 bg-red-50 border border-red-100 rounded-xl p-3.5">
                            <i class="fa-solid fa-umbrella-beach text-red-400 mt-0.5 shrink-0"></i>
                            <div>
                                <p class="text-xs font-black text-red-600">วันหยุดนักขัตฤกษ์</p>
                                <p class="text-sm font-bold text-red-700 mt-0.5">${holName || 'วันหยุดราชการ'}</p>
                            </div>
                        </div>`;
                    }
                    if (lv) {
                        const isPending = lv.status === 'pending';
                        detailHtml += `<div class="mt-3 flex items-start gap-2.5 ${isPending ? 'bg-orange-50 border-orange-100' : 'bg-blue-50 border-blue-100'} border rounded-xl p-3.5">
                            <i class="fa-solid fa-calendar-minus ${isPending ? 'text-orange-400' : 'text-blue-400'} mt-0.5 shrink-0"></i>
                            <div>
                                <p class="text-xs font-black ${isPending ? 'text-orange-600' : 'text-blue-600'}">${isPending ? 'รออนุมัติการลา' : 'วันลา'}</p>
                                <p class="text-sm font-bold ${isPending ? 'text-orange-700' : 'text-blue-700'} mt-0.5">${leaveTypeLabel[lv.type] || 'ลา'}</p>
                            </div>
                        </div>`;
                    }

                    const el = document.getElementById('daily-logs');
                    if (el) el.innerHTML = html + detailHtml;
                }

                window.selectCalDate = (ds) => {
                    selectedDateStr = ds;
                    renderCalendar();
                    renderLogs();
                    const d = parseDateTH(ds);
                    const el = document.getElementById('selected-date-text');
                    if (el) el.textContent = todayTH() === ds ? 'วันนี้' : d.toLocaleDateString('th-TH', { day: 'numeric', month: 'short', year: 'numeric', timeZone: 'Asia/Bangkok' });
                };

                document.getElementById('btn-prev-month')?.addEventListener('click', () => {
                    displayMonth--; if (displayMonth < 0) { displayMonth = 11; displayYear--; } renderCalendar();
                });
                document.getElementById('btn-next-month')?.addEventListener('click', () => {
                    displayMonth++; if (displayMonth > 11) { displayMonth = 0; displayYear++; } renderCalendar();
                });

                const unsubscribe = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'time_logs'), snap => {
                    myLogs = [];
                    snap.forEach(d => {
                        const data = d.data();
                        if (data.uid === user.uid) {
                            data.localDate = getLocalISO(new Date(data.timestamp));
                            myLogs.push(data);
                        }
                    });
                    myLogs.sort((a,b) => new Date(b.timestamp)-new Date(a.timestamp));
                    renderCalendar();
                    renderLogs();
                });

                window.clockIn = async () => {
                    const btn = document.getElementById('btn-clock-in');
                    if (btn) btn.disabled = true;
                    try {
                        await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'time_logs'), {
                            uid: user.uid, name: profile.name, type: 'clock_in',
                            timestamp: new Date().toISOString(),
                            localDate: todayTH(),
                            branch: profile.branch || 'Lamsang Group'
                        });
                        showToast('✅ บันทึกเวลาเข้างานแล้ว', 'success');
                    } catch (e) { alert(e.message); }
                    finally { if (btn) btn.disabled = false; }
                };
                window.clockOut = async () => {
                    const btn = document.getElementById('btn-clock-out');
                    if (btn) btn.disabled = true;
                    try {
                        await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'time_logs'), {
                            uid: user.uid, name: profile.name, type: 'clock_out',
                            timestamp: new Date().toISOString(),
                            localDate: todayTH(),
                            branch: profile.branch || 'Lamsang Group'
                        });
                        showToast('✅ บันทึกเวลาออกงานแล้ว', 'success');
                    } catch (e) { alert(e.message); }
                    finally { if (btn) btn.disabled = false; }
                };

                renderCalendar();

                // cleanup: unsubscribe listener + stop clock
                return () => {
                    unsubscribe();
                    clearInterval(clockInterval);
                    delete window.clockIn;
                    delete window.clockOut;
                    delete window.selectCalDate;
                };
            }
        };

        // ── PROFILE ───────────────────────────────────────────────────
        PAGES['profile'] = {
            title: 'โปรไฟล์ของฉัน',
            html: `
            <style>
                .input-field { width:100%; border:2px solid #f4f4f5; background:#fafafa; border-radius:0.75rem; padding:0.75rem 1rem; font-size:0.875rem; outline:none; transition:all 0.2s; font-weight:500; color:#27272a; }
                .input-field:focus { background:#fff; border-color:#eab308; box-shadow:0 0 0 4px rgba(234,179,8,0.1); }
                .input-label { display:block; font-size:0.85rem; font-weight:600; color:#3f3f46; margin-bottom:0.4rem; }
                .input-readonly { width:100%; border:2px solid #e4e4e7; background:#f4f4f5; border-radius:0.75rem; padding:0.75rem 1rem; font-size:0.875rem; font-weight:600; color:#71717a; cursor:not-allowed; outline:none; }
                .avatar-container:hover .avatar-overlay { opacity:1; }
            </style>
            <div class="p-6 lg:p-8 bg-zinc-50">
                <div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <div class="lg:col-span-1 space-y-6">
                        <div class="bg-white rounded-[2rem] shadow-sm border border-zinc-200 p-8 text-center relative overflow-hidden">
                            <div class="absolute top-0 left-0 w-full h-24 bg-zinc-900"></div>
                            <div class="relative w-32 h-32 mx-auto mt-8 mb-4 avatar-container cursor-pointer rounded-full border-4 border-white shadow-md group" onclick="changeProfilePicture()">
                                <img src="" id="main-profile-img" class="w-full h-full rounded-full object-cover" onerror="handleImgError(this)">
                                <div class="avatar-overlay absolute inset-0 bg-black bg-opacity-50 rounded-full flex flex-col items-center justify-center opacity-0 transition-opacity duration-300">
                                    <i class="fa-solid fa-camera text-white text-xl mb-1"></i>
                                    <span class="text-[10px] text-white font-bold">เปลี่ยนรูป</span>
                                </div>
                            </div>
                            <h3 class="text-xl font-black text-zinc-800" id="display-name">-</h3>
                            <p class="text-sm text-yellow-600 font-bold mb-1" id="display-role">-</p>
                            <p class="text-xs text-zinc-500 mb-6 font-medium bg-zinc-100 inline-block px-3 py-1 rounded-full mt-2" id="display-branch">-</p>
                            <div class="border-t border-zinc-100 pt-6 text-left text-sm space-y-4">
                                <div class="flex justify-between font-medium"><span class="text-zinc-400">รหัสพนักงาน:</span><span id="display-emp-code" class="font-bold text-zinc-700">-</span></div>
                                <div class="flex justify-between font-medium"><span class="text-zinc-400">เริ่มงานเมื่อ:</span><span id="display-start-date" class="font-bold text-zinc-700">-</span></div>
                                <div class="flex justify-between font-medium"><span class="text-zinc-400">สถานะ:</span><span id="display-status" class="font-bold text-green-600">-</span></div>
                            </div>
                        </div>

                const { getAuth, updatePassword } = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js");

                // Fill profile card

                document.getElementById('ro-bank-acc').value = bankShow;

                function convertDriveLink(url) {
                    if (!url) return '';
                    if (url.includes('drive.google.com')) {
                        const m = url.match(/\/d\/(.+?)\//) || url.match(/id=(.+?)(&|$)/);
                        if (m && m[1]) return `https://lh3.googleusercontent.com/d/${m[1]}`;
                    }
                    return url;
                }

                // คลิกรูป → เปิด file picker
                window.changeProfilePicture = () => {

                        fi.style.display = 'none'; document.body.appendChild(fi);

                            const file = fi.files[0]; if (!file) return;

                    const orig = btn.innerHTML;
                    btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> กำลังบันทึก...';

                        if (newPw.length < 6) { alert('❌ รหัสผ่านต้องยาวอย่างน้อย 6 ตัว'); btn.disabled = false; btn.innerHTML = orig; return; }
                        try {
                            await updatePassword(getAuth().currentUser, newPw);

                            emergencyPhone: document.getElementById('f-emergency-phone').value.trim(),
                            originalPhotoURL: photoInput, photoURL: photoDisplay
                        });
                        showToast('✅ อัปเดตข้อมูลสำเร็จ', 'success');
                        // อัปเดต avatar บน topbar ด้วย
                        if (photoDisplay) document.getElementById('topbar-avatar').src = photoDisplay;
                    } catch (err) { alert('❌ ' + err.message); }
                    finally { btn.disabled = false; btn.innerHTML = orig; }
                });

                return () => { delete window.changeProfilePicture; };
            }
        };

            init: async (user, profile, db, appId) => {

                document.getElementById('f-photo-url')?.addEventListener('input', function() {

                        img.src = url; img.classList.remove('hidden');

                document.getElementById('employee-form')?.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const btn = document.getElementById('submit-btn');

                    const payload = {

                    };

                            });

                            payload.uid = data.localId; payload.createdAt = new Date().toISOString();

                            showToast('✅ สร้างพนักงานใหม่สำเร็จ (รหัสผ่าน: 123456)', 'success');
                            document.getElementById('employee-form').reset();
                            empSwitchTab('manage');
                        }
                    } catch (err) { alert('❌ ' + err.message); }
                    finally { btn.disabled = false; document.getElementById('submit-btn-text').textContent = orig; }
                });

            const ws0 = (mySchedule.workStart || '08:00').substring(0,2) + ':00';
            const we0 = (mySchedule.workEnd   || '17:00').substring(0,2) + ':00';
            const st = isHourly ? (document.getElementById('req-start-time')?.value || ws0) : ws0;
            const et = isHourly ? (document.getElementById('req-end-time')?.value   || we0) : we0;
            const hrs = calcLeaveHours(sd, st, ed, et, mySchedule);
            if (hrs <= 0) {
                showToast('วันที่เลือกไม่มีชั่วโมงทำงาน (เป็นวันหยุดหรือนอกตารางงาน)', 'error'); return;
            }
            const hasOverlap = myRequests.some(r =>
                r.status !== 'cancelled' && r.status !== 'rejected' &&
                r.startDate <= ed && r.endDate >= sd
            );
            if (hasOverlap) {
                showToast('มีคำขอลาซ้อนในช่วงวันที่นี้แล้ว กรุณาตรวจสอบ', 'error'); return;
            }

            // ตรวจโควต้าก่อน submit
            if (['sick','personal','vacation'].includes(selectedLeaveType)) {
                const balRef2 = doc(db, 'artifacts', APP_ID, 'public', 'data', 'leave_balances', user.uid);
                const balSnap2 = await getDoc(balRef2);
                const bal2 = balSnap2.exists() ? balSnap2.data() : {};
                const b2 = bal2[selectedLeaveType] || {};
                const hpd2 = getDayWorkHours(mySchedule);
                const totalH2 = b2.totalHours != null ? b2.totalHours : (getLeaveTypeInfo(selectedLeaveType).maxDays * hpd2);
                const usedH2  = b2.usedHours || 0;
                const remH2   = totalH2 - usedH2;
                if (hrs > remH2 + 0.01) {
                    showToast(`❌ โควต้าไม่พอ — คงเหลือ ${hoursToDisplay(Math.max(0,remH2), mySchedule)} แต่ขอลา ${hoursToDisplay(hrs, mySchedule)}`, 'error');
                    return;
                }
            }

            const btn = document.getElementById('submit-leave-btn');
            btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> กำลังส่ง...';
            try {
                await addDoc(collection(db, 'artifacts', APP_ID, 'public', 'data', 'leave_requests'), {
                    uid: user.uid, employeeName: profile.name, employeeCode: profile.employeeCode || '',
                    branch: profile.branch || '', position: profile.position || '',
                    photoURL: profile.photoURL || '',
                    type: selectedLeaveType, typeName: getLeaveTypeInfo(selectedLeaveType).label,
                    startDate: sd, endDate: ed, startTime: st, endTime: et,
                    isHourly, totalHours: hrs,
                    reason, attachment: document.getElementById('req-attachment')?.value.trim() || '',
                    status: 'pending',
                    createdAt: new Date().toISOString(),
                });
                showToast('✅ ส่งคำขอลาเรียบร้อยแล้ว', 'success');
                // แจ้ง manager/admin ผ่าน LINE
                notifyManagersNewLeave({
                    uid: user.uid, employeeName: profile.name,
                    branch: profile.branch||'', position: profile.position||'',
                    typeName: getLeaveTypeInfo(selectedLeaveType).label,
                    startDate: sd, endDate: ed, reason,
                }).catch(()=>{});
                closeLeaveModal();
                selectedLeaveType = null;
                document.getElementById('employee-form')?.reset?.();
                document.getElementById('req-reason').value = '';
                document.getElementById('req-attachment').value = '';
                document.querySelectorAll('[id^="lt-"]').forEach(el => {
                    el.classList.remove('border-yellow-500', 'bg-yellow-50');
                    el.classList.add('border-zinc-200');
                });
                setDefaultDates();
            } catch (e) { showToast('❌ ' + e.message, 'error'); }
            finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-paper-plane mr-2"></i> ส่งคำขอลา';
            }
        };

        // ── Render my requests ──
        function renderMyRequests() {
            const el = document.getElementById('my-requests');
            if (!el) return;
            if (!myRequests.length) {
                el.innerHTML = `<div class="text-center py-16 text-zinc-300">
                    <i class="fa-regular fa-calendar-xmark text-5xl mb-3"></i>
                    <p class="font-bold text-sm">ยังไม่มีคำขอลา</p>
                    <p class="text-xs mt-1">กดปุ่ม "ยื่นคำขอลา" เพื่อเริ่มต้น</p>
                </div>`; return;
            }
            el.innerHTML = myRequests.map(r => {
                const t  = getLeaveTypeInfo(r.type);
                const st = STATUS_MAP[r.status] || STATUS_MAP.pending;
                const cv = colorVariants(t.color);
                const dateRange = r.startDate === r.endDate
                    ? fmtDate(r.startDate)
                    : `${fmtDate(r.startDate)} – ${fmtDate(r.endDate)}`;
                const timeRange = r.isHourly ? ` (${r.startTime}–${r.endTime})` : '';
                const todayStr = todayTH();
                const canCancel = (r.status === 'pending' || r.status === 'approved') && r.startDate > todayStr;
                return `
                <div class="leave-card bg-white rounded-2xl border border-zinc-200 p-5 flex flex-col sm:flex-row sm:items-center gap-4">
                  <div class="w-12 h-12 rounded-2xl ${cv.bg} flex items-center justify-center shrink-0">
                    <i class="fa-solid ${t.icon} ${cv.text} text-lg"></i>
                  </div>
                  <div class="flex-1 min-w-0">
                    <div class="flex flex-wrap items-center gap-2 mb-1">
                      <span class="font-black text-zinc-800">${t.label}</span>
                      <span class="text-[10px] font-black px-2.5 py-1 rounded-full ${st.badge}">
                        <i class="fa-solid ${st.icon} mr-1"></i>${st.label}
                      </span>
                    </div>
                    <p class="text-sm text-zinc-500 font-medium">${dateRange}${timeRange}</p>
                    <p class="text-xs text-zinc-400 mt-0.5 truncate">${r.reason}</p>
                    ${r.approverNote ? `<p class="text-xs text-red-500 mt-1 font-bold"><i class="fa-solid fa-comment mr-1"></i>${r.approverNote}</p>` : ''}
                  </div>
                  <div class="text-right shrink-0">
                    <p class="font-black text-zinc-800 text-lg">${hoursToDisplay(r.totalHours, mySchedule)}</p>
                    <p class="text-[10px] text-zinc-400 font-bold uppercase">ชั่วโมงลา</p>
                    ${canCancel ? `<button onclick="cancelLeaveRequest('${r.id}')" class="mt-2 text-[10px] text-red-500 hover:text-red-700 font-black uppercase bg-red-50 hover:bg-red-100 px-3 py-1 rounded-lg transition-all">ยกเลิก</button>` : ''}
                  </div>
                </div>`;
            }).join('');
        }

        window.cancelLeaveRequest = async (id) => {
            const req = myRequests.find(r => r.id === id);
            if (!req) return;
            const todayNow = todayTH();
            if (req.startDate <= todayNow) {
                showToast('วันลาถึงแล้ว ไม่สามารถยกเลิกเองได้ กรุณาติดต่อหัวหน้า', 'error');
                return;
            }
            if (!confirm('ต้องการยกเลิกคำขอลานี้?')) return;
            try {
                await updateDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'leave_requests', id), {
                    status: 'cancelled', cancelledAt: new Date().toISOString()
                });
                // คืนชั่วโมงกลับถ้าสถานะ approved
                if (req.status === 'approved' && req.totalHours > 0) {
                    const leaveTypeKey = ['sick','personal','vacation'].includes(req.type) ? req.type : null;
                    if (leaveTypeKey) {
                        const balRef = doc(db, 'artifacts', APP_ID, 'public', 'data', 'leave_balances', user.uid);
                        const bs = await getDoc(balRef);
                        if (bs.exists()) {
                            const bal = bs.data();
                            const newUsed = Math.max(0, (bal[leaveTypeKey]?.usedHours || 0) - req.totalHours);
                            await updateDoc(balRef, { [leaveTypeKey + '.usedHours']: newUsed });
                        }
                    }
                }
                showToast('ยกเลิกคำขอลาแล้ว', 'info');
            } catch (e) { showToast('❌ ' + e.message, 'error'); }
        };

        // ── Calendar ──
        function renderCalendar() {
            var el = document.getElementById('leave-cal-grid');
            var title = document.getElementById('cal-month-title');
            if (!el) return;
            var months = ["มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน","กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"];
            if (title) title.textContent = months[calMonth] + ' ' + (calYear + 543);
            var firstDay = new Date(calYear, calMonth, 1).getDay();
            var daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
            var today = todayTH();
            var personalHolSet = new Set((mySchedule && Array.isArray(mySchedule.holidays)) ? mySchedule.holidays : []);
            var workDaySet2 = new Set((mySchedule && mySchedule.workDays) ? mySchedule.workDays : [1,2,3,4,5]);
            var leaveMap = {};
            myRequests.filter(function(r){ return r.status !== 'cancelled' && r.status !== 'rejected'; }).forEach(function(r) {
                var d = parseDateTH(r.startDate);
                var end = parseDateTH(r.endDate);
                while (d <= end) {
                    var ds = dateToTHStr(d);
                    if (!leaveMap[ds]) leaveMap[ds] = [];
                    leaveMap[ds].push(r);
                    d.setDate(d.getDate() + 1);
                }
            });
            var leaveStyleMap = {
                sick:     { cell:'bg-red-50 text-red-700',     dot:'bg-red-400'    },
                personal: { cell:'bg-blue-50 text-blue-700',   dot:'bg-blue-400'   },
                vacation: { cell:'bg-green-50 text-green-700', dot:'bg-green-400'  },
                maternity:{ cell:'bg-pink-50 text-pink-700',   dot:'bg-pink-400'   },
                ordain:   { cell:'bg-orange-50 text-orange-700',dot:'bg-orange-400'},
                military: { cell:'bg-slate-100 text-slate-600',dot:'bg-slate-400'  },
                other:    { cell:'bg-zinc-100 text-zinc-600',  dot:'bg-zinc-400'   }
            };
            var html = '';
            for (var i = 0; i < firstDay; i++) html += '<div></div>';
            for (var d = 1; d <= daysInMonth; d++) {
                var ds = calYear + '-' + String(calMonth+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
                var isToday2 = ds === today;
                var isHol2 = isPublicHoliday(ds);
                var dow2 = new Date(ds + 'T12:00:00+07:00').getDay();
                var isPerHol2 = !workDaySet2.has(dow2) || personalHolSet.has(ds);
                var leaves2 = leaveMap[ds] || [];
                var hasPending2 = leaves2.some(function(r){ return r.status === 'pending'; });
                var approved2 = leaves2.filter(function(r){ return r.status === 'approved'; });
                var cellCls = 'aspect-square flex flex-col items-center justify-center rounded-xl font-bold relative cursor-default transition-all ';
                var badge2 = '';
                if (isToday2) {
                    cellCls += 'bg-zinc-900 text-white';
                } else if (isHol2) {
                    var holName2 = getHolidayName(ds) || 'หยุดนักขัตฤกษ์';
                    cellCls += 'bg-red-100 text-red-700';
                    var holShort2 = holName2.length > 5 ? holName2.slice(0,5)+'…' : holName2;
                    badge2 = '<span style="font-size:0.38rem;font-weight:800;line-height:1;margin-top:1px;display:block;text-align:center;opacity:0.85">' + holShort2 + '</span>';
                } else if (isPerHol2) {
                    cellCls += 'bg-purple-100 text-purple-700';
                    badge2 = '<span style="font-size:0.4rem;font-weight:800;line-height:1;margin-top:1px;display:block;text-align:center;opacity:0.85">หยุด</span>';
                } else if (hasPending2) {
                    cellCls += 'bg-amber-100 text-amber-700';
                    badge2 = '<span style="font-size:0.4rem;font-weight:800;line-height:1;margin-top:1px;display:block;text-align:center;opacity:0.85">รอ?</span>';
                } else if (approved2.length) {
                    var s2 = leaveStyleMap[approved2[0].type] || leaveStyleMap.other;
                    cellCls += s2.cell;
                    var seen2 = {}, dots2 = [];
                    approved2.forEach(function(r){ var dot=(leaveStyleMap[r.type]||leaveStyleMap.other).dot; if(!seen2[dot]){seen2[dot]=1;dots2.push(dot);} });
                    dots2 = dots2.slice(0,3);
                    badge2 = '<div style="display:flex;gap:2px;margin-top:2px">' + dots2.map(function(c){ return '<div style="width:5px;height:5px;border-radius:50%" class="'+c+'"></div>'; }).join('') + '</div>';
                } else {
                    cellCls += 'text-zinc-600 hover:bg-zinc-50';
                }
                html += '<div class="' + cellCls + '" style="font-size:0.8rem"><span>' + d + '</span>' + badge2 + '</div>';
            }
            el.innerHTML = html;
            var legend = document.getElementById('leave-cal-legend');
            if (!legend) {
                legend = document.createElement('div');
                legend.id = 'leave-cal-legend';
                legend.className = 'mt-4 pt-4 border-t border-zinc-100 flex flex-wrap gap-x-3 gap-y-2 justify-center text-xs font-bold text-zinc-500';
                var items = [['bg-zinc-900','วันนี้'],['bg-red-200','หยุดนักขัตฤกษ์'],['bg-purple-300','หยุดส่วนตัว'],['bg-amber-300','รออนุมัติ'],['bg-red-400','ลาป่วย'],['bg-blue-400','ลากิจ'],['bg-green-400','ลาพักร้อน'],['bg-pink-400','ลาคลอด'],['bg-orange-400','ลาบวช']];
                legend.innerHTML = items.map(function(item){ return '<div class="flex items-center gap-1"><div class="w-3 h-3 rounded-full '+item[0]+'"></div> '+item[1]+'</div>'; }).join('');
                if (el.parentElement) el.parentElement.appendChild(legend);
            }
        }

        window.leaveCalPrev = () => { calMonth--; if (calMonth < 0) { calMonth = 11; calYear--; } renderCalendar(); };
        window.leaveCalNext = () => { calMonth++; if (calMonth > 11) { calMonth = 0; calYear++; } renderCalendar(); };

        window.switchLeaveTab = (tab) => {
            document.getElementById('tab-mine')?.classList.toggle('hidden', tab !== 'mine');
            document.getElementById('tab-calendar')?.classList.toggle('hidden', tab !== 'calendar');
            document.querySelectorAll('.tab-btn').forEach((b, i) => {
                const isActive = (i === 0 && tab === 'mine') || (i === 1 && tab === 'calendar');
                b.classList.toggle('active', isActive);
                b.classList.toggle('text-zinc-500', !isActive);
            });
            if (tab === 'calendar') renderCalendar();
        };

        function fmtDate(ds) {
            if (!ds) return '-';
            // รองรับทั้ง 'YYYY-MM-DD' และ full ISO timestamp จาก Firestore
            const d = ds.length === 10 ? new Date(ds+'T12:00:00+07:00') : new Date(ds);
            return d.toLocaleDateString('th-TH', { day: 'numeric', month: 'short', year: 'numeric', timeZone: 'Asia/Bangkok' });
        }

        return () => {
            if (typeof unsubReq === 'function') unsubReq();
            if (typeof unsubBal === 'function') unsubBal();
            ['selectLeaveType','toggleHourly','openLeaveModal','closeLeaveModal',
             'submitLeaveRequest','cancelLeaveRequest','leaveCalPrev','leaveCalNext',
             'switchLeaveTab'].forEach(k => delete window[k]);
        };
    }
};

    init: async (user, profile, db, APP_ID) => {

            if (balanceCache[uid]) return balanceCache[uid];
            const snap = await getDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'leave_balances', uid));
            balanceCache[uid] = snap.exists() ? snap.data() : {};
            return balanceCache[uid];
        }
        // invalidate cache เมื่อ approve/cancel เพื่อ force reload
        function invalidateBalance(uid) { delete balanceCache[uid]; }

        let allRequests = [], pendingAction = null;

        const unsub = onSnapshot(
            query(collection(db, 'artifacts', APP_ID, 'public', 'data', 'leave_requests'), orderBy('createdAt', 'desc')),
            async snap => {
                allRequests = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                const uids = [...new Set(allRequests.map(r => r.uid).filter(Boolean))];
                await Promise.all(uids.map(uid => getEmpSchedule(uid)));
                updateStats();
                filterRequests();
            }
        );

        function updateStats() {
            const now = newDateTH();
            const thisMonth = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
            document.getElementById('stat-pending').textContent  = allRequests.filter(r => r.status === 'pending').length;
            document.getElementById('stat-approved').textContent = allRequests.filter(r => r.status === 'approved' && r.createdAt?.startsWith(thisMonth)).length;
            document.getElementById('stat-rejected').textContent = allRequests.filter(r => r.status === 'rejected' && r.createdAt?.startsWith(thisMonth)).length;
        }

        // ── schedule cache & display helper ──────────────────
        const scheduleCache = {};
        async function getEmpSchedule(uid) {
            if (scheduleCache[uid]) return scheduleCache[uid];
            try {
                const snap = await getDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'work_schedules', uid));
                const s = snap.exists() ? snap.data() : { workStart:'08:00', workEnd:'17:00', breakMinutes:60 };
                scheduleCache[uid] = s;
                return s;
            } catch { return { workStart:'08:00', workEnd:'17:00', breakMinutes:60 }; }
        }
        function dispHoursForReq(r) {
            const s = scheduleCache[r.uid];
            return hoursToDisplay(r.totalHours, s || null);
        }

        window.filterRequests = () => {
            const st  = document.getElementById('filter-status')?.value;

            renderRequests(filtered);
