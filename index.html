<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flash Converter Pro - Standalone</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel CDN for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- SheetJS CDN -->
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Anuphan:wght@300;400;600;700&display=swap');
        body { font-family: 'Anuphan', sans-serif; cursor: default; }
        .resize-handle { width: 6px; cursor: col-resize; position: absolute; right: 0; top: 0; bottom: 0; z-index: 10; transition: background 0.2s; }
        .resize-handle:hover { background: #fbbf24; }
        textarea::-webkit-scrollbar { width: 4px; height: 4px; }
        textarea::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .select-none { user-select: none; }
        .grab-cursor { cursor: grab; }
        .grabbing-cursor { cursor: grabbing !important; }
        thead.sticky-header th { position: sticky; top: 0; z-index: 40; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect, useCallback } = React;

        const App = () => {
            const [data, setData] = useState(null);
            const [fileName, setFileName] = useState("");
            const [status, setStatus] = useState("idle");
            const [errorMsg, setErrorMsg] = useState("");
            const [selectedRows, setSelectedRows] = useState(new Set());
            
            const fileInputRef = useRef(null);
            const tableContainerRef = useRef(null);
            const topScrollRef = useRef(null);
            const isSyncingScroll = useRef(false);
            const isDragging = useRef(false);
            const lastMouseX = useRef(0);

            // ระบบ Resize คอลัมน์
            const [colWidths, setColWidths] = useState([60, 300, 200, 450, 100, 130, 130, 120, 100, 80, 80, 80, 100, 130, 100, 150, 800, 150, 150]);
            const isResizing = useRef(-1);
            const startX = useRef(0);
            const startWidth = useRef(0);

            const DEFAULT_PRESETS = [
                { id: "pants", label: "กางเกง", prefix: "P", keywords: ["กางเกง", "pants", "trouser"], weight: 0.5, length: 32, width: 25, height: 5, itemType: "เสื้อผ้า", productType: "Standard", priority: 1 },
                { id: "belt",  label: "เข็มขัด", prefix: "B", keywords: ["เข็มขัด", "belt"],            weight: 0.2, length: 15, width: 15, height: 5, itemType: "เสื้อผ้า", productType: "Standard", priority: 0 },
            ];

            const loadPresets = () => {
                try {
                    const saved = localStorage.getItem('flashConverter_presets');
                    if (saved) {
                        const parsed = JSON.parse(saved);
                        // merge saved values into defaults (preserve structure/keywords)
                        return DEFAULT_PRESETS.map(def => {
                            const saved = parsed.find(p => p.id === def.id);
                            return saved ? { ...def, ...saved } : def;
                        });
                    }
                } catch(e) {}
                return DEFAULT_PRESETS;
            };

            const [productPresets, setProductPresets] = useState(loadPresets);

            const updatePreset = (id, field, value) => {
                const next = productPresets.map(p => p.id === id ? { ...p, [field]: value } : p);
                setProductPresets(next);
                localStorage.setItem('flashConverter_presets', JSON.stringify(next));
            };

            const [settings, setSettings] = useState({
                weightPerPiece: 0.5,
                length: 32,
                width: 25,
                heightPerPiece: 5,
                itemType: "เสื้อผ้า",
                productType: "Standard"
            });

            const [manualOverride, setManualOverride] = useState(false);

            const applyPreset = (preset) => {
                setSettings({
                    weightPerPiece: preset.weight,
                    length: preset.length,
                    width: preset.width,
                    heightPerPiece: preset.height,
                    itemType: preset.itemType,
                    productType: preset.productType
                });
                setManualOverride(true);
            };

            const clearOverride = () => setManualOverride(false);

            // หัวตารางเป๊ะตามต้นแบบ (ใช้ \r\n เพื่อความเข้ากันได้สูงสุดกับ Excel/Flash Portal)
            const headersForExport = [
                "Customer_order_number\r\n(เลขออเดอร์ของลูกค้า)",
                "*Consignee_name\r\n(ชื่อผู้รับ)",
                "*Address\r\n(ทิ่อยู่)",
                "*Postal_code\r\n(รหัสไปรษณีย์)",
                "*Phone_number\r\n(เบอร์โทรศัพท์)",
                "Phone_number2\r\n(เบอร์โทรศัพท์)",
                "Item_type\r\n(ประเภทสินค้า)",
                "*Weight_kg\r\n(น้ำหนัก)",
                "*Length\r\n(ยาว)",
                "*Width\r\n(กว้าง)",
                "*Height\r\n(สูง)",
                "Flash_care",
                "Declared_value\r\n(มูลค่าสินค้าที่ระบุโดยลูกค้า)",
                "Box_shield",
                "*Product_type         (ประเภทสินค้า）", // 9 spaces + full-width bracket
                "Remark1\r\n(หมายเหตุ1)",
                "Remark2\r\n(หมายเหตุ2)",
                "Remark3\r\n(หมายเหตุ3)"
            ];

            const totalTableWidth = colWidths.reduce((a, b) => a + b, 0);

            const handleScrollSync = (source) => {
                if (isSyncingScroll.current) return;
                isSyncingScroll.current = true;
                if (source === 'top' && tableContainerRef.current) {
                    tableContainerRef.current.scrollLeft = topScrollRef.current.scrollLeft;
                } else if (source === 'table' && topScrollRef.current) {
                    topScrollRef.current.scrollLeft = tableContainerRef.current.scrollLeft;
                }
                setTimeout(() => { isSyncingScroll.current = false; }, 10);
            };

            const handleMouseDown = (e) => {
                if (e.target.tagName === 'TEXTAREA' || e.target.classList.contains('resize-handle')) return;
                isDragging.current = true;
                lastMouseX.current = e.pageX;
                document.body.classList.add('grabbing-cursor');
            };

            const handleGlobalMouseMove = useCallback((e) => {
                if (isResizing.current !== -1) {
                    const diff = e.pageX - startX.current;
                    const newWidths = [...colWidths];
                    newWidths[isResizing.current] = Math.max(50, startWidth.current + diff);
                    setColWidths(newWidths);
                    return;
                }
                if (isDragging.current && tableContainerRef.current) {
                    const diff = e.pageX - lastMouseX.current;
                    tableContainerRef.current.scrollLeft -= diff;
                    lastMouseX.current = e.pageX;
                }
            }, [colWidths]);

            const handleGlobalMouseUp = useCallback(() => {
                isDragging.current = false;
                isResizing.current = -1;
                document.body.classList.remove('grabbing-cursor');
            }, []);

            useEffect(() => {
                document.addEventListener('mousemove', handleGlobalMouseMove);
                document.addEventListener('mouseup', handleGlobalMouseUp);
                return () => {
                    document.removeEventListener('mousemove', handleGlobalMouseMove);
                    document.removeEventListener('mouseup', handleGlobalMouseUp);
                };
            }, [handleGlobalMouseMove, handleGlobalMouseUp]);

            const onResizeStart = (index, e) => {
                e.stopPropagation();
                isResizing.current = index;
                startX.current = e.pageX;
                startWidth.current = colWidths[index];
            };

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setFileName(file.name);
                setStatus("processing");
                const reader = new FileReader();
                reader.onload = (evt) => {
                    try {
                        const bstr = evt.target.result;
                        const wb = XLSX.read(bstr, { type: 'binary' });
                        const ws = wb.Sheets[wb.SheetNames[0]];
                        const rawData = XLSX.utils.sheet_to_json(ws);
                        const groupedOrders = {};
                        
                        rawData.forEach(row => {
                            const orderNo = row["No."] || row["เลขที่"] || row["เลขที่ออเดอร์"] || "N/A";
                            if (!groupedOrders[orderNo]) {
                                groupedOrders[orderNo] = {
                                    no: orderNo, 
                                    customerName: row["Customer Name"] || row["ชื่อลูกค้า"] || row["ชื่อผู้รับ"] || "",
                                    phone: String(row["Customer Phone"] || row["เบอร์โทรศัพท์"] || "").replace(/'/g, ""),
                                    address: row["Customer Address"] || row["ที่อยู่"] || "",
                                    total: parseFloat(row["Total"] || row["ยอดรวม"] || 0), 
                                    items: []
                                };
                            }
                            groupedOrders[orderNo].items.push({
                                name: row["Item Name"] || row["ชื่อสินค้า"] || "", 
                                variant: row["Variant Name"] || row["ตัวเลือกสินค้า"] || "",
                                qty: parseInt(row["Item Qty"] || row["จำนวน"] || 1)
                            });
                        });

                        // detectPreset ใช้ productPresets จาก component scope
                        const detectPreset = (name) => {
                            const code = name.trim().toUpperCase();
                            // match by prefix first
                            const byPrefix = productPresets.find(p => p.prefix && code.startsWith(p.prefix));
                            if (byPrefix) return byPrefix;
                            // fallback: keyword match
                            const n = name.toLowerCase();
                            return productPresets.find(p => p.keywords && p.keywords.some(k => n.includes(k))) || null;
                        };

                        const flashData = Object.values(groupedOrders).map(order => {
                            const totalQty = order.items.reduce((sum, item) => sum + item.qty, 0);

                            // --- Auto-detect dimensions & weight per order ---
                            let pkg = { length: settings.length, width: settings.width, heightPerPiece: settings.heightPerPiece, itemType: settings.itemType, productType: settings.productType };
                            let totalWeight = null;
                            let totalHeight = null;

                            const detectedItems = order.items.map(i => ({ preset: detectPreset(i.name), qty: i.qty }));
                            const hasAny = !manualOverride && detectedItems.some(d => d.preset !== null);

                            if (hasAny) {
                                // น้ำหนัก: คำนวณแต่ละชิ้นตาม preset ของตัวเอง (ถ้าไม่รู้จักใช้ weightPerPiece)
                                totalWeight = detectedItems.reduce((sum, d) => {
                                    const w = d.preset ? d.preset.weight : settings.weightPerPiece;
                                    return sum + w * d.qty;
                                }, 0);

                                totalHeight = detectedItems.reduce((sum, d) => {
                                    const h = d.preset ? d.preset.height : settings.heightPerPiece;
                                    return sum + h * d.qty;
                                }, 0);

                                // ขนาดกล่อง: ใช้ preset priority สูงสุดที่มีใน order
                                const bestPreset = detectedItems
                                    .filter(d => d.preset !== null)
                                    .map(d => d.preset)
                                    .sort((a, b) => b.priority - a.priority)[0];

                                pkg = {
                                    length: bestPreset.length,
                                    width: bestPreset.width,
                                    heightPerPiece: bestPreset.height,
                                    itemType: bestPreset.itemType || settings.itemType,
                                    productType: bestPreset.productType || settings.productType
                                };
                            }

                            const exportWeight = totalWeight !== null ? totalWeight.toFixed(2) : (settings.weightPerPiece * totalQty).toFixed(2);
                            const exportHeight = totalHeight !== null ? totalHeight : (pkg.heightPerPiece * totalQty);
                            // --- end auto-detect ---
                            
                            // 1. Customer Order Number: ใช้รหัสสินค้า 3 ตัวหน้า (จำกัด 64 ตัวอักษร)
                            const colorAbbr = {
                                "ขาว": "ขาว", "แดง": "แดง", "ดำ": "ดำ",
                                "คาราเมล": "ครม", "น้ำตาล": "นต", "กรม": "ก",
                                "กาแฟ": "กฟ", "ชานม": "ชน", "น้ำตาลเข้ม": "นตข",
                                "กากี": "กากี", "ครีม": "ค", "เทา": "ท",
                                "น้ำตาลอ่อน": "นตอ", "ขาว & กากี": "ข&ก",
                                "ดำ & กากี": "ด&ก", "ดำ & ขาว": "ด&ข",
                                "ดำ & ส้ม": "ด&ส", "ส้มอิฐ": "สอ", "โกโก้": "กก",
                                "ลาเต้": "ลต", "เขียว": "เขียว", "ชมพู": "ชพ",
                                "เบจ": "เบจ", "ฟ้า": "ฟ้า", "เหลืองมัสตาร์ด": "หล",
                                "ม่วง": "ม่วง", "ขาวนวล": "ขาว",
                                "Moonless Night (ด้ายดำ)": "ดำ", "Moonlit Night (ด้ายขาว)": "ขาว",
                                "เขียวขี้ม้า": "ขขม", "เทาเข้ม": "ทข", "เทาอ่อน": "ทอ",
                                "เหลือง": "หล", "เขียวเข้ม": "ขม", "ม่วงเข้ม": "มข",
                                "ม่วงอ่อน": "มอ", "เหลืองอ่อน": "หลอ", "แดงไวน์": "แดง",
                                "เทาดำ": "ทด", "ชมพูนู้ด": "ชพ", "โอวัลติน": "อวต",
                                "มะกอก": "มก", "เลม่อน": "ลม", "ชาโคล": "ชค", "เทาฟ้า": "ทฟ"
                            };
                            const abbrevColor = (v) => colorAbbr[v] || v;

                            const buildOrderParts = (useAbbr) => order.items.map(i => {
                                const productCode = String(i.name).substring(0, 3).trim();
                                const variant = i.variant || "";
                                const variantStr = variant ? `-${useAbbr ? abbrevColor(variant) : variant}` : "";
                                return `${i.qty} = ${productCode}${variantStr}`;
                            });

                            const partsLong = buildOrderParts(false);
                            let orderInfoStr = `${order.no} | ${partsLong.join(" | ")}`;
                            if (orderInfoStr.length > 64) {
                                const partsShort = buildOrderParts(true);
                                orderInfoStr = `${order.no} | ${partsShort.join(" | ")}`;
                            }
                            if (orderInfoStr.length > 64) orderInfoStr = orderInfoStr.substring(0, 64);

                            // 2. Remark1: ใช้ชื่อสินค้าเต็มรูปแบบ
                            const remarkFull = order.items.map(i => {
                                const variantStr = i.variant ? ` (${i.variant})` : "";
                                return `จำนวน ${i.qty} ชิ้น | ${i.name}${variantStr}`;
                            }).join(", ");

                            const postalCode = (order.address.match(/\d{5}$/) || [""])[0];

                            // ถ้าที่อยู่มีอำเภอเมือง ให้ลบคำนำหน้า ต. อ. จ. ออก
                            const cleanAddress = (addr) => {
                                if (/อำเภอเมือง|อ\.เมือง/.test(addr)) {
                                    return addr
                                        .replace(/ตำบล\s*/g, "")
                                        .replace(/ต\.\s*/g, "")
                                        .replace(/อำเภอ\s*/g, "")
                                        .replace(/อ\.\s*/g, "")
                                        .replace(/จังหวัด\s*/g, "")
                                        .replace(/จ\.\s*/g, "")
                                        .replace(/\s{2,}/g, " ")
                                        .trim();
                                }
                                return addr;
                            };

                            return {
                                [headersForExport[0]]: orderInfoStr,
                                [headersForExport[1]]: order.customerName,
                                [headersForExport[2]]: cleanAddress(order.address),
                                [headersForExport[3]]: postalCode,
                                [headersForExport[4]]: order.phone,
                                [headersForExport[5]]: "",
                                [headersForExport[6]]: pkg.itemType,
                                [headersForExport[7]]: exportWeight,
                                [headersForExport[8]]: pkg.length,
                                [headersForExport[9]]: pkg.width,
                                [headersForExport[10]]: exportHeight,
                                [headersForExport[11]]: "N",
                                [headersForExport[12]]: order.total,
                                [headersForExport[13]]: "N",
                                [headersForExport[14]]: pkg.productType,
                                [headersForExport[15]]: remarkFull,
                                [headersForExport[16]]: "",
                                [headersForExport[17]]: ""
                            };
                        });
                        setData(flashData);
                        setSelectedRows(new Set(flashData.map((_, i) => i)));
                        setStatus("success");
                    } catch (err) { setErrorMsg(err.message); setStatus("error"); }
                };
                reader.readAsBinaryString(file);
            };

            const downloadExcel = () => {
                const XLSX = window.XLSX;
                const exportData = data.filter((_, i) => selectedRows.has(i));
                // สร้าง worksheet จาก JSON โดยระบุลำดับ headers ที่เป๊ะที่สุด
                const ws = XLSX.utils.json_to_sheet(exportData, { header: headersForExport });
                
                // ตรวจสอบและตั้งค่าประเภทข้อมูลใน Cell ให้เป็นแบบ 's' (string) สำหรับคอลัมน์ที่เป็นหัวข้อ
                // เพื่อให้ระบบปลายทางไม่งงกับประเภทข้อมูล
                const range = XLSX.utils.decode_range(ws['!ref']);
                for (let C = range.s.c; C <= range.e.c; ++C) {
                    const address = XLSX.utils.encode_col(C) + "1";
                    if (!ws[address]) continue;
                    ws[address].t = 's'; // Force Text Type
                }

                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "Order Template");
                
                // เขียนไฟล์ในรูปแบบ XLSX มาตรฐาน
                XLSX.writeFile(wb, `Flash_Order_Template_${new Date().getTime()}.xlsx`, { bookSST: true, type: 'binary' });
            };

            return (
                <div className="p-4 md:p-8 flex flex-col items-center">
                    <div className="max-w-full w-full bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border border-slate-200">
                        {/* Header */}
                        <div className="bg-yellow-400 p-8 text-center border-b border-yellow-500 shadow-sm">
                            <h1 className="text-3xl font-black text-slate-900 uppercase italic">Flash Converter <span className="text-white drop-shadow-md">PRO</span></h1>
                            <p className="text-yellow-900 font-bold text-sm mt-1 uppercase tracking-widest opacity-80 text-center text-balance">แก้ไขปัญหาหัวตาราง (Excel Native Support) - ไม่ต้องดับเบิลคลิกก่อนใช้</p>
                        </div>

                        {/* Preset Buttons */}
                        <div className="bg-slate-100 px-8 py-4 flex flex-wrap items-center gap-4 border-b border-slate-200">
                            <span className="text-[10px] font-black uppercase text-slate-400 tracking-widest shrink-0">Preset:</span>
                            {productPresets.map((p, idx) => {
                                const isActive = manualOverride && settings.weightPerPiece === p.weight && settings.length === p.length;
                                return (
                                    <div key={idx} className="flex items-center gap-2 bg-white border-2 border-yellow-400 rounded-2xl px-3 py-1.5 shadow-sm">
                                        <button onClick={() => applyPreset(p)}
                                            className={`text-sm font-black shrink-0 transition-all ${isActive ? "text-yellow-500" : "text-slate-700 hover:text-yellow-500"}`}>
                                            {p.label}
                                        </button>
                                        <span className="text-slate-200 text-xs">|</span>
                                        <div className="flex items-center gap-1 text-[11px] text-slate-500 font-bold">
                                            <input type="number" step="0.01" value={p.weight}
                                                onChange={e => updatePreset(p.id, 'weight', parseFloat(e.target.value))}
                                                className="w-10 text-center outline-none bg-transparent border-b border-slate-300 focus:border-yellow-400"
                                                title="น้ำหนัก (กก.)" />
                                            <span className="text-slate-300">kg</span>
                                            <span className="text-slate-300 mx-0.5">|</span>
                                            <input type="number" value={p.width}
                                                onChange={e => updatePreset(p.id, 'width', parseInt(e.target.value))}
                                                className="w-8 text-center outline-none bg-transparent border-b border-slate-300 focus:border-yellow-400"
                                                title="กว้าง (ซม.)" />
                                            <span className="text-slate-300">×</span>
                                            <input type="number" value={p.length}
                                                onChange={e => updatePreset(p.id, 'length', parseInt(e.target.value))}
                                                className="w-8 text-center outline-none bg-transparent border-b border-slate-300 focus:border-yellow-400"
                                                title="ยาว (ซม.)" />
                                            <span className="text-slate-300">×</span>
                                            <input type="number" value={p.height}
                                                onChange={e => updatePreset(p.id, 'height', parseInt(e.target.value))}
                                                className="w-8 text-center outline-none bg-transparent border-b border-slate-300 focus:border-yellow-400"
                                                title="สูง/ชิ้น (ซม.)" />
                                            <span className="text-slate-300">cm</span>
                                        </div>
                                    </div>
                                );
                            })}
                            {manualOverride && (
                                <button onClick={clearOverride}
                                    className="px-4 py-1.5 rounded-full text-sm font-bold border-2 border-slate-400 bg-white text-slate-500 hover:bg-slate-200 transition-all shadow-sm flex items-center gap-1">
                                    <span>✕</span> Auto
                                </button>
                            )}
                        </div>

                        {/* Settings */}
                        <div className="bg-slate-50 p-8 grid grid-cols-2 md:grid-cols-4 gap-6 border-b border-slate-200 shadow-inner">
                            <div className="bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
                                <label className="block text-[10px] text-slate-400 font-black uppercase mb-1">น้ำหนัก / ชิ้น (กก.)</label>
                                <input type="number" step="0.01" value={settings.weightPerPiece} onChange={e => setSettings({...settings, weightPerPiece: parseFloat(e.target.value)})} className="w-full text-lg font-bold outline-none text-slate-700"/>
                            </div>
                            <div className="bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
                                <label className="block text-[10px] text-slate-400 font-black uppercase mb-1">ส่วนสูง / ชิ้น (ซม.)</label>
                                <input type="number" value={settings.heightPerPiece} onChange={e => setSettings({...settings, heightPerPiece: parseInt(e.target.value)})} className="w-full text-lg font-bold outline-none text-slate-700"/>
                            </div>
                            <div className="bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
                                <label className="block text-[10px] text-slate-400 font-black uppercase mb-1">ขนาด (กว้าง x ยาว)</label>
                                <div className="flex items-center gap-2 font-bold text-slate-700">
                                    <input type="number" value={settings.width} onChange={e => setSettings({...settings, width: parseInt(e.target.value)})} className="w-full outline-none"/>
                                    <span className="text-slate-300">x</span>
                                    <input type="number" value={settings.length} onChange={e => setSettings({...settings, length: parseInt(e.target.value)})} className="w-full outline-none"/>
                                </div>
                            </div>
                            <div className="bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
                                <label className="block text-[10px] text-slate-400 font-black mb-2 uppercase">รูปแบบขนส่ง</label>
                                <select value={settings.productType} onChange={e => setSettings({...settings, productType: e.target.value})} className="w-full font-bold outline-none text-slate-700 bg-transparent">
                                    <option value="Standard">Standard</option>
                                    <option value="Bulky">Bulky</option>
                                    <option value="Fruit Express">Fruit Express</option>
                                </select>
                            </div>
                        </div>

                        <div className="p-8">
                            {status === "idle" && (
                                <div onClick={() => fileInputRef.current.click()} className="border-4 border-dashed border-slate-200 rounded-[3rem] p-24 text-center hover:border-yellow-400 hover:bg-yellow-50/50 transition-all cursor-pointer group shadow-inner">
                                    <input type="file" ref={fileInputRef} onChange={handleFileUpload} className="hidden" accept=".xlsx,.xls,.csv"/>
                                    <h3 className="text-slate-800 font-black text-2xl tracking-tighter uppercase">อัปโหลดไฟล์ที่นี่</h3>
                                    <p className="text-slate-400 text-sm font-medium mt-2">ไฟล์ที่ดาวน์โหลดจะได้รับการปรับปรุง Format ให้ระบบ Portal อ่านได้ทันที</p>
                                </div>
                            )}

                            {status === "success" && (
                                <div className="animate-in fade-in slide-in-from-bottom-8 duration-700 space-y-6">
                                    <div className="flex flex-col lg:flex-row items-center gap-8 bg-slate-900 rounded-[2.5rem] p-10 shadow-2xl relative overflow-hidden sticky top-4 z-50">
                                        <div className="absolute top-0 right-0 w-64 h-64 bg-yellow-400/10 rounded-full blur-3xl -mr-20 -mt-20"></div>
                                        <div className="text-center lg:text-left flex-1 z-10 text-white">
                                            <h3 className="font-black text-3xl tracking-tight mb-1 uppercase italic">Excel Updated!</h3>
                                            <p className="text-slate-400 font-bold text-xs uppercase tracking-widest">ข้อมูลได้รับการปรับปรุง Header Format ให้เป็นมาตรฐาน Excel แท้</p>
                                        </div>
                                        <div className="flex flex-col sm:flex-row gap-4 w-full lg:w-auto z-10">
                                            <button onClick={downloadExcel} className="bg-yellow-400 text-slate-900 px-12 py-5 rounded-[1.5rem] font-black flex items-center justify-center gap-3 hover:bg-yellow-300 transition-all shadow-xl active:scale-95 text-lg uppercase">
                                                DOWNLOAD EXCEL
                                                {selectedRows.size < data.length && (
                                                    <span className="bg-slate-900 text-yellow-400 text-xs font-black px-2 py-0.5 rounded-full">{selectedRows.size}/{data.length}</span>
                                                )}
                                            </button>
                                            <button onClick={() => setStatus("idle")} className="bg-white/5 border-2 border-white/10 text-white px-8 py-5 rounded-[1.5rem] font-black hover:bg-white/10 transition-all">
                                                รีเซ็ต
                                            </button>
                                        </div>
                                    </div>

                                    {/* Top Scroll */}
                                    <div ref={topScrollRef} onScroll={() => handleScrollSync('top')} className="overflow-x-auto h-3 bg-slate-200 rounded-full mb-2 border border-slate-300">
                                        <div style={{ width: totalTableWidth, height: '1px' }}></div>
                                    </div>

                                    {/* Table */}
                                    <div className="bg-white rounded-[2.5rem] border border-slate-200 shadow-inner overflow-hidden relative">
                                        <div ref={tableContainerRef} onScroll={() => handleScrollSync('table')} onMouseDown={handleMouseDown} className="overflow-x-auto grab-cursor">
                                            <table className="text-left border-collapse table-fixed select-none" style={{ width: totalTableWidth }}>
                                                <thead className="bg-slate-800 text-white text-[10px] font-black uppercase tracking-tighter sticky top-0 z-40">
                                                    <tr>
                                                        <th className="p-4 sticky left-0 z-50 bg-slate-950 border-r-2 border-slate-600 text-center" style={{ width: colWidths[0] }}>
                                                            <div className="flex flex-col items-center gap-1">
                                                                <input type="checkbox"
                                                                    checked={data && selectedRows.size === data.length}
                                                                    onChange={e => setSelectedRows(e.target.checked ? new Set(data.map((_,i)=>i)) : new Set())}
                                                                    className="w-4 h-4 accent-yellow-400 cursor-pointer"
                                                                />
                                                                <span className="text-[9px] text-slate-400 uppercase tracking-widest">ทั้งหมด</span>
                                                            </div>
                                                            <div onMouseDown={(e) => onResizeStart(0, e)} className="resize-handle" />
                                                        </th>
                                                        {headersForExport.map((h, i) => {
                                                            const colIdx = i + 1;
                                                            let stickyStyle = {};
                                                            let borderClass = "";
                                                            let bgClass = "bg-slate-800";
                                                            if (i === 0) {
                                                                stickyStyle = { position: 'sticky', left: colWidths[0], zIndex: 50 };
                                                                bgClass = "bg-slate-900";
                                                                borderClass = "border-r-2 border-slate-600";
                                                            } else if (i === 1) {
                                                                stickyStyle = { position: 'sticky', left: colWidths[0] + colWidths[1], zIndex: 50 };
                                                                bgClass = "bg-slate-900";
                                                                borderClass = "border-r-2 border-slate-400 shadow-[4px_0_8px_-4px_rgba(0,0,0,0.3)]";
                                                            }
                                                            return (
                                                                <th key={i} className={`p-4 whitespace-pre relative ${bgClass} ${borderClass}`} style={{ width: colWidths[colIdx], ...stickyStyle }}>
                                                                    {h}
                                                                    <div onMouseDown={(e) => onResizeStart(colIdx, e)} className="resize-handle" />
                                                                </th>
                                                            );
                                                        })}
                                                    </tr>
                                                </thead>
                                                <tbody className="text-xs">
                                                    {data.map((row, rowIndex) => {
                                                        const isEven = rowIndex % 2 === 0;
                                                        const frozenBg = isEven ? "bg-slate-100" : "bg-slate-200";
                                                        return (
                                                            <tr key={rowIndex} className={`${isEven ? 'bg-white' : 'bg-slate-50'} border-b hover:bg-yellow-50 transition-colors group`}>
                                                                <td className={`p-2 text-center border-r-2 border-slate-200 sticky left-0 z-10 ${frozenBg} group-hover:bg-yellow-100`}>
                                                                    <div className="flex flex-col items-center gap-1">
                                                                        <input type="checkbox"
                                                                            checked={selectedRows.has(rowIndex)}
                                                                            onChange={e => {
                                                                                const next = new Set(selectedRows);
                                                                                e.target.checked ? next.add(rowIndex) : next.delete(rowIndex);
                                                                                setSelectedRows(next);
                                                                            }}
                                                                            className="w-4 h-4 accent-yellow-400 cursor-pointer"
                                                                        />
                                                                        <span className="text-[10px] font-black text-slate-400">{rowIndex + 1}</span>
                                                                    </div>
                                                                </td>
                                                                {headersForExport.map((h, i) => {
                                                                    let stickyStyle = {};
                                                                    let borderClass = "border-r border-slate-100";
                                                                    let currentCellBg = isEven ? "bg-white" : "bg-slate-50";
                                                                    if (i === 0) {
                                                                        stickyStyle = { position: 'sticky', left: colWidths[0], zIndex: 10 };
                                                                        borderClass = "border-r-2 border-slate-200";
                                                                        currentCellBg = frozenBg;
                                                                    } else if (i === 1) {
                                                                        stickyStyle = { position: 'sticky', left: colWidths[0] + colWidths[1], zIndex: 10 };
                                                                        borderClass = "border-r-2 border-slate-300 shadow-[4px_0_8px_-4px_rgba(0,0,0,0.1)]";
                                                                        currentCellBg = frozenBg;
                                                                    }
                                                                    const content = String(row[h] ?? "");
                                                                    const lineCount = content.split('\n').length;
                                                                    const dynamicRows = i === 0 ? Math.max(1, Math.min(lineCount, 8)) : (i === 2 || i === 15 ? 2 : 1);
                                                                    return (
                                                                        <td key={i} className={`p-1 ${borderClass} ${currentCellBg} group-hover:bg-yellow-100`} style={stickyStyle}>
                                                                            <textarea 
                                                                                value={content} 
                                                                                onChange={(e) => {
                                                                                    const newData = [...data];
                                                                                    newData[rowIndex][h] = e.target.value;
                                                                                    setData(newData);
                                                                                }}
                                                                                rows={i === 15 ? 1 : dynamicRows}
                                                                                className={`w-full bg-transparent p-1 outline-none focus:bg-white rounded-lg resize-none font-medium text-slate-600 transition-all group-hover:text-slate-900 ${i === 0 || i === 15 ? "font-bold" : ""} ${i === 15 ? "whitespace-nowrap overflow-x-auto" : ""}`}
                                                                                style={i === 15 ? { overflowWrap: 'normal', overflowX: 'auto' } : {}}
                                                                            />
                                                                        </td>
                                                                    );
                                                                })}
                                                            </tr>
                                                        );
                                                    })}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        setTimeout(() => { if(window.lucide) window.lucide.createIcons(); }, 500);
    </script>
</body>
</html>
