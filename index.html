    </div>
  </div>
</div>`,

    init: async (user, profile, db, APP_ID) => {
        const { collection, doc, addDoc, onSnapshot, query, where, orderBy, updateDoc }
            = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js");

        let allReqs = [], activeTab = 'explain', selectedType = 'explain';

        const unsub = onSnapshot(
            query(collection(db,'artifacts',APP_ID,'public','data','time_requests'),
                  where('uid','==',user.uid), orderBy('createdAt','desc')),
            snap => { allReqs = snap.docs.map(d=>({id:d.id,...d.data()})); renderList(); }
        );

        function renderList() {
            const el = document.getElementById('tr-list'); if(!el) return;
            const filtered = allReqs.filter(r => r.reqType === activeTab);
            if (!filtered.length) {
                el.innerHTML = `<div class="text-center py-16 text-zinc-300"><i class="fa-regular fa-calendar-xmark text-5xl mb-3"></i><p class="font-bold text-sm">ยังไม่มีคำขอ</p></div>`; return;
            }
            const ST = { pending:{label:'รออนุมัติ',cls:'bg-yellow-100 text-yellow-800 border border-yellow-200',icon:'fa-clock'},
                         approved:{label:'อนุมัติแล้ว',cls:'bg-green-100 text-green-800 border border-green-200',icon:'fa-circle-check'},
                         rejected:{label:'ไม่อนุมัติ',cls:'bg-red-100 text-red-700 border border-red-200',icon:'fa-circle-xmark'} };
            el.innerHTML = filtered.map(r => {
                const st = ST[r.status]||ST.pending;
                const timeStr = r.reqType === 'explain'
                    ? `เข้า ${r.timeIn||'-'} · ออก ${r.timeOut||'-'}`
                    : `เดิม ${r.origIn||'-'}/${r.origOut||'-'} → ใหม่ ${r.timeIn||'-'}/${r.timeOut||'-'}`;
                return `<div class="tr-card bg-white rounded-2xl border border-zinc-200 p-5 flex flex-col sm:flex-row sm:items-center gap-4">
                  <div class="w-12 h-12 rounded-2xl bg-zinc-100 flex items-center justify-center shrink-0">
                    <i class="fa-solid ${r.reqType==='explain'?'fa-comment-dots text-yellow-500':'fa-pen-to-square text-blue-500'} text-lg"></i>
                  </div>
                  <div class="flex-1 min-w-0">
                    <div class="flex flex-wrap items-center gap-2 mb-1">
                      <span class="font-black text-zinc-800 text-sm">${r.reqType==='explain'?'ชี้แจงไม่ได้บันทึก':'ขอแก้ไขเวลา'}</span>
                      <span class="text-[10px] font-black px-2.5 py-1 rounded-full ${st.cls}"><i class="fa-solid ${st.icon} mr-1"></i>${st.label}</span>
                    </div>
                    <p class="text-sm text-zinc-600 font-medium">${r.date} · ${timeStr}</p>
                    <p class="text-xs text-zinc-400 truncate mt-0.5">${r.reason}</p>
                    ${r.approverNote ? `<p class="text-xs text-red-500 mt-1 font-bold"><i class="fa-solid fa-comment mr-1"></i>${r.approverNote}</p>` : ''}
                  </div>
                  ${r.status==='pending' ? `<button onclick="trCancel('${r.id}')" class="shrink-0 text-[10px] text-red-500 font-black bg-red-50 hover:bg-red-100 px-3 py-1.5 rounded-lg transition-all">ยกเลิก</button>` : ''}
                </div>`;
            }).join('');
        }

        window.trTab = (tab) => {
            activeTab = tab;
            document.querySelectorAll('.tr-tab').forEach((b,i) => {
                const isA = (i===0&&tab==='explain')||(i===1&&tab==='fix');
                b.classList.toggle('active', isA);
                b.classList.toggle('text-zinc-500', !isA);
            });
            renderList();
        };

        window.trSetType = (t) => {
            selectedType = t;
            document.getElementById('tr-type-explain')?.classList.toggle('border-yellow-500', t==='explain');
            document.getElementById('tr-type-explain')?.classList.toggle('bg-yellow-50', t==='explain');
            document.getElementById('tr-type-explain')?.classList.toggle('border-zinc-200', t!=='explain');
            document.getElementById('tr-type-fix')?.classList.toggle('border-yellow-500', t==='fix');
            document.getElementById('tr-type-fix')?.classList.toggle('bg-yellow-50', t==='fix');
            document.getElementById('tr-type-fix')?.classList.toggle('border-zinc-200', t!=='fix');
            document.getElementById('tr-original-section')?.classList.toggle('hidden', t!=='fix');
        };

        window.trOpenModal = (prefill) => {
            selectedType = 'explain';
            trSetType('explain');
            const today = todayTH();
            const d = document.getElementById('tr-date'); if(d) d.value = prefill?.date || today;
            ['tr-time-in','tr-time-out','tr-orig-in','tr-orig-out','tr-reason'].forEach(id => {
                const el = document.getElementById(id); if(el) el.value = '';
            });
            document.getElementById('tr-modal')?.classList.remove('hidden');
        };
        window.trCloseModal = () => document.getElementById('tr-modal')?.classList.add('hidden');

        window.trSubmit = async () => {
            const date   = document.getElementById('tr-date')?.value;
            const timeIn = document.getElementById('tr-time-in')?.value;
            const timeOut= document.getElementById('tr-time-out')?.value;
            const reason = document.getElementById('tr-reason')?.value.trim();
            if (!date || !reason) { showToast('กรุณากรอกข้อมูลให้ครบ', 'error'); return; }
            const btn = document.getElementById('tr-submit-btn');
            btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i>';
            try {
                await addDoc(collection(db,'artifacts',APP_ID,'public','data','time_requests'), {
                    uid: user.uid, employeeName: profile.name, employeeCode: profile.employeeCode||'',
                    branch: profile.branch||'', photoURL: profile.photoURL||'',
                    reqType: selectedType, date, timeIn: timeIn||'', timeOut: timeOut||'',
                    origIn: document.getElementById('tr-orig-in')?.value||'',
                    origOut: document.getElementById('tr-orig-out')?.value||'',
                    reason, status: 'pending', createdAt: new Date().toISOString(),
                });
                showToast('✅ ส่งคำขอเรียบร้อย', 'success');
                trCloseModal();
            } catch(e) { showToast('❌ '+e.message, 'error'); }
            finally { btn.disabled=false; btn.innerHTML='<i class="fa-solid fa-paper-plane mr-2"></i> ส่งคำขอ'; }
        };

        window.trCancel = async (id) => {
            if (!confirm('ยกเลิกคำขอนี้?')) return;
            try {
                await updateDoc(doc(db,'artifacts',APP_ID,'public','data','time_requests',id),
                    { status:'cancelled', cancelledAt: new Date().toISOString() });
                showToast('ยกเลิกแล้ว','info');
            } catch(e) { showToast('❌ '+e.message,'error'); }
        };

        renderList();
        return () => {
            unsub();
            ['trTab','trSetType','trOpenModal','trCloseModal','trSubmit','trCancel'].forEach(k=>delete window[k]);
        };
    }
};

        function updateStats() {

            const setT = (id,v) => { const e=document.getElementById(id); if(e) e.textContent=v; };
            setT('ta-stat-p', s('pending')); setT('ta-stat-a', s('approved')); setT('ta-stat-r', s('rejected'));
        }

        window.taFilter = () => {
            const f = document.getElementById('ta-filter')?.value||'pending';
            const list = f==='all' ? allReqs : allReqs.filter(r=>r.status===f);
            renderList(list);
        };

        function renderList(list) {

                         approved:{label:'อนุมัติแล้ว',cls:'bg-green-100 text-green-800 border border-green-200',icon:'fa-circle-check'},
                         rejected:{label:'ไม่อนุมัติ',cls:'bg-red-100 text-red-700 border border-red-200',icon:'fa-circle-xmark'},

                    </div>
                    ${isPending ? `<div class="flex lg:flex-col gap-2 shrink-0 justify-end">
                      <button onclick="taOpenAction('${r.id}','approve')" class="inline-flex items-center gap-2 bg-green-500 hover:bg-green-400 text-white font-black px-5 py-2.5 rounded-xl text-xs uppercase tracking-widest transition-all shadow-sm">

                    status: action==='approve' ? 'approved' : 'rejected',
                    approvedBy: profile.name, approvedAt: new Date().toISOString(), approverNote: note||'',
                });
                // ถ้าอนุมัติ → สร้าง time_log จริงใน Firestore
                if (action==='approve' && r) {
                    const logsToCreate = [];
                    if (r.timeIn) logsToCreate.push({ type:'clock_in',  time: r.timeIn });
                    if (r.timeOut) logsToCreate.push({ type:'clock_out', time: r.timeOut });
                    for (const entry of logsToCreate) {
                        const ts = new Date(`${r.date}T${entry.time}:00`).toISOString();
                        await addDoc(collection(db,'artifacts',APP_ID,'public','data','time_logs'), {
                            uid: r.uid, type: entry.type,
                            timestamp: ts, localDate: r.date,
                            note: `[${r.reqType==='explain'?'ชี้แจง':'แก้ไข'}] อนุมัติโดย ${profile.name}`,
                            isAdjusted: true, requestId: id,
                        });
                    }
                }
                showToast(action==='approve' ? '✅ อนุมัติแล้ว' : '❌ ไม่อนุมัติ', action==='approve'?'success':'info');
                taCloseAction();
            } catch(e) { showToast('❌ '+e.message,'error'); }
            finally { btn.disabled=false; }
        };

        return () => {
            unsub();
            ['taFilter','taOpenAction','taCloseAction','taConfirm'].forEach(k=>delete window[k]);
        };
    }
};

    init: async (user, profile, db, APP_ID) => {
        if (profile.role !== 'admin') { navigateTo('home'); return; }
        const { collection, doc, addDoc, getDocs, onSnapshot, query, orderBy, where, limit }
            = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js");

        let employees = [], csvData = [];

        // โหลดรายชื่อพนักงาน
        const empSnap = await getDocs(collection(db,'artifacts',APP_ID,'public','data','users'));
        employees = empSnap.docs.map(d=>d.data()).filter(e=>e.uid);
        const sel = document.getElementById('ti-emp');
        if (sel) {
            employees.sort((a,b)=>a.name.localeCompare(b.name,'th')).forEach(e => {
                const opt = document.createElement('option');
                opt.value = e.uid;
                opt.textContent = `${e.name} (${e.employeeCode||''})`;
                sel.appendChild(opt);
            });
        }

        // ตั้งวันที่เริ่มต้นเป็นวันนี้
        const ti = document.getElementById('ti-date');
        if (ti) ti.value = todayTH();

        // Recent imports listener
        const unsub = onSnapshot(
            query(collection(db,'artifacts',APP_ID,'public','data','time_logs'),
                  where('isImported','==',true), orderBy('importedAt','desc'), limit(50)),
            snap => {
                const logs = snap.docs.map(d=>({id:d.id,...d.data()}));
                const cnt = document.getElementById('ti-log-count');
                if (cnt) cnt.textContent = logs.length + ' รายการ';
                const el = document.getElementById('ti-log-list');
                if (!el) return;
                if (!logs.length) { el.innerHTML='<div class="p-6 text-center text-zinc-400 text-sm">ยังไม่มีรายการ</div>'; return; }
                el.innerHTML = logs.map(l => {
                    const emp = employees.find(e=>e.uid===l.uid);
                    return `<div class="flex items-center gap-4 px-5 py-3">
                      <div class="w-8 h-8 rounded-lg ${l.type==='clock_in'?'bg-green-100':'bg-red-100'} flex items-center justify-center shrink-0">
                        <i class="fa-solid ${l.type==='clock_in'?'fa-right-to-bracket text-green-600':'fa-right-from-bracket text-red-500'} text-xs"></i>
                      </div>
                      <div class="flex-1 min-w-0">
                        <p class="font-bold text-zinc-800 text-xs truncate">${emp?.name||l.uid}</p>
                        <p class="text-[10px] text-zinc-400">${l.localDate} · ${l.timestamp ? new Date(l.timestamp).toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit',timeZone:'Asia/Bangkok'}) : ''} · ${l.note||''}</p>
                      </div>
                      <span class="text-[10px] font-black text-zinc-400 bg-zinc-100 px-2 py-0.5 rounded-full">${l.importedBy||'Admin'}</span>
                    </div>`;
                }).join('');
            }
        );

        window.tiSaveOne = async () => {
            const uid  = document.getElementById('ti-emp')?.value;
            const date = document.getElementById('ti-date')?.value;
            const tin  = document.getElementById('ti-in')?.value;
            const tout = document.getElementById('ti-out')?.value;
            const note = document.getElementById('ti-note')?.value || 'นำเข้าโดย Admin';
            if (!uid || !date) { showToast('กรุณาเลือกพนักงานและวันที่', 'error'); return; }
            if (!tin && !tout) { showToast('กรุณาใส่เวลาอย่างน้อย 1 รายการ', 'error'); return; }
            const btn = document.getElementById('ti-save-btn');
            btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i>';
            try {
                const toImport = [];
                if (tin)  toImport.push({ type:'clock_in',  time: tin });
                if (tout) toImport.push({ type:'clock_out', time: tout });
                for (const e of toImport) {
                    const ts = new Date(`${date}T${e.time}:00`).toISOString();
                    await addDoc(collection(db,'artifacts',APP_ID,'public','data','time_logs'), {
                        uid, type: e.type, timestamp: ts, localDate: date,
                        note, isImported: true, importedBy: profile.name,
                        importedAt: new Date().toISOString(),
                    });
                }
                showToast(`✅ นำเข้า ${toImport.length} รายการสำเร็จ`, 'success');
                document.getElementById('ti-in').value = '';
                document.getElementById('ti-out').value = '';
                document.getElementById('ti-note').value = '';
            } catch(e) { showToast('❌ '+e.message,'error'); }
            finally { btn.disabled=false; btn.innerHTML='<i class="fa-solid fa-plus mr-2"></i> เพิ่มรายการ'; }
        };

        window.tiParseCSV = (input) => {
            const file = input.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                // แก้: ใช้ /\r?\n/ แทน '\n' เพื่อรองรับ Windows CSV ที่ใช้ \r\n
                const lines = e.target.result.split(/\r?\n/).filter(l => l.trim());
                csvData = [];
                const rows = [];
                lines.slice(1).forEach((line) => {
                    // แก้: trim แต่ละ field เพื่อกำจัด \r ที่อาจติดมาจาก Windows
                    const parts = line.split(',').map(s => s.trim().replace(/"/g,''));
                    const [code, date, timeIn, timeOut, note] = parts;
                    if (!code || !date) return;
                    const emp = employees.find(e => e.employeeCode === code || e.uid === code);
                    const status = emp ? '✅ พบ' : '❌ ไม่พบ';
                    csvData.push({
                        uid: emp?.uid, code, date,
                        timeIn:  timeIn  || '',
                        timeOut: timeOut || '',
                        note: note || 'Import CSV',
                        found: !!emp
                    });
                    rows.push(`<tr class="border-b border-zinc-100 ${!emp?'bg-red-50':''}">
                      <td class="px-3 py-2 font-bold">${code}</td>
                      <td class="px-3 py-2">${date}</td>
                      <td class="px-3 py-2">${timeIn||'-'}</td>
                      <td class="px-3 py-2">${timeOut||'-'}</td>
                      <td class="px-3 py-2">${status}</td>
                    </tr>`);
                });
                document.getElementById('ti-csv-rows').innerHTML = rows.join('');
                document.getElementById('ti-csv-count').textContent =
                    `พบ ${csvData.length} แถว (พนักงานที่รู้จัก ${csvData.filter(r=>r.found).length} คน)`;
                document.getElementById('ti-import-count').textContent = csvData.filter(r=>r.found).length;
                document.getElementById('ti-csv-preview').classList.remove('hidden');
            };
            reader.readAsText(file, 'UTF-8');
        };

        window.tiImportCSV = async () => {
            const valid = csvData.filter(r => r.found);
            if (!valid.length) { showToast('ไม่มีรายการที่นำเข้าได้', 'error'); return; }
            const btn = document.getElementById('ti-import-btn');
            btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> กำลังนำเข้า...';
            try {
                let count = 0;
                for (const row of valid) {
                    const toAdd = [];
                    if (row.timeIn)  toAdd.push({ type:'clock_in',  time: row.timeIn });
                    if (row.timeOut) toAdd.push({ type:'clock_out', time: row.timeOut });
                    for (const e of toAdd) {
                        const ts = new Date(`${row.date}T${e.time}:00`).toISOString();
                        await addDoc(collection(db,'artifacts',APP_ID,'public','data','time_logs'), {
                            uid: row.uid, type: e.type, timestamp: ts, localDate: row.date,
                            note: row.note, isImported: true, importedBy: profile.name,
                            importedAt: new Date().toISOString(),
                        });
                        count++;
                    }
                }
                showToast(`✅ นำเข้า ${count} รายการสำเร็จ`, 'success');
                document.getElementById('ti-csv-preview').classList.add('hidden');
                csvData = [];
            } catch(e) { showToast('❌ '+e.message,'error'); }
            finally { btn.disabled=false; btn.innerHTML='<i class="fa-solid fa-bolt mr-2"></i> นำเข้า'; }
        };

        window.tiDownloadTemplate = () => {
            const csv = 'employee_code,date,time_in,time_out,note\nEMP001,2025-03-01,08:05,17:30,import\nEMP002,2025-03-01,08:10,17:45,\n';
            const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8;'});
            const a = Object.assign(document.createElement('a'), {
                href: URL.createObjectURL(blob),
                download: 'time_import_template.csv'
            });
            a.click();
        };

        return () => {
            unsub();
            ['tiSaveOne','tiParseCSV','tiImportCSV','tiDownloadTemplate'].forEach(k => delete window[k]);
        };
    }
};

                    async function loadHistory() {

                        if (!list) return;
                        try {
                            const hSnap = await getDocs(query(
                                collection(db,'artifacts',APP_ID,'public','data','ot_requests'),
                                where('uid','==',user.uid)
                            ));
                            const listOut = document.getElementById('ot-history-list-out');
                            if (hSnap.empty) {
                                const emptyHtml = '<div class="text-center py-8 text-zinc-300 text-sm font-bold">ยังไม่มีประวัติการยื่น OT</div>';
                                if (list) list.innerHTML = emptyHtml;
                                if (listOut) listOut.innerHTML = emptyHtml;
                                document.getElementById('ot-history-outside').classList.remove('hidden');
                                return;
                            }
                            const stMap = { draft:'Draft', pending:'รอนุมัติ', approved:'✅ อนุมัติแล้ว', rejected:'❌ ไม่อนุมัติ' };
                            const stCls = { draft:'ot-status-draft', pending:'ot-status-pending', approved:'ot-status-approved', rejected:'ot-status-rejected' };
                            const sorted = hSnap.docs.map(d => ({id:d.id,...d.data()}))
                                .sort((a,b) => (b.createdAt||'').localeCompare(a.createdAt||''));
                            const histHtml = sorted.map(r => `
                                <div class="ot-hist-card flex items-start gap-3">
                                    <div class="flex-1 min-w-0">
                                        <div class="flex items-center gap-2 flex-wrap mb-0.5">
                                            <p class="font-black text-zinc-800 text-sm">${r.periodLabel||r.periodId}</p>
                                            <span class="text-[10px] font-black px-2.5 py-1 rounded-lg ${stCls[r.status]||'ot-status-draft'}">${stMap[r.status]||r.status}</span>
                                        </div>
                                        <div class="flex flex-wrap gap-x-3 gap-y-0.5 text-xs text-zinc-500 mt-1">
                                            <span><i class="fa-solid fa-clock text-yellow-500 mr-1"></i>OT: <b>${(r.otConverted||0).toFixed(2)} ชม.</b></span>
                                            <span><i class="fa-solid fa-coins text-green-500 mr-1"></i>Commission: <b>฿${(r.commTotal||0).toLocaleString()}</b></span>
                                        </div>
                                        ${r.managerNote ? `<p class="text-xs text-red-500 mt-1.5 italic bg-red-50 px-2 py-1 rounded-lg">"${r.managerNote}"</p>` : ''}
                                    </div>
                                    <p class="text-[10px] text-zinc-400 whitespace-nowrap flex-shrink-0 pt-0.5">${r.createdAt ? new Date(r.createdAt).toLocaleDateString('th-TH',{day:'numeric',month:'short',year:'2-digit',timeZone:'Asia/Bangkok'}) : ''}</p>
                                </div>`).join('');
                            if (list) list.innerHTML = histHtml;
                            const listOut2 = document.getElementById('ot-history-list-out');
                            if (listOut2) listOut2.innerHTML = histHtml;
                            document.getElementById('ot-history-outside').classList.remove('hidden');
                        } catch(e) {
                            const errHtml = '<div class="text-center py-6 text-zinc-400 text-xs">ไม่สามารถโหลดประวัติได้</div>';
                            if (list) list.innerHTML = errHtml;
                            const listOutErr = document.getElementById('ot-history-list-out');
                            if (listOutErr) listOutErr.innerHTML = errHtml;
                        }
                    }
                    loadHistory();
                    document.getElementById('ot-history-outside').classList.remove('hidden');

                    // ─── Load period data ──────────────────────────────────
                    window.otLoadPeriod = async () => {
                        const pid = document.getElementById('ot-period-sel').value;
                        if (!pid) return;
                        document.getElementById('ot-table-wrap').classList.add('hidden');
                        document.getElementById('ot-claim-status-bar').classList.add('hidden');
                        document.getElementById('ot-sticky-bar').style.display = 'none';
                        selectedDays = {};
                        // แสดง loading indicator ในพื้นที่ grid
                        const gridEl = document.getElementById('ot-day-grid');
                        if (gridEl) gridEl.innerHTML = '<div class="text-center py-8 text-zinc-400"><i class="fa-solid fa-spinner fa-spin text-2xl"></i></div>';
                        try {

                        const pSnap = await getDoc(doc(db,'artifacts',APP_ID,'public','data','payroll_periods',pid));
                        if (!pSnap.exists()) return;
                        currentPeriod = { id: pid, ...pSnap.data() };

                        // ตรวจว่ายื่นแล้ว
                        const exSnap = await getDocs(query(
                            collection(db,'artifacts',APP_ID,'public','data','ot_requests'),
                            where('uid','==',user.uid), where('periodId','==',pid), limit(1)
                        ));
                        otRequest = exSnap.empty ? null : { id: exSnap.docs[0].id, ...exSnap.docs[0].data() };
                        isLocked = otRequest?.status === 'approved' || otRequest?.status === 'pending';

                        // โหลด time_logs — ไม่ใช้ orderBy เพื่อหลีกเลี่ยง composite index
                        const tSnap = await getDocs(query(
                            collection(db,'artifacts',APP_ID,'public','data','time_logs'),
                            where('uid','==',user.uid)
                        ));
                        const dayMap = {};
                        tSnap.forEach(d => {
                            const t = d.data();
                            // รองรับทั้ง field: timestamp (ISO) และ localDate (YYYY-MM-DD จาก time_requests approved)
                            const ts  = t.timestamp || '';
                            const day = t.localDate || (ts ? dateToTHStr(new Date(ts)) : '');
                            if (!day || day < currentPeriod.startDate || day > currentPeriod.endDate) return;
                            if (!dayMap[day]) dayMap[day] = { in:null, out:null };
                            // ใช้ timestamp จริงในการเปรียบเทียบ earliest/latest
                            const tsNorm = ts || (day + 'T00:00:00.000+07:00');
                            if (t.type==='clock_in'  && (!dayMap[day].in  || tsNorm < dayMap[day].in))  dayMap[day].in  = tsNorm;
                            if (t.type==='clock_out' && (!dayMap[day].out || tsNorm > dayMap[day].out)) dayMap[day].out = tsNorm;
                        });

                        // วันหยุดและชดเชย
                        const holidays = window._publicHolidays || [];
                        const holSet  = new Set(holidays.map(h => h.date));
                        const holName = Object.fromEntries(holidays.map(h => [h.date, h.name]));
                        const compDays = new Set();
                        holidays.forEach(h => {
                            const dow = parseDateTH(h.date).getDay();
                            if (!workDaySet.has(dow)) {
                                let next = parseDateTH(h.date);
                                for (let i=1;i<=7;i++) {
                                    next.setDate(next.getDate()+1);
                                    const ns = dateToTHStr(next);
                                    if (workDaySet.has(next.getDay()) && !holSet.has(ns)) { compDays.add(ns); break; }
                                }
                            }
                        });

                        // สร้าง allDays — ทุกวันทำงาน (workDay) + วันหยุด + ชดเชย ในงวด
                        // แสดงทุกวัน รวมวันที่ไม่มีบันทึก เพื่อให้พนักงานชี้แจง
                        allDays = [];
                        // ใช้ dateToTHStr (UTC+7) เสมอ ไม่ขึ้นกับ timezone ของ device
                        const localDateStr = (d) => dateToTHStr(d);
                        const todayStr = todayTH();
                        // parse startDate/endDate ด้วย parseDateTH (noon +07:00) ป้องกัน DST shift
                        let cur  = parseDateTH(currentPeriod.startDate);
                        const endD = parseDateTH(currentPeriod.endDate);

                        while (cur <= endD) {
                            const ds  = localDateStr(cur);
                            if (ds > todayStr) { cur.setDate(cur.getDate()+1); continue; }
                            const dow = cur.getDay();
                            const isHol     = holSet.has(ds);
                            const isComp    = compDays.has(ds);
                            const isWeekend = !workDaySet.has(dow);
                            const isWorkDay = workDaySet.has(dow) && !isHol;

                            // แสดงทุกวัน: วันทำงาน + วันหยุดสุดสัปดาห์ + วันหยุดประเพณี + ชดเชย
                            const rec = dayMap[ds];
                            const hasClock = !!rec?.in;
                            let type = 'normal';
                            if (isHol)       type = 'holiday';
                            else if (isComp) type = 'comp';
                            else if (isWeekend) type = 'weekend';

                            allDays.push({
                                day: ds, dow,
                                inTime:  rec?.in  ? (() => { const _d=new Date(rec.in); const h=(_d.getUTCHours()+7)%24; return String(h).padStart(2,'0')+':'+String(_d.getUTCMinutes()).padStart(2,'0'); })() : null,
                                outTime: rec?.out ? (() => { const _d=new Date(rec.out); const h=(_d.getUTCHours()+7)%24; return String(h).padStart(2,'0')+':'+String(_d.getUTCMinutes()).padStart(2,'0'); })() : null,
                                hasClock,
                                type,
                                isWeekend,
                                holName: holName[ds] || '',
                            });
                            cur.setDate(cur.getDate()+1);
                        }

                        // restore จาก otRequest
                        if (otRequest?.rows) {
                            otRequest.rows.forEach(r => {
                                selectedDays[r.date] = { hours: r.rawHours, note: r.note||'' };
                            });
                        }
                        const loaded = otRequest?.commItems ? otRequest.commItems.map(c=>({...c})) : [];
                        window._commRows.length = 0;
                        // ถ้าไม่มีข้อมูลเดิม ใส่ preset Page 365 ให้เลย
                        if (loaded.length === 0) {
                            const defPct = profile.commRate || profile.commission || 0;
                            loaded.push({ desc: 'Page 365', sales: 0, pct: defPct });
                        }
                        loaded.forEach(r => window._commRows.push(r));
                        commRows = window._commRows;

                        renderDayGrid();
                        renderCommUI();
                        document.getElementById('ot-note').value = otRequest?.note || '';

                        // status bar
                        const sb = document.getElementById('ot-claim-status-bar');
                        if (otRequest) {
                            const map = { draft:'📝 Draft — ยังไม่ได้ยื่น', pending:'⏳ รออนุมัติจากหัวหน้า', approved:'✅ อนุมัติแล้ว', rejected:'❌ ไม่อนุมัติ' };
                            const cls = { draft:'bg-zinc-100 text-zinc-700 border border-zinc-200', pending:'bg-yellow-50 text-yellow-800 border border-yellow-200', approved:'bg-green-50 text-green-800 border border-green-200', rejected:'bg-red-50 text-red-800 border border-red-200' };
                            sb.className = `rounded-2xl p-4 text-sm font-bold flex items-center justify-between gap-4 ${cls[otRequest.status]||cls.draft}`;
                            sb.innerHTML = `<span>${map[otRequest.status]||otRequest.status}</span>${otRequest.managerNote?`<span class="text-xs font-medium opacity-70">"${otRequest.managerNote}"</span>`:''}`;
                            sb.classList.remove('hidden');
                        } else sb.classList.add('hidden');

                        document.getElementById('ot-table-wrap').classList.remove('hidden');
                        document.getElementById('ot-sticky-bar').style.display = 'block';
                        document.getElementById('ot-history-outside').classList.add('hidden');
                        } catch(err) {
                            console.error('otLoadPeriod error:', err);
                            const gEl = document.getElementById('ot-day-grid');
                            if (gEl) gEl.innerHTML = `<div class="text-center py-8 text-red-400 text-sm font-medium"><i class="fa-solid fa-circle-exclamation mr-2"></i>โหลดข้อมูลไม่ได้: ${err.message}</div>`;
                            document.getElementById('ot-table-wrap').classList.remove('hidden');
                            document.getElementById('ot-sticky-bar').style.display = 'block';
                        }
                    };

                    // ─── Day grid ──────────────────────────────────────────
                    // ─── Popup ชี้แจงเวลา ───────────────────────────────
                    let explainTargetDay = null;
                    window.otOpenExplain = (dayStr) => {
                        explainTargetDay = dayStr;
                        const d = allDays.find(x => x.day === dayStr);
                        const ws = mySchedule.workStart || '08:00';
                        const we = mySchedule.workEnd   || '17:00';
                        const dateObj = new Date(dayStr + 'T12:00:00+07:00');
                        const dayLabel = dateObj.toLocaleDateString('th-TH', { weekday:'long', year:'numeric', month:'long', day:'numeric', timeZone:'Asia/Bangkok' });
                        document.getElementById('ot-exp-date-label').textContent = dayLabel;
                        document.getElementById('ot-exp-in').value  = d?.inTime  || ws;
                        document.getElementById('ot-exp-out').value = d?.outTime || we;
                        document.getElementById('ot-exp-reason').value = '';
                        document.getElementById('ot-exp-type').value = 'explain';
                        document.getElementById('ot-explain-popup').classList.remove('hidden');
                    };
                    window.otCloseExplain = () => {
                        document.getElementById('ot-explain-popup').classList.add('hidden');
                        explainTargetDay = null;
                    };
                    window.otSubmitExplain = async () => {
                        const timeIn  = document.getElementById('ot-exp-in').value.trim();
                        const timeOut = document.getElementById('ot-exp-out').value.trim();
                        const reason  = document.getElementById('ot-exp-reason').value.trim();
                        const reqType = document.getElementById('ot-exp-type').value;
                        if (!timeIn || !timeOut)  { showToast('⚠️ กรุณากรอกเวลาเข้า-ออกงาน', 'error'); return; }
                        if (!reason)              { showToast('⚠️ กรุณาระบุเหตุผล', 'error'); return; }
                        if (!explainTargetDay)    return;
                        const btn = document.getElementById('ot-exp-submit-btn');
                        btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-1.5"></i>กำลังส่ง...';
                        try {
                            const { addDoc, collection: col2 } = await import('https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js');
                            await addDoc(col2(db, 'artifacts', APP_ID, 'public', 'data', 'time_requests'), {
                                uid: user.uid, employeeName: profile.name, employeeCode: profile.employeeCode||'',
                                branch: profile.branch||'', photoURL: profile.photoURL||'',
                                reqType, date: explainTargetDay,
                                timeIn, timeOut,
                                origIn: '', origOut: '',
                                reason, status: 'pending',
                                createdAt: new Date().toISOString(),
                                source: 'ot-claim',
                            });
                            showToast('✅ ส่งคำขอชี้แจงแล้ว รอหัวหน้าอนุมัติ', 'success');
                            otCloseExplain();
                            // reload หลัง 2 วินาที เพื่อรอ Firestore
                            setTimeout(() => otLoadPeriod(), 2000);
                        } catch(e) {
                            showToast('❌ ' + e.message, 'error');
                        } finally {
                            btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-paper-plane mr-1.5"></i>ส่งขออนุมัติ';
                        }
                    };

                    // ─── Render Day Cards (Mobile-first) ────────────────
                    function renderDayGrid() {
                        const wrap = document.getElementById('ot-day-grid');
                        if (!wrap) return;
                        if (!allDays.length) {
                            wrap.innerHTML = '<div class="text-center py-10 text-zinc-400">ไม่พบวันทำงานในงวดนี้</div>';
                            updateTotals();
                            return;
                        }
                        const hpd = getDayWorkHours(mySchedule);
                        // Remember which cards were expanded before re-render
                        const expanded = new Set(
                            [...document.querySelectorAll('.ot-card.expanded')].map(el => el.dataset.day)
                        );
                        wrap.innerHTML = allDays.map((d, i) => {
                            const sel      = !!selectedDays[d.day];
                            const noRecord = !d.hasClock;
                            const isAutoOT = d.type === 'holiday' || d.type === 'comp' || d.type === 'weekend';
                            const canOT    = !isLocked && d.hasClock;
                            const entry    = selectedDays[d.day] || { hours: 0, note: '' };
                            const mult     = isAutoOT ? 1.5 : 1.0;
                            const hrs      = isAutoOT
                                ? (entry.hoursOverride != null ? entry.hoursOverride : calcAutoOTHours(d.inTime, d.outTime, mySchedule))
                                : (entry.hours || 0);
                            const conv = sel ? hrs * mult : 0;

                            // Card class
                            let cardClass = 'ot-card';
                            if (sel)                                      cardClass += ' sel';
                            else if (noRecord && d.type === 'normal')     cardClass += ' missing';
                            else if (d.type === 'holiday')                cardClass += ' holiday';
                            else if (d.type === 'comp')                   cardClass += ' comp';
                            else if (d.type === 'weekend')                cardClass += ' weekend';
                            if (expanded.has(d.day) || sel)               cardClass += ' expanded';

                            // Day label badges
                            const dayTypeBadge = d.type === 'holiday'
                                ? `<span class="ot-badge ot-badge-holiday">${d.holName||'หยุดนักขัตฤกษ์'}</span>`
                                : d.type === 'comp'
                                ? `<span class="ot-badge ot-badge-comp">วันชดเชย</span>`
                                : d.type === 'weekend'
                                ? `<span class="ot-badge ot-badge-weekend">หยุดประจำสัปดาห์</span>`
                                : '';

                            // Time pills
                            const inPill  = d.inTime
                                ? `<span class="ot-time-pill in-time">${d.inTime}</span>`
                                : `<span class="ot-time-pill text-zinc-400">–</span>`;
                            const outPill = d.outTime
                                ? `<span class="ot-time-pill out-time">${d.outTime}</span>`
                                : `<span class="ot-time-pill text-zinc-400">–</span>`;

                            // Status badge
                            let statusBadge = '';
                            const isOffDay = d.type === 'holiday' || d.type === 'weekend' || d.type === 'comp';
                            if (noRecord && !isOffDay) {
                                statusBadge = `<span class="ot-badge ot-badge-missing">ไม่มีบันทึก</span>`;
                            } else if (d.hasClock) {
                                statusBadge = `<span class="ot-badge ot-badge-ok"><i class="fa-solid fa-check mr-1"></i>บันทึกแล้ว</span>`;
                            }

                            // Checkbox area
                            const checkHtml = canOT
                                ? `<input type="checkbox" class="ot-chk" ${sel?'checked':''} onchange="otToggleDay(${i})" onclick="event.stopPropagation()">`
                                : `<i class="fa-solid fa-lock text-zinc-300 text-sm"></i>`;

                            // OT hours input (inside expanded body)
                            const autoHrs = isAutoOT ? calcAutoOTHours(d.inTime, d.outTime, mySchedule) : null;
                            const displayHrs = isAutoOT
                                ? (entry.hoursOverride != null ? entry.hoursOverride : autoHrs)
                                : hrs;
                            const isOverridden = isAutoOT && entry.hoursOverride != null;
                            const hrsInput = isAutoOT
                                ? `<div class="flex items-center gap-2">
                                    <input type="number" min="0.5" max="24" step="0.5"
                                        value="${displayHrs}"
                                        oninput="otUpdateAutoHours('${d.day}',Number(this.value),${autoHrs})"
                                        class="ot-input-sm w-20 text-center ${isOverridden?'border-amber-400 bg-amber-50':''}"
                                        onclick="event.stopPropagation()">
                                    ${isOverridden
                                        ? `<button onclick="event.stopPropagation();otResetAutoHours('${d.day}')" title="รีเซ็ตเป็นอัตโนมัติ" class="text-amber-500 hover:text-amber-700 text-xs transition-all"><i class="fa-solid fa-rotate-left"></i></button>`
                                        : `<span class="text-[10px] text-zinc-400 font-bold italic">auto</span>`}
                                   </div>`
                                : `<input type="number" min="0.5" max="24" step="0.5"
                                    value="${entry.hours||''}" placeholder="0"
                                    oninput="otUpdateHours('${d.day}',Number(this.value))"
                                    class="ot-input-sm w-24 text-center"
                                    onclick="event.stopPropagation()">`;

                            // Note input
                            const noteInput = `<input type="text" value="${(entry.note||'').replace(/"/g,'&quot;')}"
                                placeholder="${isAutoOT?'หมายเหตุ (ถ้ามี)':'เหตุผล OT *'}"
                                onchange="otUpdateNote('${d.day}',this.value)"
                                onclick="event.stopPropagation()"
                                class="ot-input-sm">`;

                            // Explain button
                            const explainBtn = (noRecord && d.type === 'normal')
                                ? `<button onclick="event.stopPropagation();otOpenExplain('${d.day}')"
                                    class="w-full mt-2 py-2 bg-fuchsia-500 hover:bg-fuchsia-600 text-white font-black rounded-xl text-xs transition-all">
                                    <i class="fa-solid fa-pen-to-square mr-1"></i>ชี้แจงเวลา
                                  </button>`
                                : '';

                            // OT detail inside expanded body
                            const otBody = sel ? `
                                <div class="grid grid-cols-2 gap-3 mb-2">
                                    <div>
                                        <p class="text-[10px] font-black uppercase tracking-widest mb-1 ${isAutoOT && isOverridden ? 'text-amber-500' : 'text-zinc-500'}">${isAutoOT ? (isOverridden ? 'ชม. OT (แก้ไขแล้ว)' : 'ชม. OT (อัตโนมัติ)') : 'จำนวนชม. OT'}</p>
                                        ${hrsInput}
                                    </div>
                                    <div>
                                        <p class="text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-1">คิดเป็น (×${mult})</p>
                                        <span class="font-black text-yellow-700 text-lg">${conv.toFixed(2)} ชม.</span>
                                    </div>
                                </div>
                                <div>
                                    <p class="text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-1">${isAutoOT?'หมายเหตุ':'เหตุผล OT *'}</p>
                                    ${noteInput}
                                </div>` : '';

                            const isExpanded = cardClass.includes('expanded');

                            return `<div class="${cardClass} ot-animate" data-day="${d.day}" data-idx="${i}">
                                <div class="ot-card-top" onclick="otToggleExpand(this.parentElement)">
                                    <!-- Left: check + date -->
                                    <div class="ot-chk-wrap flex-shrink-0">${checkHtml}</div>
                                    <div class="flex-1 min-w-0">
                                        <div class="flex items-center gap-2 flex-wrap">
                                            <span class="font-black text-zinc-800 text-sm">${d.day.slice(5).replace('-','/')} <span class="text-zinc-400 font-normal">${THday[d.dow]}</span></span>
                                            ${dayTypeBadge}
                                            ${statusBadge}
                                        </div>
                                        <div class="flex items-center gap-1.5 mt-1">
                                            ${inPill}
                                            <i class="fa-solid fa-arrow-right text-zinc-300 text-[10px]"></i>
                                            ${outPill}
                                        </div>
                                    </div>
                                    <!-- Right: OT summary or chevron -->
                                    <div class="flex-shrink-0 text-right flex flex-col items-end gap-1">
                                        ${sel ? `<span class="text-xs font-black text-yellow-700 bg-yellow-100 px-2 py-0.5 rounded-lg">${conv.toFixed(2)} ชม.</span>` : ''}
                                        <i class="fa-solid fa-chevron-${isExpanded?'up':'down'} text-zinc-300 text-xs mt-1"></i>
                                    </div>
                                </div>
                                <div class="ot-card-body">
                                    ${otBody}
                                    ${explainBtn}
                                </div>
                            </div>`;
                        }).join('');
                        updateTotals();
                    }

                    window.otToggleExpand = (card) => {
                        card.classList.toggle('expanded');
                        const chevron = card.querySelector('.fa-chevron-up, .fa-chevron-down');
                        if (chevron) {
                            chevron.classList.toggle('fa-chevron-up');
                            chevron.classList.toggle('fa-chevron-down');
                        }
                    };

                    function updateTotals() {
                        let convSum = 0;
                        allDays.forEach(d => {
                            if (!selectedDays[d.day]) return;
                            const e      = selectedDays[d.day];
                            const isAuto = d.type==='holiday' || d.type==='comp' || d.type==='weekend';
                            const mult   = isAuto ? 1.5 : 1.0;
                            const hrs    = isAuto
                                ? (e.hoursOverride != null ? e.hoursOverride : calcAutoOTHours(d.inTime, d.outTime, mySchedule))
                                : (e.hours || 0);
                            convSum += hrs * mult;
                        });
                        const el  = document.getElementById('ot-conv-total');
                        if (el) el.textContent = convSum.toFixed(2) + ' ชม.';
                        const cap = document.getElementById('ot-cap-warn');
                        if (cap) cap.classList.toggle('hidden', convSum <= 36);
                        updateCountBadge();
                    }

                    window.otToggleDay = (i) => {
                        if (isLocked) return;
                        const d = allDays[i];
                        if (!d.hasClock) return;
                        if (selectedDays[d.day]) {
                            delete selectedDays[d.day];
                        } else {
                            const hpd = getDayWorkHours(mySchedule);
                            selectedDays[d.day] = {
                                hours: (d.type==='holiday'||d.type==='comp') ? hpd : 0,
                                note: ''
                            };
                        }
                        renderDayGrid();
                    };

                    function updateCountBadge() {
                        const cnt = Object.keys(selectedDays).length;
                        const el = document.getElementById('ot-selected-count');
                        if (el) el.textContent = `เลือก OT: ${cnt} วัน`;
                    }

                    // renderSelectedTable ไม่ใช้แล้ว (รวมเข้า renderDayGrid)
                    function renderSelectedTable() { /* merged into renderDayGrid */ }

                    window.otUpdateHours = (day, val) => {
                        if (selectedDays[day]) { selectedDays[day].hours = val; updateTotals(); }
                    };
                    window.otUpdateAutoHours = (day, val, autoVal) => {
                        if (!selectedDays[day]) return;
                        // ถ้าค่าเท่ากับ auto ให้ล้าง override
                        if (val === autoVal) {
                            delete selectedDays[day].hoursOverride;
                        } else {
                            selectedDays[day].hoursOverride = val;
                        }
                        updateTotals();
                        renderDayGrid();
                    };
                    window.otResetAutoHours = (day) => {
                        if (selectedDays[day]) {
                            delete selectedDays[day].hoursOverride;
                            updateTotals();
                            renderDayGrid();
                        }
                    };
                    window.otUpdateNote  = (day, val) => {
                        if (selectedDays[day]) selectedDays[day].note = val;
                    };

                    // ─── Commission ───────────────────────────────────────
                    function renderCommUI() {
                        const wrap = document.getElementById('ot-comm-rows');
                        if (!wrap) return;
                        const defaultPct = profile.commRate || profile.commission || 0;
                        const defaultMin = profile.commMin || 0;
                        // sync pct ที่ยังไม่ได้ตั้งค่า
                        commRows.forEach(r => { if (!r.pct && defaultPct) r.pct = defaultPct; });

                        // แสดง badge ยอดขายขั้นต่ำ
                        const badge = document.getElementById('comm-min-badge');
                        const badgeVal = document.getElementById('comm-min-value');
                        if (badge && badgeVal) {
                            if (defaultMin > 0) {
                                badgeVal.textContent = '฿' + defaultMin.toLocaleString();
                                badge.classList.remove('hidden');
                            } else badge.classList.add('hidden');
                        }

                        // คำนวณยอดขายรวมทุกรายการ
                        const totalSales = commRows.reduce((s,r) => s + (r.sales||0), 0);
                        const belowMin = defaultMin > 0 && totalSales > 0 && totalSales < defaultMin;

                        wrap.innerHTML = commRows.map((r,i) => {
                            // ถ้ายอดขายรวมไม่ถึงขั้นต่ำ → ได้รับ ฿0
                            const result = belowMin ? 0 : (Math.round((r.sales||0)*(r.pct||0))/100);
                            const fmtResult = Number.isInteger(result) ? result.toLocaleString() : result.toLocaleString('th-TH',{minimumFractionDigits:2,maximumFractionDigits:2});
                            return `<div class="comm-row-card">
                                <div class="flex items-center gap-2 mb-2">
                                    <input type="text" value="${r.desc||''}" placeholder="ชื่อรายการ เช่น Page365..."
                                        ${isLocked?'disabled':''}
                                        onchange="_commRows[${i}].desc=this.value"
                                        class="ot-input-sm flex-1">
                                    ${!isLocked?`<button onclick="_commRows.splice(${i},1);renderCommUI_();otCalcComm()" class="w-8 h-8 flex items-center justify-center text-zinc-300 hover:text-red-400 hover:bg-red-50 rounded-lg transition-colors flex-shrink-0"><i class="fa-solid fa-times"></i></button>`:''}
                                </div>
                                <div class="flex items-center gap-2">
                                    <div class="flex-1">
                                        <p class="text-[10px] font-black text-zinc-400 uppercase tracking-widest mb-1">ยอดขาย (฿)</p>
                                        <input type="number" value="${r.sales||''}" min="0" placeholder="0"
                                            ${isLocked?'disabled':''}
                                            oninput="_commRows[${i}].sales=Number(this.value)||0;otCalcComm()"
                                            class="ot-input-sm text-right">
                                    </div>
                                    <div class="flex-shrink-0 text-center px-1">
                                        <p class="text-[10px] font-black text-zinc-400 uppercase tracking-widest mb-1">%</p>
                                        <span class="inline-block text-sm font-black text-zinc-700 bg-zinc-200 rounded-lg px-3 py-2">${r.pct||defaultPct}%</span>
                                    </div>
                                    <div class="flex-shrink-0 text-right min-w-[72px]">
                                        <p class="text-[10px] font-black text-zinc-400 uppercase tracking-widest mb-1">ได้รับ</p>
                                        <span id="comm-result-${i}" class="text-sm font-black ${belowMin?'text-red-400 line-through':'text-green-700'}">฿${fmtResult}</span>
                                    </div>
                                </div>
                            </div>`;
                        }).join('');

                        const total = belowMin ? 0 : commRows.reduce((s,r) => s + (Math.round((r.sales||0)*(r.pct||0))/100), 0);
                        const totEl = document.getElementById('ot-comm-total');
                        if (totEl) totEl.textContent = '฿' + (Number.isInteger(total) ? total.toLocaleString() : total.toLocaleString('th-TH',{minimumFractionDigits:2,maximumFractionDigits:2}));

                        const minEl = document.getElementById('ot-comm-min-warn');
                        if (minEl) {
                            if (belowMin) {
                                const short = defaultMin - totalSales;
                                minEl.innerHTML = `⚠️ ยอดขายรวม ฿${totalSales.toLocaleString()} ยังขาดอีก ฿${short.toLocaleString()} จึงจะถึงขั้นต่ำ — ไม่ได้รับคอมมิชชั่น`;
                                minEl.classList.remove('hidden');
                            } else minEl.classList.add('hidden');
                        }
                    }
                    window.renderCommUI_ = renderCommUI;
                    window.otAddCommRow = () => { window._commRows.push({ desc:'Page 365', sales:0, pct: profile.commRate||profile.commission||0 }); renderCommUI(); };
                    window.otCalcComm  = () => {
                        const defaultMin = profile.commMin || 0;
                        const totalSales = commRows.reduce((s,r) => s + (r.sales||0), 0);
                        const belowMin = defaultMin > 0 && totalSales > 0 && totalSales < defaultMin;
                        const total = belowMin ? 0 : commRows.reduce((s,r) => s + (Math.round((r.sales||0)*(r.pct||0))/100), 0);
                        const el = document.getElementById('ot-comm-total');
                        if (el) el.textContent = '฿' + (Number.isInteger(total) ? total.toLocaleString() : total.toLocaleString('th-TH',{minimumFractionDigits:2,maximumFractionDigits:2}));
                        commRows.forEach((r,i) => {
                            const cell = document.getElementById('comm-result-'+i);
                            if (cell) {
                                const v = belowMin ? 0 : (Math.round((r.sales||0)*(r.pct||0))/100);
                                cell.textContent = '฿' + (Number.isInteger(v) ? v.toLocaleString() : v.toLocaleString('th-TH',{minimumFractionDigits:2,maximumFractionDigits:2}));
                                cell.className = `col-span-2 text-xs font-black ${belowMin?'text-red-400 line-through':'text-zinc-700'} text-right`;
                            }
                        });
                        const minEl = document.getElementById('ot-comm-min-warn');
                        if (minEl) {
                            if (belowMin) {
                                const short = defaultMin - totalSales;
                                minEl.innerHTML = `⚠️ ยอดขายรวม ฿${totalSales.toLocaleString()} ยังขาดอีก ฿${short.toLocaleString()} จึงจะถึงขั้นต่ำ — ไม่ได้รับคอมมิชชั่น`;
                                minEl.classList.remove('hidden');
                            } else minEl.classList.add('hidden');
                        }
                    };

                    // ─── Save helpers ─────────────────────────────────────
                    async function buildPayload(status) {
                        const rows = allDays.filter(d => selectedDays[d.day]).map(d => {
                            const e      = selectedDays[d.day];
                            const isAuto = d.type==='holiday' || d.type==='comp' || d.type==='weekend';
                            const mult   = isAuto ? 1.5 : 1.0;
                            const raw    = isAuto
                                ? (e.hoursOverride != null ? e.hoursOverride : calcAutoOTHours(d.inTime, d.outTime, mySchedule))
                                : (e.hours || 0);
                            return { date:d.day, inTime:d.inTime, outTime:d.outTime,
                                     breakMinutes: mySchedule.breakMinutes ?? 60,
                                     rawHours: raw,
                                     otConv: raw * mult,
                                     type:d.type, mult, note:e.note||'' };
                        });
                        const otConverted = rows.reduce((s,r) => s + r.otConv, 0);
                        const defaultMin  = profile.commMin || 0;
                        const totalSales  = commRows.reduce((s,r) => s + (r.sales||0), 0);
                        const belowMin    = defaultMin > 0 && totalSales > 0 && totalSales < defaultMin;
                        const commTotal   = belowMin ? 0 : commRows.reduce((s,r) => s + (Math.round((r.sales||0)*(r.pct||0))/100), 0);
                        return {
                            uid:user.uid, name:profile.name, branch:profile.branch||'',
                            periodId:currentPeriod.id,
                            periodLabel:`งวด ${currentPeriod.periodNo}/${currentPeriod.year}`,
                            periodStart:currentPeriod.startDate, periodEnd:currentPeriod.endDate,
                            rows, commItems:commRows, commTotal,
                            otConverted:Math.round(otConverted*100)/100,
                            note:document.getElementById('ot-note').value.trim(),
                            status, updatedAt:new Date().toISOString(),
                        };
                    }

                    // auto-load งวดที่เลือกไว้
                    if (document.getElementById('ot-period-sel')?.value) {
                        otLoadPeriod();
                    }

                    window.otSaveDraft = async () => {
                        if (!currentPeriod) { showToast('กรุณาเลือกงวดก่อน','error'); return; }
                        try {
                            const { addDoc, updateDoc, doc, collection } =
                                await import('https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js');
                            const payload = await buildPayload('draft');
                            if (otRequest?.id) {
                                await updateDoc(doc(db,'artifacts',APP_ID,'public','data','ot_requests',otRequest.id), payload);
                            } else {
                                payload.createdAt = new Date().toISOString();
                                const ref = await addDoc(collection(db,'artifacts',APP_ID,'public','data','ot_requests'), payload);
                                otRequest = { id:ref.id, ...payload };
                            }
                            showToast('✅ บันทึก Draft แล้ว','success');
                            otLoadPeriod();
                            loadHistory();
                        } catch(e) { showToast('❌ '+e.message,'error'); }
                    };

                    window.otSubmit = async () => {
                        if (isLocked) { showToast('⚠️ ยื่นแล้วหรืออนุมัติแล้ว แก้ไขไม่ได้','error'); return; }
                        const selCount = Object.keys(selectedDays).length;
                        const commTotal = commRows.reduce((s,r) => s + (r.sales||0), 0);
                        if (selCount === 0 && commTotal === 0) { showToast('⚠️ กรุณาเลือกวัน OT หรือกรอก Commission','error'); return; }
                        // ตรวจหมายเหตุวันปกติ
                        const missingNote = allDays.filter(d => selectedDays[d.day] && d.type==='normal' && !selectedDays[d.day].note.trim());
                        if (missingNote.length) { showToast(`⚠️ กรุณากรอกเหตุผล OT วันที่ ${missingNote.map(d=>d.day.slice(8)).join(', ')}`, 'error'); return; }
                        if (!confirm('ยืนยันการยื่นขออนุมัติ OT & Commission?')) return;
                        try {
                            const { addDoc, updateDoc, doc, collection, query, getDocs, where } =
                                await import('https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js');
                            const payload = await buildPayload('pending');
                            if (otRequest?.id) {
                                await updateDoc(doc(db,'artifacts',APP_ID,'public','data','ot_requests',otRequest.id), payload);
                            } else {
                                payload.createdAt = new Date().toISOString();
                                const ref = await addDoc(collection(db,'artifacts',APP_ID,'public','data','ot_requests'), payload);
                                otRequest = { id:ref.id, ...payload };
                            }
                            showToast('✅ ยื่นขออนุมัติแล้ว','success');
                            loadHistory();
                            otLoadPeriod();
                        } catch(e) { showToast('❌ '+e.message,'error'); }
                    };

                })();

                return () => {
                    if (unsubHistory) unsubHistory();
                    ['otLoadPeriod','otToggleDay','otUpdateHours','otUpdateNote',
                     'otUpdateAutoHours','otResetAutoHours',
                     'otAddCommRow','otCalcComm','renderCommUI_','otSaveDraft','otSubmit','otToggleExpand',
                     'otOpenExplain','otCloseExplain','otSubmitExplain'].forEach(k => delete window[k]);
                };
            }
        };

        // ================================================================
        // PAGE: ot-approve — Manager อนุมัติ OT & Commission
        // ================================================================
        PAGES['ot-approve'] = {
            title: 'อนุมัติ OT',
            html: `
            <style>
                .ot-filter-btn { background:#fff; color:#52525b; transition:all .15s; }
                .ot-filter-btn.active { background:#18181b; color:#eab308; border-color:#18181b; }
                .ot-status-pending  { background:#fef9c3; color:#92400e; }
                .ot-status-approved { background:#dcfce7; color:#166534; }
                .ot-status-rejected { background:#fee2e2; color:#991b1b; }
                .ot-status-draft    { background:#f4f4f5; color:#52525b; }
            </style>
            <div class="p-6 lg:p-8 max-w-5xl mx-auto">
              <div class="mb-6 flex items-end justify-between gap-4 flex-wrap">
                <div>
                  <h2 class="text-2xl font-black text-zinc-800">อนุมัติ OT & Commission</h2>
                  <p class="text-sm text-zinc-500 mt-1">ตรวจสอบและอนุมัติคำขอเบิก OT ของพนักงาน</p>
                </div>
                <div class="flex gap-2 flex-wrap">
                  <button onclick="otApprFilter('all')"      id="otaf-all"      class="ot-filter-btn active px-4 py-2 rounded-xl text-xs font-black border">ทั้งหมด</button>
                  <button onclick="otApprFilter('pending')"  id="otaf-pending"  class="ot-filter-btn px-4 py-2 rounded-xl text-xs font-black border">⏳ รออนุมัติ</button>
                  <button onclick="otApprFilter('approved')" id="otaf-approved" class="ot-filter-btn px-4 py-2 rounded-xl text-xs font-black border">✅ อนุมัติแล้ว</button>
                  <button onclick="otApprFilter('rejected')" id="otaf-rejected" class="ot-filter-btn px-4 py-2 rounded-xl text-xs font-black border">❌ ไม่อนุมัติ</button>
                </div>
              </div>
              <div id="ota-list" class="space-y-4">
                <div class="text-center py-12 text-zinc-300"><i class="fa-solid fa-spinner fa-spin text-3xl"></i></div>
              </div>
            </div>`,

            async init(user, profile, db, APP_ID) {
                let allRequests = [], filterStatus = 'all', unsubOt = null;
                const stMap = { draft:'Draft', pending:'รออนุมัติ', approved:'✅ อนุมัติแล้ว', rejected:'❌ ไม่อนุมัติ' };
                const stCls = { draft:'ot-status-draft', pending:'ot-status-pending', approved:'ot-status-approved', rejected:'ot-status-rejected' };
                const THday = ['อา','จ','อ','พ','พฤ','ศ','ส'];

                (async () => {
                    const { collection, query, orderBy, doc, updateDoc, onSnapshot, getDoc } =
                        await import('https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js');

                    unsubOt = onSnapshot(
                        query(collection(db,'artifacts',APP_ID,'public','data','ot_requests'), orderBy('createdAt','desc')),
                        snap => {
                            allRequests = snap.docs.map(d => ({ id:d.id, ...d.data() }));
                            renderList();
                        }
                    );

                    window.otApprFilter = s => {
                        filterStatus = s;
                        document.querySelectorAll('.ot-filter-btn').forEach(b => b.classList.remove('active'));
                        document.getElementById('otaf-'+s)?.classList.add('active');
                        renderList();
                    };

                    function renderList() {
                        const list = document.getElementById('ota-list');
                        if (!list) return;
                        const rows = filterStatus==='all' ? allRequests : allRequests.filter(r => r.status===filterStatus);
                        if (!rows.length) { list.innerHTML = '<div class="text-center py-12 text-zinc-300 text-sm">ไม่มีรายการ</div>'; return; }

                        list.innerHTML = rows.map(r => {
                            const rowsHtml = (r.rows||[]).map(row => {
                                const typeBadge = row.type==='holiday'
                                    ? '<span class="bg-red-50 text-red-500 text-[9px] font-black px-1.5 py-0.5 rounded-lg">วันหยุด</span>'
                                    : row.type==='comp'
                                    ? '<span class="bg-yellow-50 text-yellow-700 text-[9px] font-black px-1.5 py-0.5 rounded-lg">ชดเชย</span>'
                                    : '<span class="bg-zinc-100 text-zinc-500 text-[9px] font-black px-1.5 py-0.5 rounded-lg">ปกติ</span>';
                                const [ry,rmm,rdd] = (row.date||'').split('-').map(Number);
                                const dateObj = ry ? new Date(ry, rmm-1, rdd) : null;
                                const dayNames = ['อา','จ','อ','พ','พฤ','ศ','ส'];
                                const fmtDate = dateObj
                                    ? `${dayNames[dateObj.getDay()]} ${rdd}/${rmm}/${ry}`
                                    : (row.date||'-');
                                return `<tr class="border-b border-zinc-50 text-xs">
                                    <td class="px-3 py-2 font-medium whitespace-nowrap">${fmtDate}</td>
                                    <td class="px-3 py-2 text-center">${row.inTime||'-'}</td>
                                    <td class="px-3 py-2 text-center">${row.outTime||'-'}</td>
                                    <td class="px-3 py-2 text-center font-bold">${(row.rawHours||0).toFixed(2)}</td>
                                    <td class="px-3 py-2 text-center">${typeBadge}</td>
                                    <td class="px-3 py-2 text-center font-black text-yellow-700">${(row.otConv||0).toFixed(2)}</td>
                                    <td class="px-3 py-2 text-zinc-500 italic">${row.note||'-'}</td>
                                </tr>`;
                            }).join('');
                            const commHtml = (r.commItems||[]).filter(c => c.sales||c.pct).map(c => {
                                const earned = Math.round((c.sales||0)*(c.pct||0))/100;
                                const fmtEarned = Number.isInteger(earned) ? earned.toLocaleString() : earned.toLocaleString('th-TH',{minimumFractionDigits:2,maximumFractionDigits:2});
                                const fmtSales = (c.sales||0).toLocaleString('th-TH',{minimumFractionDigits:0,maximumFractionDigits:2});
                                return `<div class="flex justify-between text-xs py-1.5 border-b border-zinc-50">
                                    <span class="text-zinc-600">${c.desc||'ไม่ระบุ'}</span>
                                    <span>฿${fmtSales} × ${c.pct||0}% = <b class="text-zinc-800">฿${fmtEarned}</b></span>
                                </div>`;
                            }).join('');

                            return `<div class="bg-white border border-zinc-200 rounded-2xl overflow-hidden shadow-sm">
                                <div class="px-5 py-4 bg-zinc-50 border-b border-zinc-100 flex flex-wrap items-center gap-3">
                                    <div class="flex-1 min-w-0">
                                        <p class="font-black text-zinc-800">${r.name} <span class="text-zinc-400 font-normal text-sm">— ${r.periodLabel||r.periodId}</span></p>
                                        <p class="text-xs text-zinc-500 mt-0.5">${r.periodStart||''} ถึง ${r.periodEnd||''} · ยื่นเมื่อ ${r.createdAt ? new Date(r.createdAt).toLocaleDateString('th-TH',{day:'numeric',month:'short',year:'2-digit',timeZone:'Asia/Bangkok'}) : ''}</p>
                                    </div>
                                    <span class="text-[10px] font-black px-3 py-1.5 rounded-xl ${stCls[r.status]||'ot-status-draft'}">${stMap[r.status]||r.status}</span>
                                </div>
                                <div class="p-5">
                                    ${(r.rows||[]).length ? `
                                    <div class="overflow-x-auto mb-4 rounded-xl border border-zinc-100">
                                        <table class="w-full text-sm">
                                            <thead class="bg-zinc-50">
                                                <tr class="text-[10px] font-black text-zinc-400 uppercase">
                                                    <th class="text-left px-3 py-2.5">วันที่</th>
                                                    <th class="px-3 py-2.5">เข้า</th><th class="px-3 py-2.5">ออก</th>
                                                    <th class="px-3 py-2.5">ชม.</th><th class="px-3 py-2.5">ประเภท</th>
                                                    <th class="px-3 py-2.5">คิดเป็น</th><th class="text-left px-3 py-2.5">เหตุผล</th>
                                                </tr>
                                            </thead>
                                            <tbody>${rowsHtml}</tbody>
                                        </table>
                                    </div>` : ''}
                                    <div class="flex flex-wrap gap-5 text-sm mb-4 p-3 bg-zinc-50 rounded-xl">
                                        <span>รวม OT (คิดเป็น): <b class="text-yellow-700">${(r.otConverted||0).toFixed(2)} ชม.</b></span>
                                        <span>Commission รวม: <b class="text-zinc-800">฿${Number.isInteger(r.commTotal||0) ? (r.commTotal||0).toLocaleString() : (r.commTotal||0).toLocaleString('th-TH',{minimumFractionDigits:2,maximumFractionDigits:2})}</b></span>
                                    </div>
                                    ${commHtml ? `<div class="mb-4 bg-zinc-50 rounded-xl p-3">${commHtml}</div>` : ''}
                                    ${r.note ? `<div class="mb-4 bg-yellow-50 border border-yellow-100 rounded-xl px-4 py-3 text-xs text-yellow-800"><b>หมายเหตุ:</b> ${r.note}</div>` : ''}
                                    ${r.status==='pending' ? `
                                    <div class="flex flex-wrap gap-3 items-end pt-3 border-t border-zinc-100">
                                        <div class="flex-1 min-w-[200px]">
                                            <label class="text-[10px] font-black text-zinc-500 uppercase tracking-widest">หมายเหตุถึงพนักงาน (กรณีไม่อนุมัติ)</label>
                                            <input type="text" id="ota-note-${r.id}" placeholder="ระบุเหตุผล..."
                                                class="input-field mt-1 text-sm py-2">
                                        </div>
                                        <button onclick="otaDecide('${r.id}','${r.uid}','approved')"
                                            class="px-6 py-2.5 bg-green-500 hover:bg-green-600 text-white font-black rounded-xl text-xs transition-all">
                                            <i class="fa-solid fa-check mr-1.5"></i>อนุมัติ</button>
                                        <button onclick="otaDecide('${r.id}','${r.uid}','rejected')"
                                            class="px-6 py-2.5 bg-red-500 hover:bg-red-600 text-white font-black rounded-xl text-xs transition-all">
                                            <i class="fa-solid fa-times mr-1.5"></i>ไม่อนุมัติ</button>
                                    </div>` : ''}
                                    ${r.managerNote ? `<p class="text-xs text-zinc-400 mt-2 italic">หมายเหตุ manager: "${r.managerNote}"</p>` : ''}
                                </div>
                            </div>`;
                        }).join('');
                    }

                    window.otaDecide = async (reqId, empUid, decision) => {
                        const mgrNote = document.getElementById('ota-note-'+reqId)?.value.trim()||'';
                        if (decision==='rejected' && !mgrNote) { showToast('⚠️ กรุณาระบุเหตุผลที่ไม่อนุมัติ','error'); return; }
                        if (!confirm(decision==='approved' ? 'ยืนยันการอนุมัติ OT?' : 'ยืนยันการไม่อนุมัติ?')) return;
                        try {
                            await updateDoc(doc(db,'artifacts',APP_ID,'public','data','ot_requests',reqId), {
                                status:decision, managerNote:mgrNote,
                                approvedBy:profile.name, approvedAt:new Date().toISOString()
                            });
                            showToast(decision==='approved' ? '✅ อนุมัติแล้ว' : '❌ ไม่อนุมัติ', decision==='approved'?'success':'error');
                            // แจ้ง LINE พนักงาน
                            try {
                                const empDoc = await getDoc(doc(db,'artifacts',APP_ID,'public','data','users',empUid));
                                const emp = empDoc.exists() ? empDoc.data() : null;
                                if (emp?.lineId) {
                                    const icon = decision==='approved' ? '✅' : '❌';
                                    sendLineMessage(emp.lineId,[{type:'text',
                                        text:`${icon} ผลการขอเบิก OT\nคำขอของคุณ${decision==='approved'?'ได้รับการอนุมัติแล้ว 🎉':'ไม่ได้รับการอนุมัติ'}${mgrNote?`\nหมายเหตุ: "${mgrNote}"`:''}` }]).catch(()=>{});
                                }
                            } catch(le) { console.warn('LINE:',le); }
                        } catch(e) { showToast('❌ '+e.message,'error'); }
                    };

                })().catch(e => { console.error('ot-approve:',e); hideLoader(); });

                return () => {
                    if (unsubOt) unsubOt();
                    ['otApprFilter','otaDecide'].forEach(k => delete window[k]);
                };
            }
        };

        // ================================================================
        // PAGE: executive — แดชบอร์ดผู้บริหาร
        // ================================================================
        PAGES['executive'] = {
            title: 'แดชบอร์ดผู้บริหาร',
            html: `
        <style>
        .ex-card { background:#fff; border-radius:1.25rem; border:1px solid #e4e4e7; padding:1.25rem; }
        .ex-kpi-val { font-size:1.75rem; font-weight:900; line-height:1; margin-top:.25rem; }
        .ex-section-title { font-size:.65rem; font-weight:900; text-transform:uppercase; letter-spacing:.12em; color:#a1a1aa; margin-bottom:.75rem; }
        .ex-bar { height:8px; border-radius:99px; background:#f4f4f5; overflow:hidden; }
        .ex-bar-fill { height:100%; border-radius:99px; transition:width .6s ease; }
