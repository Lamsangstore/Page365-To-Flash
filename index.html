    // ── Headers & ColWidths per carrier ──────────────────────────

        "Phone_number2\r\n(เบอร์โทรศัพท์)",
        "Item_type\r\n(ประเภทสินค้า)",

        "*Width\r\n(กว้าง)",

        "Remark1\r\n(หมายเหตุ1)",
        "Remark2\r\n(หมายเหตุ2)",
        "Remark3\r\n(หมายเหตุ3)"
    ];
    const JT_HEADERS = [
        "ชื่อสกุลผู้รับ",
        "เบอร์โทรศัพท์มือถือผู้รับ",
        "จังหวัดผู้รับ",
        "เขตอำเภอผู้รับ",
        "ตำบลปลายทาง",
        "รหัสไปรษณีย์ปลายทาง",
        "ที่อยู่ผู้รับ",
        "รายละเอียดพัสดุ",
        "ประเภทพัสดุ",
        "น้ำหนักพัสดุ(kg)",
        "ยาว(ซม.)",
        "กว้าง(ซม.)",
        "สูง(ซม.)",
        "จำนวนเงินที่ชำระปลายทาง (COD)",
        "บริการSuper"
    ];
    const FLASH_COLWIDTHS = [80, 300, 200, 450, 100, 130, 130, 120, 100, 80, 80, 80, 100, 130, 100, 150, 800, 150, 150];
    const JT_COLWIDTHS = [80, 200, 150, 150, 180, 150, 130, 350, 350, 100, 110, 80, 80, 80, 130, 100];

    const fileInputRef = useRef(null);
    const tableContainerRef = useRef(null);
    const topScrollRef = useRef(null);
    const isSyncingScroll = useRef(false);
    const isDragging = useRef(false);
    const lastMouseX = useRef(0);

    const [colWidths, setColWidths] = useState([80, 300, 200, 450, 100, 130, 130, 120, 100, 80, 80, 80, 100, 130, 100, 150, 800, 150, 150]);

    // auto-save draft ทุกครั้งที่ data เปลี่ยน (กัน refresh แล้วหาย)
    useEffect(() => {
        if (data && rawOrders) {
            try {
                localStorage.setItem('flashConverter_draft', JSON.stringify({
                    data, rawOrders, carrier, fileName, selectedRows: Array.from(selectedRows), savedAt: Date.now()
                }));
            } catch(e) {}
        }
    }, [data, selectedRows]);

    // restore draft on mount (ครั้งแรก)
    useEffect(() => {
        try {
            const saved = localStorage.getItem('flashConverter_draft');
            if (saved) {
                const parsed = JSON.parse(saved);
                const ageHours = (Date.now() - (parsed.savedAt || 0)) / 1000 / 3600;
                if (ageHours < 24 && parsed.data && parsed.data.length > 0) {
                    if (confirm(`พบข้อมูลที่ค้างไว้ (${parsed.data.length} รายการ จาก "${parsed.fileName || 'ไม่ทราบชื่อ'}")\nต้องการกู้คืนหรือไม่?`)) {
                        setData(parsed.data);
                        setRawOrders(parsed.rawOrders);
                        setCarrier(parsed.carrier || "flash");
                        setFileName(parsed.fileName || "");
                        setSelectedRows(new Set(parsed.selectedRows || []));
                        setStatus("success");
                    } else {
                        localStorage.removeItem('flashConverter_draft');
                    }
                }
            }
        } catch(e) {}
        // eslint-disable-next-line
    }, []);

    // sync colWidths กับ carrier ที่เลือก
    useEffect(() => {
        setColWidths(carrier === "jt" ? JT_COLWIDTHS : FLASH_COLWIDTHS);
    }, [carrier]);
    const isResizing = useRef(-1);
    const startX = useRef(0);
    const startWidth = useRef(0);

    // ── Presets (localStorage-persisted) ──────────────────────────
    const DEFAULT_PRESETS = [
        { id: "pants", label: "กางเกง", prefix: "P", keywords: ["กางเกง","pants","trouser"], weight: 0.5, length: 32, width: 25, height: 5, itemType: "เสื้อผ้า", productType: "Standard", priority: 1 },
        { id: "belt",  label: "เข็มขัด", prefix: "B", keywords: ["เข็มขัด","belt"],           weight: 0.2, length: 15, width: 15, height: 5, itemType: "เสื้อผ้า", productType: "Standard", priority: 0 },

    const loadPresets = () => {
        try {
            const saved = localStorage.getItem('flashConverter_presets');
            if (saved) {
                const parsed = JSON.parse(saved);
                return DEFAULT_PRESETS.map(def => {
                    const s = parsed.find(p => p.id === def.id);
                    return s ? { ...def, ...s } : def;
                });
            }
        } catch(e) {}
        return DEFAULT_PRESETS;
    };

    const [productPresets, setProductPresets] = useState(loadPresets);
    const [manualOverride, setManualOverride] = useState(false);
    const [activePresetId, setActivePresetId] = useState(null);

    const updatePreset = (id, field, value) => {
        const next = productPresets.map(p => p.id === id ? { ...p, [field]: value } : p);
        setProductPresets(next);
        localStorage.setItem('flashConverter_presets', JSON.stringify(next));
    };

        weightPerPiece: 0.5, length: 32, width: 25, heightPerPiece: 5,
        itemType: "เสื้อผ้า", productType: "Standard"
    });

    const applyPreset = (preset) => {
        setSettings({ weightPerPiece: preset.weight, length: preset.length, width: preset.width, heightPerPiece: preset.height, itemType: preset.itemType, productType: preset.productType });
        setManualOverride(true);
        setActivePresetId(preset.id);
    };

    const clearOverride = () => { setManualOverride(false); setActivePresetId(null); };

    // ── Headers ───────────────────────────────────────────────────
    const headersForExport = carrier === "jt" ? JT_HEADERS : FLASH_HEADERS;

    const totalTableWidth = colWidths.reduce((a, b) => a + b, 0);

    // ── Scroll sync ───────────────────────────────────────────────
    const handleScrollSync = (source) => {
        if (isSyncingScroll.current) return;
        isSyncingScroll.current = true;
        if (source === 'top' && tableContainerRef.current) tableContainerRef.current.scrollLeft = topScrollRef.current.scrollLeft;
        else if (source === 'table' && topScrollRef.current) topScrollRef.current.scrollLeft = tableContainerRef.current.scrollLeft;
        setTimeout(() => { isSyncingScroll.current = false; }, 10);
    };

    const handleMouseDown = (e) => {
        if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT' || e.target.classList.contains('resize-handle')) return;
        isDragging.current = true;
        lastMouseX.current = e.pageX;
        document.body.classList.add('grabbing-cursor');
    };

    const handleGlobalMouseMove = useCallback((e) => {
        if (isResizing.current !== -1) {
            const diff = e.pageX - startX.current;
            const newWidths = [...colWidths];
            newWidths[isResizing.current] = Math.max(50, startWidth.current + diff);
            setColWidths(newWidths);
            return;
        }
        if (isDragging.current && tableContainerRef.current) {
            tableContainerRef.current.scrollLeft -= e.pageX - lastMouseX.current;
            lastMouseX.current = e.pageX;
        }
    }, [colWidths]);

    const handleGlobalMouseUp = useCallback(() => {
        isDragging.current = false;
        isResizing.current = -1;
        document.body.classList.remove('grabbing-cursor');
    }, []);

    useEffect(() => {
        document.addEventListener('mousemove', handleGlobalMouseMove);
        document.addEventListener('mouseup', handleGlobalMouseUp);
        return () => {
            document.removeEventListener('mousemove', handleGlobalMouseMove);
            document.removeEventListener('mouseup', handleGlobalMouseUp);
        };
    }, [handleGlobalMouseMove, handleGlobalMouseUp]);

    // ── Keyboard shortcuts ────────────────────────────────────────
    useEffect(() => {
        const handleKey = (e) => {
            if (status !== "success" || !data) return;
            // Ctrl+D / Cmd+D: download
            if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'd') {
                e.preventDefault();
                downloadExcel();
            }
            // Ctrl+A / Cmd+A: select all (เฉพาะตอนไม่ได้อยู่ใน input/textarea)
            if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'a') {
                const tag = e.target.tagName;
                if (tag !== 'TEXTAREA' && tag !== 'INPUT') {
                    e.preventDefault();
                    setSelectedRows(new Set(data.map((_, i) => i)));
                }
            }
        };
        document.addEventListener('keydown', handleKey);
        return () => document.removeEventListener('keydown', handleKey);
        // eslint-disable-next-line
    }, [status, data, selectedRows, carrier]);

    const onResizeStart = (index, e) => {
        e.stopPropagation();
        isResizing.current = index;
        startX.current = e.pageX;
        startWidth.current = colWidths[index];
    };

    // ── Address parser (Thai) ─────────────────────────────────────
    const parseThaiAddress = (addr) => {
        // คืนค่า {province, district, subdistrict, postal}
        const postal = (addr.match(/\d{5}/) || [""])[0];
        let province = "", district = "", subdistrict = "";

        // จังหวัด
        const provMatch = addr.match(/(?:จังหวัด|จ\.)\s*([\u0E00-\u0E7F]+)/);
        if (provMatch) province = provMatch[1].trim();
        else {
            const bkk = addr.match(/(กรุงเทพ(?:มหานคร)?|กทม\.?)/);
            if (bkk) province = "กรุงเทพมหานคร";
        }

        // อำเภอ / เขต — ใช้ \u0E00-\u0E7F (Thai range) เพื่อให้แน่ใจว่าจับเฉพาะข้อความไทย ไม่จับเลข
        // และใช้ negative lookbehind ไม่ให้จับคำที่ลงท้ายด้วยพยางค์อื่นเช่น "ชินเขต"
        // วิธี: ต้องมี space/start ก่อนคีย์เวิร์ด หรือเริ่มต้นข้อความ
        let distMatch = addr.match(/(?:^|\s)(?:อำเภอ|อ\.)\s*([\u0E00-\u0E7F]+)/);
        if (!distMatch) {
            distMatch = addr.match(/(?:^|\s)เขต([\u0E00-\u0E7F]+)/);
            if (distMatch) district = "เขต" + distMatch[1].trim();
        } else {
            district = distMatch[1].trim();
            // ถ้าจังหวัดเป็น กทม. ต้องเพิ่ม "เขต" นำหน้า
            if (province === "กรุงเทพมหานคร" && !district.startsWith("เขต")) {
                district = "เขต" + district;
            }
        }

        // ตำบล / แขวง
        let subMatch = addr.match(/(?:^|\s)(?:ตำบล|ต\.)\s*([\u0E00-\u0E7F]+)/);
        if (!subMatch) subMatch = addr.match(/(?:^|\s)แขวง([\u0E00-\u0E7F]+)/);
        if (subMatch) subdistrict = subMatch[1].trim();

        // ── Fallback: ใช้ postal code lookup ถ้า field ไหนยังว่าง ──
        const DB = window.POSTAL_DB || {};
        const entry = postal && DB[postal];
        if (entry) {
            if (!province) province = entry.p || "";
            // เลือก district/subdistrict ที่ตรงกับข้อความที่อยู่ที่สุด
            if (!district && entry.d && entry.d.length > 0) {
                // ลองหาชื่ออำเภอใน addr
                const matched = entry.d.find(d => addr.includes(d));
                district = matched || entry.d[0];
                if (province === "กรุงเทพมหานคร" && !district.startsWith("เขต")) district = "เขต" + district;
            }
            if (!subdistrict && entry.s && entry.s.length > 0) {
                const matched = entry.s.find(s => addr.includes(s));
                subdistrict = matched || entry.s[0];
            }
        }

        return { province, district, subdistrict, postal };
    };

    // ── Build rows per carrier (รับ orders ดิบ คืน array ของ row objects) ──
    const buildRowsForCarrier = (orders, carrierKey) => {
        const HEADERS = carrierKey === "jt" ? JT_HEADERS : FLASH_HEADERS;

        // helpers (อยู่ใน closure ของ App แต่ refer ผ่าน scope)
        const detectPreset = (name) => {
            const code = name.trim().toUpperCase();
            const byPrefix = productPresets.find(p => p.prefix && code.startsWith(p.prefix));
            if (byPrefix) return byPrefix;
            const n = name.toLowerCase();
            return productPresets.find(p => p.keywords && p.keywords.some(k => n.includes(k))) || null;
        };

        const colorAbbr = {
            "ขาว":"ขาว","แดง":"แดง","ดำ":"ดำ","คาราเมล":"ครม","น้ำตาล":"นต","กรม":"ก",
            "กาแฟ":"กฟ","ชานม":"ชน","น้ำตาลเข้ม":"นตข","กากี":"กากี","ครีม":"ค","เทา":"ท",
            "น้ำตาลอ่อน":"นตอ","ขาว & กากี":"ข&ก","ดำ & กากี":"ด&ก","ดำ & ขาว":"ด&ข",
            "ดำ & ส้ม":"ด&ส","ส้มอิฐ":"สอ","โกโก้":"กก","ลาเต้":"ลต","เขียว":"เขียว",
            "ชมพู":"ชพ","เบจ":"เบจ","ฟ้า":"ฟ้า","เหลืองมัสตาร์ด":"หล","ม่วง":"ม่วง",
            "ขาวนวล":"ขาว","Moonless Night (ด้ายดำ)":"ดำ","Moonlit Night (ด้ายขาว)":"ขาว",
            "เขียวขี้ม้า":"ขขม","เทาเข้ม":"ทข","เทาอ่อน":"ทอ","เหลือง":"หล","เขียวเข้ม":"ขม",
            "ม่วงเข้ม":"มข","ม่วงอ่อน":"มอ","เหลืองอ่อน":"หลอ","แดงไวน์":"แดง","เทาดำ":"ทด",
            "ชมพูนู้ด":"ชพ","โอวัลติน":"อวต","มะกอก":"มก","เลม่อน":"ลม","ชาโคล":"ชค","เทาฟ้า":"ทฟ"
        };
        const abbrevColor = (v) => colorAbbr[v] || v;

        const cleanAddress = (addr) => {
            if (/อำเภอเมือง|อ\.เมือง/.test(addr)) {
                return addr
                    .replace(/ตำบล\s*/g,"").replace(/ต\.\s*/g,"")
                    .replace(/อำเภอ\s*/g,"").replace(/อ\.\s*/g,"")
                    .replace(/จังหวัด\s*/g,"").replace(/จ\.\s*/g,"")
                    .replace(/\s{2,}/g," ").trim();
            }
            return addr;
        };

        return orders.map(order => {
            const totalQty = order.items.reduce((sum, i) => sum + i.qty, 0);

            // auto-detect package
            let pkg = { length: settings.length, width: settings.width, heightPerPiece: settings.heightPerPiece, itemType: settings.itemType, productType: settings.productType };
            let totalWeight = null;
            let totalHeight = null;

            const detectedItems = order.items.map(i => ({ preset: detectPreset(i.name), qty: i.qty }));
            const hasAny = !manualOverride && detectedItems.some(d => d.preset !== null);

            if (hasAny) {
                totalWeight = detectedItems.reduce((sum, d) => sum + (d.preset ? d.preset.weight : settings.weightPerPiece) * d.qty, 0);
                totalHeight = detectedItems.reduce((sum, d) => sum + (d.preset ? d.preset.height : settings.heightPerPiece) * d.qty, 0);
                const bestPreset = detectedItems.filter(d => d.preset).map(d => d.preset).sort((a, b) => b.priority - a.priority)[0];
                pkg = { length: bestPreset.length, width: bestPreset.width, heightPerPiece: bestPreset.height, itemType: bestPreset.itemType || settings.itemType, productType: bestPreset.productType || settings.productType };
            }

            const exportWeight = totalWeight !== null ? totalWeight.toFixed(2) : (settings.weightPerPiece * totalQty).toFixed(2);
            const exportHeight = totalHeight !== null ? totalHeight : (pkg.heightPerPiece * totalQty);

            // customer order string (Flash)
            const buildOrderParts = (useAbbr) => order.items.map(i => {
                const code = String(i.name).substring(0, 3).trim();
                const v = i.variant ? `-${useAbbr ? abbrevColor(i.variant) : i.variant}` : "";
                return `${i.qty} = ${code}${v}`;
            });
            let orderInfoStr = `${order.no} | ${buildOrderParts(false).join(" | ")}`;
            if (orderInfoStr.length > 64) orderInfoStr = `${order.no} | ${buildOrderParts(true).join(" | ")}`;
            if (orderInfoStr.length > 64) orderInfoStr = orderInfoStr.substring(0, 64);

            const remarkFull = order.items.map(i => `จำนวน ${i.qty} ชิ้น | ${i.name}${i.variant ? ` (${i.variant})` : ""}`).join(", ");
            const postalCode = (order.address.match(/\d{5}$/) || [""])[0];
            const cleanedAddr = cleanAddress(order.address);

            if (carrierKey === "jt") {
                // J&T format
                const parsed = parseThaiAddress(order.address);
                // ลบ ตำบล/อำเภอ/จังหวัด/รหัสไปรษณีย์ ออกจากที่อยู่ (เพราะมีในคอลัมน์แยกแล้ว)
                let strippedAddr = order.address
                    .replace(/[\t\r\n]+/g, " ")
                    .replace(/(?:ตำบล|ต\.|แขวง)\s*[\u0E00-\u0E7F]+/g, "")
                    .replace(/(?:อำเภอ|อ\.|เขต)\s*[\u0E00-\u0E7F]+/g, "")
                    .replace(/(?:จังหวัด|จ\.)\s*[\u0E00-\u0E7F]+/g, "")
                    .replace(/(กรุงเทพ(?:มหานคร)?|กทม\.?)/g, "")
                    .replace(/\d{5}/g, "")
                    .replace(/เขต(?![\u0E00-\u0E7F])/g, "")
                    .replace(/\s{2,}/g, " ")
                    .replace(/\s*,\s*/g, " ")
                    .trim();
                const addrWithCode = `${strippedAddr} (${orderInfoStr})`;
                return {
                    [HEADERS[0]]: order.customerName,
                    [HEADERS[1]]: order.phone,
                    [HEADERS[2]]: parsed.province,
                    [HEADERS[3]]: parsed.district,
                    [HEADERS[4]]: parsed.subdistrict,
                    [HEADERS[5]]: parsed.postal || postalCode,
                    [HEADERS[6]]: addrWithCode,
                    [HEADERS[7]]: "เครื่องแต่งกาย",
                    [HEADERS[8]]: "ซองพัสดุ",
                    [HEADERS[9]]: exportWeight,
                    [HEADERS[10]]: pkg.length,
                    [HEADERS[11]]: pkg.width,
                    [HEADERS[12]]: exportHeight,
                    [HEADERS[13]]: "",
                    [HEADERS[14]]: "ไม่"
                };
            }

            // Flash format
            return {
                [HEADERS[0]]: orderInfoStr,
                [HEADERS[1]]: order.customerName,
                [HEADERS[2]]: cleanedAddr,
                [HEADERS[3]]: postalCode,
                [HEADERS[4]]: order.phone,
                [HEADERS[5]]: "",
                [HEADERS[6]]: pkg.itemType,
                [HEADERS[7]]: exportWeight,
                [HEADERS[8]]: pkg.length,
                [HEADERS[9]]: pkg.width,
                [HEADERS[10]]: exportHeight,
                [HEADERS[11]]: "N",
                [HEADERS[12]]: order.total,
                [HEADERS[13]]: "N",
                [HEADERS[14]]: pkg.productType,
                [HEADERS[15]]: remarkFull,
                [HEADERS[16]]: "",
                [HEADERS[17]]: ""
            };
        });
    };

    // ── สลับ carrier → rebuild rows + select all ──────────────────
    useEffect(() => {
        if (rawOrders) {
            const rows = buildRowsForCarrier(rawOrders, carrier);
            setData(rows);
            setSelectedRows(new Set(rows.map((_, i) => i)));
        }
    }, [carrier]);

    // ── File upload ───────────────────────────────────────────────
    const handleFileUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        setFileName(file.name);
        setStatus("processing");
        const reader = new FileReader();
        reader.onload = (evt) => {
            try {
                const wb = XLSX.read(evt.target.result, { type: 'binary' });
                const ws = wb.Sheets[wb.SheetNames[0]];
                const rawData = XLSX.utils.sheet_to_json(ws);
                const groupedOrders = {};

                rawData.forEach(row => {
                    const orderNo = row["No."] || row["เลขที่"] || row["เลขที่ออเดอร์"] || "N/A";
                    if (!groupedOrders[orderNo]) {
                        groupedOrders[orderNo] = {
                            no: orderNo,
                            customerName: row["Customer Name"] || row["ชื่อลูกค้า"] || row["ชื่อผู้รับ"] || "",
                            phone: String(row["Customer Phone"] || row["เบอร์โทรศัพท์"] || "").replace(/'/g, ""),
                            address: row["Customer Address"] || row["ที่อยู่"] || "",
                            total: parseFloat(row["Total"] || row["ยอดรวม"] || 0),
                            items: []
                        };
                    }
                    groupedOrders[orderNo].items.push({
                        name: row["Item Name"] || row["ชื่อสินค้า"] || "",
                        variant: row["Variant Name"] || row["ตัวเลือกสินค้า"] || "",
                        qty: parseInt(row["Item Qty"] || row["จำนวน"] || 1)
                    });
                });

                const orders = Object.values(groupedOrders);
                setRawOrders(orders);
                const rows = buildRowsForCarrier(orders, carrier);
                setData(rows);
                setSelectedRows(new Set(rows.map((_, i) => i)));
                setStatus("success");
            } catch (err) { setErrorMsg(err.message); setStatus("error"); }
        };
        reader.readAsBinaryString(file);
    };

    // ── Validation per row (ตรวจปัญหาที่อาจทำให้นำเข้าไม่สำเร็จ) ──
    const validateRow = (row, carrierKey) => {
        const issues = [];
        const HEADERS = carrierKey === "jt" ? JT_HEADERS : FLASH_HEADERS;

        // ทุกแบบ: เช็ค phone, postal
        const phone = String(row[HEADERS[carrierKey === "jt" ? 1 : 4]] || "").replace(/\D/g,"");
        if (phone.length < 9) issues.push("เบอร์โทรไม่ครบ");

        if (carrierKey === "jt") {
            if (!row[HEADERS[2]]) issues.push("ไม่มีจังหวัด");
            if (!row[HEADERS[3]]) issues.push("ไม่มีเขต/อำเภอ");
            if (!row[HEADERS[4]]) issues.push("ไม่มีตำบล/แขวง");
            const postal = String(row[HEADERS[5]] || "");
            if (!/^\d{5}$/.test(postal)) issues.push("รหัสไปรษณีย์ไม่ถูกต้อง");
        } else {
            const postal = String(row[HEADERS[3]] || "");
            if (!/^\d{5}$/.test(postal)) issues.push("รหัสไปรษณีย์ไม่ถูกต้อง");
            if (!row[HEADERS[2]]) issues.push("ไม่มีที่อยู่");
        }

        return issues;
    };

    const rowIssues = data ? data.map(r => validateRow(r, carrier)) : [];
    const totalIssues = rowIssues.filter(i => i.length > 0).length;
    const totalWeight = data && carrier === "flash"
        ? data.filter((_, i) => selectedRows.has(i)).reduce((s, r) => s + parseFloat(r[FLASH_HEADERS[7]] || 0), 0)
        : data && carrier === "jt"
        ? data.filter((_, i) => selectedRows.has(i)).reduce((s, r) => s + parseFloat(r[JT_HEADERS[9]] || 0), 0)
        : 0;
    const overLimit = data && data.length > 1000;

    // ── Download (filter by selectedRows) ────────────────────────
    const downloadExcel = () => {
        const XLSX = window.XLSX;
        const exportData = data.filter((_, i) => selectedRows.has(i));
        if (exportData.length === 0) { alert("กรุณาเลือกอย่างน้อย 1 รายการ"); return; }
        if (carrier === "jt" && exportData.length > 1000) {
            if (!confirm(`J&T รับสูงสุด 1,000 รายการต่อครั้ง คุณเลือก ${exportData.length} รายการ\nต้องการ download ต่อหรือไม่?`)) return;
        }
        const ws = XLSX.utils.json_to_sheet(exportData, { header: headersForExport });
        const range = XLSX.utils.decode_range(ws['!ref']);
        for (let C = range.s.c; C <= range.e.c; ++C) {
            const addr = XLSX.utils.encode_col(C) + "1";
            if (!ws[addr]) continue;
            ws[addr].t = 's';
        }
        const wb = XLSX.utils.book_new();
        const sheetName = carrier === "jt" ? "导入-V20211028" : "Order Template";
        const fileName = carrier === "jt" ? `JT_Order_Template_${Date.now()}.xlsx` : `Flash_Order_Template_${Date.now()}.xlsx`;
        XLSX.utils.book_append_sheet(wb, ws, sheetName);
        XLSX.writeFile(wb, fileName, { bookSST: true, type: 'binary' });
    };

    // ── Render ────────────────────────────────────────────────────
    return (
        <div className="p-4 md:p-8 flex flex-col items-center">
            <div className="max-w-full w-full bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border border-slate-200">

                {/* Header */}
                <div className={`p-8 text-center border-b shadow-sm transition-colors ${carrier === "jt" ? "bg-red-600 border-red-700" : "bg-yellow-400 border-yellow-500"}`}>
                    <h1 className={`text-3xl font-black uppercase italic flex items-center justify-center gap-3 ${carrier === "jt" ? "text-white" : "text-slate-900"}`}>
                        <span className="text-4xl">📦</span>
                        Shipping Converter <span className={carrier === "jt" ? "text-yellow-300 drop-shadow-md" : "text-white drop-shadow-md"}>PRO</span>
                    </h1>
                    <p className={`font-bold text-sm mt-1 uppercase tracking-widest opacity-80 ${carrier === "jt" ? "text-red-100" : "text-yellow-900"}`}>
                        {carrier === "jt" ? "J&T Express • ไม่ใช่ COD • สูงสุด 1,000 รายการต่อครั้ง" : "Flash Express • Excel Native Support • ไม่ต้องดับเบิลคลิกก่อนใช้"}
                    </p>
                </div>

                {/* Carrier Tabs */}
                <div className="flex border-b border-slate-200 bg-white">
                    <button onClick={() => setCarrier("flash")}
                        className={`flex-1 py-4 px-6 font-black text-sm uppercase tracking-wider transition-all border-b-4 ${carrier === "flash" ? "border-yellow-400 bg-yellow-50 text-slate-900" : "border-transparent text-slate-400 hover:text-slate-600 hover:bg-slate-50"}`}>
                        ⚡ Flash Express
                    </button>
                    <button onClick={() => setCarrier("jt")}
                        className={`flex-1 py-4 px-6 font-black text-sm uppercase tracking-wider transition-all border-b-4 ${carrier === "jt" ? "border-red-500 bg-red-50 text-slate-900" : "border-transparent text-slate-400 hover:text-slate-600 hover:bg-slate-50"}`}>
                        🚚 J&T Express
                    </button>
                </div>

                {/* Preset Bar */}
                <div className="bg-slate-100 px-8 py-4 flex flex-wrap items-center gap-4 border-b border-slate-200">
                    <span className="text-[10px] font-black uppercase text-slate-400 tracking-widest shrink-0">Preset:</span>
                    {productPresets.map((p) => {
                        const isActive = manualOverride && activePresetId === p.id;
                        return (
                            <div key={p.id} className={`flex items-center gap-2 bg-white border-2 rounded-2xl px-3 py-1.5 shadow-sm transition-all ${isActive ? "border-yellow-500" : "border-yellow-400"}`}>
                                <button onClick={() => applyPreset(p)} className={`text-sm font-black shrink-0 transition-all ${isActive ? "text-yellow-500" : "text-slate-700 hover:text-yellow-500"}`}>
                                    {p.label}
                                </button>
                                <span className="text-slate-200 text-xs">|</span>
                                <div className="flex items-center gap-1 text-[11px] text-slate-500 font-bold">
                                    <input type="number" step="0.01" value={p.weight}
                                        onChange={e => updatePreset(p.id, 'weight', parseFloat(e.target.value))}
                                        className="w-10 text-center outline-none bg-transparent border-b border-slate-300 focus:border-yellow-400"
                                        title="น้ำหนัก (กก.)" />
                                    <span className="text-slate-300">kg</span>
                                    <span className="text-slate-300 mx-0.5">|</span>
                                    <input type="number" value={p.width}
                                        onChange={e => updatePreset(p.id, 'width', parseInt(e.target.value))}
                                        className="w-8 text-center outline-none bg-transparent border-b border-slate-300 focus:border-yellow-400"
                                        title="กว้าง (ซม.)" />
                                    <span className="text-slate-300">×</span>
                                    <input type="number" value={p.length}
                                        onChange={e => updatePreset(p.id, 'length', parseInt(e.target.value))}
                                        className="w-8 text-center outline-none bg-transparent border-b border-slate-300 focus:border-yellow-400"
                                        title="ยาว (ซม.)" />
                                    <span className="text-slate-300">×</span>
                                    <input type="number" value={p.height}
                                        onChange={e => updatePreset(p.id, 'height', parseInt(e.target.value))}
                                        className="w-8 text-center outline-none bg-transparent border-b border-slate-300 focus:border-yellow-400"
                                        title="สูง/ชิ้น (ซม.)" />
                                    <span className="text-slate-300">cm</span>
                                </div>
                            </div>
                        );
                    })}
                    {manualOverride && (
                        <button onClick={clearOverride} className="px-4 py-1.5 rounded-full text-sm font-bold border-2 border-slate-400 bg-white text-slate-500 hover:bg-slate-200 transition-all shadow-sm flex items-center gap-1">
                            <span>✕</span> Auto
                        </button>
                    )}
                </div>

                {/* Settings */}
                <div className="bg-slate-50 p-8 grid grid-cols-2 md:grid-cols-4 gap-6 border-b border-slate-200 shadow-inner">
                    <div className="bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
                        <label className="block text-[10px] text-slate-400 font-black uppercase mb-1">น้ำหนัก / ชิ้น (กก.)</label>
                        <input type="number" step="0.01" value={settings.weightPerPiece} onChange={e => setSettings({...settings, weightPerPiece: parseFloat(e.target.value)})} className="w-full text-lg font-bold outline-none text-slate-700"/>
                    </div>
                    <div className="bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
                        <label className="block text-[10px] text-slate-400 font-black uppercase mb-1">ส่วนสูง / ชิ้น (ซม.)</label>
                        <input type="number" value={settings.heightPerPiece} onChange={e => setSettings({...settings, heightPerPiece: parseInt(e.target.value)})} className="w-full text-lg font-bold outline-none text-slate-700"/>
                    </div>
                    <div className="bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
                        <label className="block text-[10px] text-slate-400 font-black uppercase mb-1">ขนาด (กว้าง x ยาว)</label>
                        <div className="flex items-center gap-2 font-bold text-slate-700">
                            <input type="number" value={settings.width} onChange={e => setSettings({...settings, width: parseInt(e.target.value)})} className="w-full outline-none"/>
                            <span className="text-slate-300">x</span>
                            <input type="number" value={settings.length} onChange={e => setSettings({...settings, length: parseInt(e.target.value)})} className="w-full outline-none"/>
                        </div>
                    </div>
                    <div className="bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
                        <label className="block text-[10px] text-slate-400 font-black mb-2 uppercase">รูปแบบขนส่ง</label>
                        <select value={settings.productType} onChange={e => setSettings({...settings, productType: e.target.value})} className="w-full font-bold outline-none text-slate-700 bg-transparent">
                            <option value="Standard">Standard</option>
                            <option value="Bulky">Bulky</option>
                            <option value="Fruit Express">Fruit Express</option>
                        </select>
                    </div>
                </div>

                <div className="p-8">
                    {status === "idle" && (
                        <div
                            onClick={() => fileInputRef.current.click()}
                            onDragOver={(e) => { e.preventDefault(); setIsDragging(true); }}
                            onDragLeave={() => setIsDragging(false)}
                            onDrop={(e) => {
                                e.preventDefault();
                                setIsDragging(false);
                                const file = e.dataTransfer.files[0];
                                if (file) handleFileUpload({ target: { files: [file] } });
                            }}
                            className={`border-4 border-dashed rounded-[3rem] p-24 text-center transition-all cursor-pointer shadow-inner ${isDragOver ? (carrier === "jt" ? "border-red-500 bg-red-50/80 scale-[1.01]" : "border-yellow-400 bg-yellow-50/80 scale-[1.01]") : carrier === "jt" ? "border-slate-200 hover:border-red-500 hover:bg-red-50/50" : "border-slate-200 hover:border-yellow-400 hover:bg-yellow-50/50"}`}>
                            <input type="file" ref={fileInputRef} onChange={handleFileUpload} className="hidden" accept=".xlsx,.xls,.csv"/>
                            <div className="text-6xl mb-3">{isDragOver ? "📥" : "📦"}</div>
                            <h3 className="text-slate-800 font-black text-2xl tracking-tighter uppercase">{isDragOver ? "ปล่อยไฟล์ได้เลย!" : "อัปโหลดไฟล์ที่นี่"}</h3>
                            <p className="text-slate-400 text-sm font-medium mt-2">ลากไฟล์มาวาง หรือคลิกเพื่อเลือกไฟล์ • รองรับ .xlsx .xls .csv</p>
                        </div>
                    )}

                    {status === "processing" && (
                        <div className="border-4 border-dashed border-slate-200 rounded-[3rem] p-24 text-center shadow-inner">
                            <div className="text-6xl mb-3 animate-pulse">⚙️</div>
                            <h3 className="text-slate-800 font-black text-2xl tracking-tighter uppercase">กำลังประมวลผล...</h3>
                            <p className="text-slate-400 text-sm font-medium mt-2">{fileName}</p>
                            <div className="mt-6 w-48 h-1 bg-slate-200 rounded-full mx-auto overflow-hidden">
                                <div className={`h-full rounded-full animate-pulse ${carrier === "jt" ? "bg-red-500" : "bg-yellow-400"}`} style={{ width: "60%" }}></div>
                            </div>
                        </div>
                    )}

                    {status === "error" && (
                        <div className="text-center p-8">
                            <div className="text-6xl mb-3">❌</div>
                            <p className="text-red-500 font-bold">เกิดข้อผิดพลาด: {errorMsg}</p>
                            <button onClick={() => setStatus("idle")} className="mt-4 px-6 py-2 bg-red-100 rounded-xl font-bold hover:bg-red-200 transition-all">ลองใหม่</button>
                        </div>
                    )}

                    {status === "success" && data && (
                        <div className="space-y-6">
                            {/* Action bar */}
                            <div className="flex flex-col lg:flex-row items-center gap-8 bg-slate-900 rounded-[2.5rem] p-10 shadow-2xl relative overflow-hidden sticky top-4 z-50">
                                <div className={`absolute top-0 right-0 w-64 h-64 rounded-full blur-3xl -mr-20 -mt-20 ${carrier === "jt" ? "bg-red-500/15" : "bg-yellow-400/10"}`}></div>
                                <div className="text-center lg:text-left flex-1 z-10 text-white">
                                    <h3 className="font-black text-3xl tracking-tight mb-1 uppercase italic">Ready to Export!</h3>
                                    <p className="text-slate-400 font-bold text-xs uppercase tracking-widest">
                                        {carrier === "jt"
                                            ? "เทมเพลต J&T Express พร้อมแล้ว — ตรวจสอบที่อยู่ก่อนดาวน์โหลด"
                                            : "เทมเพลต Flash Express พร้อมแล้ว — Excel Native Format"}
                                    </p>
                                </div>
                                <div className="flex flex-col sm:flex-row gap-4 w-full lg:w-auto z-10">
                                    <button onClick={downloadExcel} className={`px-12 py-5 rounded-[1.5rem] font-black flex items-center justify-center gap-3 transition-all shadow-xl active:scale-95 text-lg uppercase ${carrier === "jt" ? "bg-red-500 text-white hover:bg-red-400" : "bg-yellow-400 text-slate-900 hover:bg-yellow-300"}`}>
                                        Download Excel
                                        {selectedRows.size < data.length && (
                                            <span className={`text-xs font-black px-2 py-0.5 rounded-full ${carrier === "jt" ? "bg-white text-red-500" : "bg-slate-900 text-yellow-400"}`}>{selectedRows.size}/{data.length}</span>
                                        )}
                                    </button>
                                    <button onClick={() => { setStatus("idle"); setData(null); setRawOrders(null); setSelectedRows(new Set()); try { localStorage.removeItem('flashConverter_draft'); } catch(e) {} }} className="bg-white/5 border-2 border-white/10 text-white px-8 py-5 rounded-[1.5rem] font-black hover:bg-white/10 transition-all">
                                        รีเซ็ต
                                    </button>
                                </div>
                            </div>

                            {/* Summary Stats */}
                            <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                <div className="bg-white border border-slate-200 rounded-2xl p-4 shadow-sm">
                                    <div className="text-[10px] font-black text-slate-400 uppercase tracking-widest">รายการทั้งหมด</div>
                                    <div className="text-2xl font-black text-slate-800 mt-1">{data.length}</div>
                                </div>
                                <div className="bg-white border border-slate-200 rounded-2xl p-4 shadow-sm">
                                    <div className="text-[10px] font-black text-slate-400 uppercase tracking-widest">เลือกไว้</div>
                                    <div className={`text-2xl font-black mt-1 ${carrier === "jt" ? "text-red-500" : "text-yellow-500"}`}>{selectedRows.size}</div>
                                </div>
                                <div className="bg-white border border-slate-200 rounded-2xl p-4 shadow-sm">
                                    <div className="text-[10px] font-black text-slate-400 uppercase tracking-widest">น้ำหนักรวม</div>
                                    <div className="text-2xl font-black text-slate-800 mt-1">{totalWeight.toFixed(2)} <span className="text-sm">kg</span></div>
                                </div>
                                <div className={`border rounded-2xl p-4 shadow-sm ${totalIssues > 0 ? "bg-amber-50 border-amber-300" : "bg-emerald-50 border-emerald-200"}`}>
                                    <div className="text-[10px] font-black text-slate-500 uppercase tracking-widest">{totalIssues > 0 ? "ต้องตรวจสอบ" : "พร้อม Export"}</div>
                                    <div className={`text-2xl font-black mt-1 ${totalIssues > 0 ? "text-amber-600" : "text-emerald-600"}`}>
                                        {totalIssues > 0 ? `⚠ ${totalIssues}` : "✓ OK"}
                                    </div>
                                </div>
                            </div>

                            {overLimit && carrier === "jt" && (
                                <div className="bg-amber-50 border-2 border-amber-300 rounded-2xl p-4 flex items-center gap-3 text-amber-800 font-bold text-sm">
                                    <span className="text-2xl">⚠️</span>
                                    <span>J&T รับสูงสุด 1,000 รายการต่อครั้ง — คุณมี <b>{data.length}</b> รายการ ควรแบ่งดาวน์โหลดเป็นหลายครั้ง</span>
                                </div>
                            )}

                            {/* Top Scroll */}
                            <div ref={topScrollRef} onScroll={() => handleScrollSync('top')} className="overflow-x-auto h-3 bg-slate-200 rounded-full mb-2 border border-slate-300">
                                <div style={{ width: totalTableWidth, height: '1px' }}></div>
                            </div>

                            {/* Table */}
                            <div className="bg-white rounded-[2.5rem] border border-slate-200 shadow-inner overflow-hidden">
                                <div ref={tableContainerRef} onScroll={() => handleScrollSync('table')} onMouseDown={handleMouseDown} className="overflow-x-auto grab-cursor">
                                    <table className="text-left border-collapse table-fixed select-none" style={{ width: totalTableWidth }}>
                                        <thead className="bg-slate-800 text-white text-[10px] font-black uppercase tracking-tighter sticky top-0 z-40">
                                            <tr>
                                                {/* Checkbox + # header */}
                                                <th className="p-3 sticky left-0 z-50 bg-slate-950 border-r-2 border-slate-600 text-center" style={{ width: colWidths[0] }}>
                                                    <div className="flex flex-col items-center gap-1">
                                                        <input type="checkbox"
                                                            checked={selectedRows.size === data.length}
                                                            onChange={e => setSelectedRows(e.target.checked ? new Set(data.map((_,i)=>i)) : new Set())}
                                                            className="w-4 h-4 accent-yellow-400 cursor-pointer" />
                                                        <span className="text-[9px] text-slate-400 uppercase tracking-widest">ทั้งหมด</span>
                                                    </div>
                                                    <div onMouseDown={(e) => onResizeStart(0, e)} className="resize-handle" />
                                                </th>
                                                {headersForExport.map((h, i) => {
                                                    const colIdx = i + 1;
                                                    let stickyStyle = {};
                                                    let borderClass = "";
                                                    let bgClass = "bg-slate-800";
                                                    if (i === 0) { stickyStyle = { position:'sticky', left:colWidths[0], zIndex:50 }; bgClass="bg-slate-900"; borderClass="border-r-2 border-slate-600"; }
                                                    else if (i === 1) { stickyStyle = { position:'sticky', left:colWidths[0]+colWidths[1], zIndex:50 }; bgClass="bg-slate-900"; borderClass="border-r-2 border-slate-400 shadow-[4px_0_8px_-4px_rgba(0,0,0,0.3)]"; }
                                                    return (
                                                        <th key={i} className={`p-4 whitespace-pre relative ${bgClass} ${borderClass}`} style={{ width: colWidths[colIdx], ...stickyStyle }}>
                                                            {h}
                                                            <div onMouseDown={(e) => onResizeStart(colIdx, e)} className="resize-handle" />
                                                        </th>
                                                    );
                                                })}
                                            </tr>
                                        </thead>
                                        <tbody className="text-xs">
                                            {data.map((row, rowIndex) => {
                                                const isEven = rowIndex % 2 === 0;
                                                const frozenBg = isEven ? "bg-slate-100" : "bg-slate-200";
                                                const isChecked = selectedRows.has(rowIndex);
                                                const issues = rowIssues[rowIndex] || [];
                                                const hasIssue = issues.length > 0;
                                                return (
                                                    <tr key={rowIndex} className={`${isChecked ? (isEven ? 'bg-white' : 'bg-slate-50') : 'bg-red-50 opacity-60'} border-b hover:bg-yellow-50 transition-colors group`}>
                                                        {/* Checkbox + row number */}
                                                        <td className={`p-2 text-center border-r-2 sticky left-0 z-10 ${hasIssue ? "border-amber-400 border-l-4 border-l-amber-400" : "border-slate-200"} ${isChecked ? frozenBg : 'bg-red-100'} group-hover:bg-yellow-100`}
                                                            title={hasIssue ? "⚠ " + issues.join(", ") : ""}>
                                                            <div className="flex flex-col items-center gap-1">
                                                                <input type="checkbox"
                                                                    checked={isChecked}
                                                                    onChange={e => {
                                                                        const next = new Set(selectedRows);
                                                                        e.target.checked ? next.add(rowIndex) : next.delete(rowIndex);
                                                                        setSelectedRows(next);
                                                                    }}
                                                                    className="w-4 h-4 accent-yellow-400 cursor-pointer" />
                                                                <span className={`text-[10px] font-black ${hasIssue ? "text-amber-600" : "text-slate-400"}`}>{hasIssue ? "⚠" : ""}{rowIndex + 1}</span>
                                                            </div>
                                                        </td>
                                                        {headersForExport.map((h, i) => {
                                                            let stickyStyle = {};
                                                            let borderClass = "border-r border-slate-100";
                                                            let currentCellBg = isEven ? "bg-white" : "bg-slate-50";
                                                            if (i === 0) { stickyStyle={position:'sticky',left:colWidths[0],zIndex:10}; borderClass="border-r-2 border-slate-200"; currentCellBg=frozenBg; }
                                                            else if (i === 1) { stickyStyle={position:'sticky',left:colWidths[0]+colWidths[1],zIndex:10}; borderClass="border-r-2 border-slate-300 shadow-[4px_0_8px_-4px_rgba(0,0,0,0.1)]"; currentCellBg=frozenBg; }
                                                            const content = String(row[h] ?? "");
                                                            const lineCount = content.split('\n').length;
                                                            const dynamicRows = i === 0 ? Math.max(1, Math.min(lineCount, 8)) : (i === 2 || i === 15 ? 2 : 1);
                                                            return (
                                                                <td key={i} className={`p-1 ${borderClass} ${currentCellBg} group-hover:bg-yellow-100`} style={stickyStyle}>
                                                                    <textarea
                                                                        value={content}
                                                                        onChange={(e) => { const nd=[...data]; nd[rowIndex][h]=e.target.value; setData(nd); }}
                                                                        rows={i === 15 ? 1 : dynamicRows}
                                                                        className={`w-full bg-transparent p-1 outline-none focus:bg-white rounded-lg resize-none font-medium text-slate-600 transition-all group-hover:text-slate-900 ${i===0||i===15?"font-bold":""} ${i===15?"whitespace-nowrap overflow-x-auto":""}`}
                                                                        style={i===15?{overflowWrap:'normal',overflowX:'auto'}:{}}
                                                                    />
                                                                </td>
                                                            );
                                                        })}
                                                    </tr>
                                                );
                                            })}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            </div>
        </div>
    );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
