        .ex-alert { border-radius:.875rem; padding:.75rem 1rem; font-size:.75rem; font-weight:700; display:flex; align-items:center; gap:.5rem; }
        .ex-trend-up { color:#16a34a; }
        .ex-trend-dn { color:#dc2626; }
        .ex-top-row { display:flex; align-items:center; justify-content:space-between; padding:.5rem 0; border-bottom:1px solid #f4f4f5; }
        .ex-top-row:last-child { border-bottom:none; }
        </style>
        <div class="p-6 max-w-[1400px] mx-auto">
          <!-- Header -->
          <div class="flex items-center justify-between mb-6 flex-wrap gap-3">
            <div>
              <h1 class="text-2xl font-black text-zinc-800">แดชบอร์ดผู้บริหาร</h1>
              <p class="text-sm text-zinc-400 mt-0.5" id="ex-subtitle">กำลังโหลด...</p>
            </div>
            <div class="flex items-center gap-2">
              <select id="ex-period-sel" class="text-xs font-bold border border-zinc-200 rounded-xl px-3 py-2 bg-white focus:outline-none focus:border-yellow-400" onchange="exLoadPeriod()">
                <option value="">— เลือกงวด —</option>
              </select>
              <button onclick="exRefresh()" class="text-xs font-black bg-zinc-900 text-yellow-400 px-4 py-2 rounded-xl hover:bg-zinc-700 transition-all flex items-center gap-2">
                <i class="fa-solid fa-rotate-right"></i> รีเฟรช
              </button>
            </div>
          </div>

          <!-- KPI Row -->
          <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
            <div class="ex-card">
              <p class="ex-section-title">พนักงานทั้งหมด</p>
              <p class="ex-kpi-val text-zinc-800" id="ex-kpi-total">—</p>
              <p class="text-xs text-zinc-400 mt-1" id="ex-kpi-total-sub"></p>
            </div>
            <div class="ex-card">
              <p class="ex-section-title">ค่าใช้จ่ายรวม (งวดนี้)</p>
              <p class="ex-kpi-val text-yellow-600" id="ex-kpi-cost">—</p>
              <p class="text-xs mt-1" id="ex-kpi-cost-trend"></p>
            </div>
            <div class="ex-card">
              <p class="ex-section-title">OT รออนุมัติ</p>
              <p class="ex-kpi-val text-orange-500" id="ex-kpi-ot-pending">—</p>
              <p class="text-xs text-zinc-400 mt-1" id="ex-kpi-ot-sub"></p>
            </div>
            <div class="ex-card">
              <p class="ex-section-title">Commission รวม (งวดนี้)</p>
              <p class="ex-kpi-val text-green-600" id="ex-kpi-comm">—</p>
              <p class="text-xs text-zinc-400 mt-1" id="ex-kpi-comm-sub"></p>
            </div>
          </div>

          <!-- Row 2 -->
          <div class="grid grid-cols-1 lg:grid-cols-3 gap-4 mb-6">

            <!-- Payroll breakdown -->
            <div class="ex-card lg:col-span-2">
              <p class="ex-section-title">โครงสร้างค่าใช้จ่าย Payroll (งวดที่เลือก)</p>
              <div id="ex-payroll-breakdown" class="space-y-3">
                <div class="text-zinc-300 text-sm text-center py-6">เลือกงวดเพื่อดูข้อมูล</div>
              </div>
            </div>

            <!-- Alerts -->
            <div class="ex-card">
              <p class="ex-section-title">แจ้งเตือน</p>
              <div id="ex-alerts" class="space-y-2">
                <div class="text-zinc-300 text-sm text-center py-6"><i class="fa-regular fa-bell-slash text-2xl mb-2 block"></i>กำลังโหลด...</div>
              </div>
            </div>
          </div>

          <!-- Row 3 -->
          <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-6">

            <!-- Top OT -->
            <div class="ex-card">
              <p class="ex-section-title">Top 5 OT สูงสุด (งวดที่เลือก)</p>
              <div id="ex-top-ot" class="space-y-1">
                <div class="text-zinc-300 text-sm text-center py-4">เลือกงวดเพื่อดูข้อมูล</div>
              </div>
            </div>

            <!-- Top Commission -->
            <div class="ex-card">
              <p class="ex-section-title">Top 5 Commission สูงสุด (งวดที่เลือก)</p>
              <div id="ex-top-comm" class="space-y-1">
                <div class="text-zinc-300 text-sm text-center py-4">เลือกงวดเพื่อดูข้อมูล</div>
              </div>
            </div>
          </div>

          <!-- Row 4 -->
          <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">

            <!-- Branch breakdown -->
            <div class="ex-card">
              <p class="ex-section-title">ค่าใช้จ่ายแยกตามสาขา (งวดที่เลือก)</p>
              <div id="ex-branch" class="space-y-2">
                <div class="text-zinc-300 text-sm text-center py-4">เลือกงวดเพื่อดูข้อมูล</div>
              </div>
            </div>

            <!-- Leave stats -->
            <div class="ex-card">
              <p class="ex-section-title">สถิติการลา (งวดที่เลือก)</p>
              <div id="ex-leave" class="space-y-3">
                <div class="text-zinc-300 text-sm text-center py-4">เลือกงวดเพื่อดูข้อมูล</div>
              </div>
            </div>
          </div>
        </div>`,

            async init(user, profile, db, APP_ID) {
                await (async () => {
                    const { collection, query, where, orderBy, getDocs, onSnapshot, limit }
                        = await import('https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js');

                    const fmt  = n => Number(n||0).toLocaleString('th-TH', {minimumFractionDigits:2, maximumFractionDigits:2});
                    const fmtI = n => Number(n||0).toLocaleString('th-TH');
                    const col  = name => collection(db,'artifacts',APP_ID,'public','data',name);

                    // ── โหลด periods ────────────────────────────────────────
                    const pSnap = await getDocs(query(col('payroll_periods'), orderBy('createdAt','desc')));
                    const periods = pSnap.docs.map(d=>({id:d.id,...d.data()}));

                    const sel = document.getElementById('ex-period-sel');
                    if (sel) {
                        periods.forEach(p => {
                            const opt = document.createElement('option');
                            opt.value = p.id;
                            opt.textContent = `งวด ${p.periodNo}/${p.year}  (${p.startDate} – ${p.endDate})`;
                            sel.appendChild(opt);
                        });
                        if (periods.length) sel.value = periods[0].id;
                    }

                    // ── โหลด employees ──────────────────────────────────────
                    const empSnap = await getDocs(col('users'));
                    const employees = empSnap.docs.map(d=>({uid:d.id,...d.data()})).filter(e=>e.name);
                    const active = employees.filter(e=>e.status!=='resigned');

                    // KPI: พนักงาน
                    const byType = {};
                    active.forEach(e=>{ const t=e.empType||'ประจำ'; byType[t]=(byType[t]||0)+1; });
                    const kpiTotal = document.getElementById('ex-kpi-total');
                    const kpiTotalSub = document.getElementById('ex-kpi-total-sub');
                    if (kpiTotal) kpiTotal.textContent = fmtI(active.length) + ' คน';
                    if (kpiTotalSub) kpiTotalSub.textContent = Object.entries(byType).map(([k,v])=>`${k} ${v}`).join(' · ');

                    // ── โหลด OT pending ──────────────────────────────────────
                    const otSnap = await getDocs(query(col('ot_requests'), where('status','==','pending')));
                    const otPending = otSnap.docs.map(d=>({id:d.id,...d.data()}));
                    const kpiOt = document.getElementById('ex-kpi-ot-pending');
                    const kpiOtSub = document.getElementById('ex-kpi-ot-sub');
                    if (kpiOt) kpiOt.textContent = otPending.length + ' รายการ';
                    if (kpiOtSub) {
                        const names = [...new Set(otPending.map(r=>r.name))].slice(0,3).join(', ');
                        kpiOtSub.textContent = names ? names + (otPending.length>3?` +${otPending.length-3} อื่นๆ`:'') : 'ไม่มีรายการค้าง';
                    }

                    // ── Alerts ───────────────────────────────────────────────
                    const alertsEl = document.getElementById('ex-alerts');
                    const alerts = [];

                    // Payroll ที่ยังไม่ finalize
                    const draftPeriods = periods.filter(p=>p.status==='draft');
                    if (draftPeriods.length) alerts.push({ color:'bg-yellow-50 text-yellow-800 border border-yellow-200', icon:'fa-triangle-exclamation text-yellow-500', text:`มี ${draftPeriods.length} งวดที่ยังไม่ finalize` });

                    // OT ค้างนาน > 3 วัน
                    const now = Date.now();
                    const oldOt = otPending.filter(r=>{ const d=new Date(r.createdAt||r.updatedAt||now); return (now-d.getTime())>3*86400000; });
                    if (oldOt.length) alerts.push({ color:'bg-orange-50 text-orange-800 border border-orange-200', icon:'fa-clock text-orange-500', text:`OT รออนุมัติ > 3 วัน: ${oldOt.length} รายการ` });

                    // Commission ต่ำกว่าขั้นต่ำ
                    const lowComm = active.filter(e=>(e.commMin||0)>0 && !e.commRate);
                    if (lowComm.length) alerts.push({ color:'bg-red-50 text-red-800 border border-red-200', icon:'fa-chart-line text-red-400', text:`${lowComm.length} คนมีขั้นต่ำ Commission แต่ยังไม่ตั้งอัตรา` });

                    if (!alerts.length) alerts.push({ color:'bg-green-50 text-green-800 border border-green-200', icon:'fa-circle-check text-green-500', text:'ทุกอย่างเรียบร้อยดี' });

                    if (alertsEl) alertsEl.innerHTML = alerts.map(a=>`
                        <div class="ex-alert ${a.color}">
                            <i class="fa-solid ${a.icon} shrink-0"></i>
                            <span>${a.text}</span>
                        </div>`).join('');

                    // ── โหลดข้อมูลตามงวด ────────────────────────────────────
                    window.exLoadPeriod = async () => {
                        const pid = document.getElementById('ex-period-sel')?.value;
                        if (!pid) return;
                        const period = periods.find(p=>p.id===pid);
                        const sub = document.getElementById('ex-subtitle');
                        if (sub && period) sub.textContent = `งวด ${period.periodNo}/${period.year}  ·  ${period.startDate} ถึง ${period.endDate}  ·  สถานะ: ${period.status||'draft'}`;

                        // โหลด payroll records
                        const recSnap = await getDocs(query(col('payroll_records'), where('periodId','==',pid)));
                        const recs = recSnap.docs.map(d=>d.data());

                        // โหลด leave requests ของงวดนี้
                        const lvSnap = await getDocs(query(col('leave_requests'), where('status','==','approved')));
                        const lvs = lvSnap.docs.map(d=>d.data()).filter(l=>
                            period && l.startDate <= period.endDate && l.endDate >= period.startDate
                        );

                        if (!recs.length) {
                            ['ex-payroll-breakdown','ex-top-ot','ex-top-comm','ex-branch','ex-leave','ex-kpi-cost','ex-kpi-comm'].forEach(id=>{
                                const el=document.getElementById(id);
                                if(el) el.innerHTML='<div class="text-zinc-300 text-sm text-center py-4">ยังไม่มีข้อมูล Payroll งวดนี้</div>';
                            });
                            return;
                        }

                        // ── KPI cost ──
                        const totalSalary  = recs.reduce((s,r)=>s+(r.baseSalary||0),0);
                        const totalOtEarn  = recs.reduce((s,r)=>s+(r.earningHourly||0),0);
                        const totalComm    = recs.reduce((s,r)=>s+(r.earningCommission||0),0);
                        const totalDaily   = recs.reduce((s,r)=>s+(r.earningDaily||0),0);
                        const totalOther   = recs.reduce((s,r)=>s+(r.otherEarning||0),0);
                        const totalSSO     = recs.reduce((s,r)=>s+(r.deductSSO||0),0);
                        const totalCost    = totalSalary+totalOtEarn+totalComm+totalDaily+totalOther;
                        const totalNet     = recs.reduce((s,r)=>s+(r.netPay||0),0);

                        // เปรียบเทียบกับงวดก่อน
                        const prevPeriod = periods[periods.findIndex(p=>p.id===pid)+1];
                        let trendHtml = '';
                        if (prevPeriod) {
                            const prevSnap = await getDocs(query(col('payroll_records'), where('periodId','==',prevPeriod.id)));
                            const prevRecs = prevSnap.docs.map(d=>d.data());
                            const prevCost = prevRecs.reduce((s,r)=>s+(r.baseSalary||0)+(r.earningHourly||0)+(r.earningCommission||0)+(r.earningDaily||0)+(r.otherEarning||0),0);
                            if (prevCost > 0) {
                                const diff = ((totalCost-prevCost)/prevCost*100).toFixed(1);
                                const up = totalCost >= prevCost;
                                trendHtml = `<span class="${up?'ex-trend-up':'ex-trend-dn'} font-bold text-xs"><i class="fa-solid fa-arrow-${up?'up':'down'} mr-0.5"></i>${Math.abs(diff)}% จากงวดก่อน</span>`;
                            }
                        }

                        const kpiCost = document.getElementById('ex-kpi-cost');
                        const kpiCostTrend = document.getElementById('ex-kpi-cost-trend');
                        if (kpiCost) kpiCost.textContent = '฿' + fmt(totalCost);
                        if (kpiCostTrend) kpiCostTrend.innerHTML = trendHtml || `<span class="text-zinc-400">สุทธิจ่าย ฿${fmt(totalNet)}</span>`;

                        const kpiComm = document.getElementById('ex-kpi-comm');
                        const kpiCommSub = document.getElementById('ex-kpi-comm-sub');
                        if (kpiComm) kpiComm.textContent = '฿' + fmt(totalComm);
                        if (kpiCommSub) {
                            const commCount = recs.filter(r=>(r.earningCommission||0)>0).length;
                            kpiCommSub.textContent = `${commCount} คนได้รับ Commission`;
                        }

                        // ── Payroll breakdown bars ──
                        const breakdownEl = document.getElementById('ex-payroll-breakdown');
                        if (breakdownEl) {
                            const items = [
                                { label:'เงินเดือน', val:totalSalary, color:'bg-zinc-700' },
                                { label:'ค่าจ้างรายวัน', val:totalDaily, color:'bg-zinc-400' },
                                { label:'OT/ชั่วโมง', val:totalOtEarn, color:'bg-yellow-400' },
                                { label:'Commission', val:totalComm, color:'bg-green-500' },
                                { label:'รายได้อื่นๆ', val:totalOther, color:'bg-blue-400' },
                            ].filter(i=>i.val>0);
                            const maxVal = Math.max(...items.map(i=>i.val));
                            breakdownEl.innerHTML = items.map(i=>`
                                <div>
                                    <div class="flex justify-between text-xs mb-1">
                                        <span class="font-bold text-zinc-600">${i.label}</span>
                                        <span class="font-black text-zinc-800">฿${fmt(i.val)}</span>
                                    </div>
                                    <div class="ex-bar">
                                        <div class="ex-bar-fill ${i.color}" style="width:${maxVal>0?(i.val/maxVal*100).toFixed(1):0}%"></div>
                                    </div>
                                </div>`).join('') +
                                `<div class="mt-3 pt-3 border-t border-zinc-100 flex justify-between text-xs font-black">
                                    <span class="text-zinc-500">รวมรายได้ทั้งหมด</span>
                                    <span class="text-zinc-800">฿${fmt(totalCost)}</span>
                                </div>
                                <div class="flex justify-between text-xs font-black">
                                    <span class="text-zinc-500">ประกันสังคม (นายจ้าง)</span>
                                    <span class="text-red-500">฿${fmt(totalSSO)}</span>
                                </div>`;
                        }

                        // ── Top 5 OT ──
                        const topOtEl = document.getElementById('ex-top-ot');
                        if (topOtEl) {
                            const sorted = [...recs].filter(r=>(r.workHours||0)>0).sort((a,b)=>(b.workHours||0)-(a.workHours||0)).slice(0,5);
                            if (!sorted.length) {
                                topOtEl.innerHTML = '<div class="text-zinc-300 text-sm text-center py-4">ไม่มีข้อมูล OT งวดนี้</div>';
                            } else {
                                const maxH = sorted[0].workHours||1;
                                topOtEl.innerHTML = sorted.map((r,i)=>`
                                    <div class="ex-top-row gap-3">
                                        <span class="text-[10px] font-black text-zinc-400 w-4">${i+1}</span>
                                        <span class="flex-1 text-xs font-bold text-zinc-700 truncate">${r.name}${r.nickname?` (${r.nickname})`:''}</span>
                                        <div class="w-20 ex-bar hidden sm:block">
                                            <div class="ex-bar-fill bg-yellow-400" style="width:${((r.workHours||0)/maxH*100).toFixed(0)}%"></div>
                                        </div>
                                        <span class="text-xs font-black text-yellow-700 whitespace-nowrap">${(r.workHours||0).toFixed(2)} ชม.</span>
                                        <span class="text-xs text-zinc-400 whitespace-nowrap">฿${fmt(r.earningHourly||0)}</span>
                                    </div>`).join('');
                            }
                        }

                        // ── Top 5 Commission ──
                        const topCommEl = document.getElementById('ex-top-comm');
                        if (topCommEl) {
                            const sorted = [...recs].filter(r=>(r.earningCommission||0)>0).sort((a,b)=>(b.earningCommission||0)-(a.earningCommission||0)).slice(0,5);
                            if (!sorted.length) {
                                topCommEl.innerHTML = '<div class="text-zinc-300 text-sm text-center py-4">ไม่มีข้อมูล Commission งวดนี้</div>';
                            } else {
                                const maxC = sorted[0].earningCommission||1;
                                topCommEl.innerHTML = sorted.map((r,i)=>`
                                    <div class="ex-top-row gap-3">
                                        <span class="text-[10px] font-black text-zinc-400 w-4">${i+1}</span>
                                        <span class="flex-1 text-xs font-bold text-zinc-700 truncate">${r.name}${r.nickname?` (${r.nickname})`:''}</span>
                                        <div class="w-20 ex-bar hidden sm:block">
                                            <div class="ex-bar-fill bg-green-400" style="width:${((r.earningCommission||0)/maxC*100).toFixed(0)}%"></div>
                                        </div>
                                        <span class="text-xs font-black text-green-700 whitespace-nowrap">฿${fmt(r.earningCommission||0)}</span>
                                        <span class="text-xs text-zinc-400 whitespace-nowrap">${fmt(r.commissionUnits||0)} ยอดขาย</span>
                                    </div>`).join('');
                            }
                        }

                        // ── Branch breakdown ──
                        const branchEl = document.getElementById('ex-branch');
                        if (branchEl) {
                            const branchMap = {};
                            recs.forEach(r=>{
                                const b = r.branch||'ไม่ระบุ';
                                if (!branchMap[b]) branchMap[b]={cost:0,count:0,net:0};
                                branchMap[b].cost += (r.baseSalary||0)+(r.earningHourly||0)+(r.earningCommission||0)+(r.earningDaily||0)+(r.otherEarning||0);
                                branchMap[b].net  += r.netPay||0;
                                branchMap[b].count++;
                            });
                            const branches = Object.entries(branchMap).sort((a,b)=>b[1].cost-a[1].cost);
                            const maxB = branches[0]?.[1]?.cost || 1;
                            branchEl.innerHTML = branches.map(([b,v])=>`
                                <div>
                                    <div class="flex justify-between text-xs mb-1">
                                        <span class="font-bold text-zinc-600">${b} <span class="text-zinc-400 font-normal">(${v.count} คน)</span></span>
                                        <span class="font-black text-zinc-800">฿${fmt(v.cost)}</span>
                                    </div>
                                    <div class="ex-bar">
                                        <div class="ex-bar-fill bg-zinc-600" style="width:${(v.cost/maxB*100).toFixed(1)}%"></div>
                                    </div>
                                </div>`).join('');
                        }

                        // ── Leave stats ──
                        const leaveEl = document.getElementById('ex-leave');
                        if (leaveEl) {

                        if (e.key==='b') { e.preventDefault(); annCmd('bold'); }
                        if (e.key==='i') { e.preventDefault(); annCmd('italic'); }
                        if (e.key==='u') { e.preventDefault(); annCmd('underline'); }
                    }
                };
        
                window.annUpdateToolbar = () => {
                    const cmds = {
                        'tb-bold':      'bold',
                        'tb-italic':    'italic',
                        'tb-underline': 'underline',
                        'tb-strike':    'strikeThrough',
                    };
                    Object.entries(cmds).forEach(([id,cmd]) => {
                        const b = document.getElementById(id);
                        if (b) b.classList.toggle('active', document.queryCommandState(cmd));
                    });
                };
        
                // ── Image insert (URL) ──────────────────────────────
                window.annInsertImage = () => {
                    const row = document.getElementById('img-url-row');
                    if (row) {
                        row.classList.toggle('hidden');
                        if (!row.classList.contains('hidden'))
                            document.getElementById('img-url-input')?.focus();
                    }
                };
                window.annPreviewImg = () => {
                    const raw  = document.getElementById('img-url-input')?.value || '';
                    const src  = window.convertDriveLink(raw) || raw;
                    const prev = document.getElementById('img-url-preview');
                    if (!prev) return;
                    if (src) { prev.src = src; prev.classList.remove('hidden'); }
                    else prev.classList.add('hidden');
                };
                window.annConfirmImg = () => {
                    const raw = document.getElementById('img-url-input')?.value.trim();
                    if (!raw) return;
                    const src = window.convertDriveLink(raw) || raw;
                    annInsertImgTag(src);
                    annCancelImg();
                };
                window.annCancelImg = () => {
                    const row = document.getElementById('img-url-row');
                    if (row) row.classList.add('hidden');
                    const inp = document.getElementById('img-url-input'); if (inp) inp.value='';
                    const prev = document.getElementById('img-url-preview'); if (prev) { prev.src=''; prev.classList.add('hidden'); }
                    const uploadList = document.getElementById('ann-upload-list'); if (uploadList) uploadList.innerHTML = '';
                };
        
                // แทรก <img> เข้า editor ณ cursor position
                function annInsertImgTag(src, width) {
                    const editor = document.getElementById('ann-body-editor');
                    if (!editor) return;
                    editor.focus();
                    const styleAttr = width ? ` style="max-width:100%;width:${width}px"` : ' style="max-width:100%"';
                    document.execCommand('insertHTML', false,
                        `<img src="${src}" alt="รูปประกอบ"${styleAttr}><br>`);
                }

                // อัปโหลดหลายรูปผ่าน Cloudinary + แทรกทีละรูปหลัง upload เสร็จ
                window.annUploadImages = async (input) => {
                    const files = Array.from(input.files || []);
                    if (!files.length) return;
                    const listEl = document.getElementById('ann-upload-list');
                    if (!listEl) return;

                    for (const file of files) {
                        const itemId = '_upl_' + Date.now() + Math.random().toString(36).slice(2);
                        const item = document.createElement('div');
                        item.id = itemId;
                        item.className = 'flex items-center gap-3 bg-white border border-zinc-200 rounded-xl px-3 py-2';
                        item.innerHTML = `
                            <i class="fa-solid fa-image text-zinc-300 shrink-0"></i>
                            <div class="flex-1 min-w-0">
                                <p class="text-xs font-bold text-zinc-700 truncate">${file.name}</p>
                                <div class="w-full bg-zinc-100 rounded-full h-1 mt-1">
                                    <div id="${itemId}-bar" class="bg-yellow-400 h-1 rounded-full transition-all" style="width:0%"></div>
                                </div>
                            </div>
                            <span id="${itemId}-pct" class="text-[10px] font-black text-zinc-400 shrink-0">0%</span>`;
                        listEl.appendChild(item);

                        try {
                            const url = await window.uploadPhotoToStorage(file, null, pct => {
                                const bar = document.getElementById(itemId + '-bar');
                                const pctEl = document.getElementById(itemId + '-pct');
                                if (bar) bar.style.width = pct + '%';
                                if (pctEl) pctEl.textContent = pct + '%';
                            });
                            // แทรกรูปเข้า editor ทันที
                            annInsertImgTag(url);
                            // อัปเดต item → success
                            item.innerHTML = `
                                <i class="fa-solid fa-circle-check text-green-500 shrink-0"></i>
                                <p class="flex-1 text-xs font-bold text-zinc-600 truncate">${file.name}</p>
                                <span class="text-[10px] font-black text-green-500">✓ แทรกแล้ว</span>`;
                        } catch(e) {
                            item.innerHTML = `
                                <i class="fa-solid fa-circle-xmark text-red-400 shrink-0"></i>
                                <p class="flex-1 text-xs font-bold text-red-500 truncate">${file.name}</p>
                                <span class="text-[10px] text-red-400">${e.message}</span>`;
                        }
                    }
                    // reset file input
                    if (input.value !== undefined) input.value = '';
                };

                window.annInsertLink = () => {
                    const url = prompt('กรอก URL ลิงก์:');
                    if (url) { document.getElementById('ann-body-editor')?.focus(); document.execCommand('createLink',false,url); }
                };
        
                // ── Save ──────────────────────────────────────────────────────
                window.annSave = async (id) => {
                    const title = document.getElementById('ann-title')?.value.trim();
                    const body  = document.getElementById('ann-body-editor')?.innerHTML||'';
                    const tag   = document.getElementById('ann-tag')?.value||'info';
                    const pub   = document.getElementById('ann-published')?.checked ?? true;
                    if (!title) { showToast('กรุณากรอกหัวข้อประกาศ','error'); return; }
                    const payload = {
                        title, body, tag, published: pub,
                        updatedAt: new Date().toISOString(),
                        author: profile.name,
                    };
                    try {
                        if (id) {
                            await updateDoc(doc(db,'artifacts',APP_ID,'public','data','announcements',id), payload);
                            showToast('✅ บันทึกการแก้ไขแล้ว','success');
                        } else {
                            payload.createdAt = new Date().toISOString();
                            const ref = await addDoc(collection(db,'artifacts',APP_ID,'public','data','announcements'), payload);
                            activeId = ref.id;
                            showToast('✅ สร้างประกาศแล้ว','success');
                        }
                        renderList();
                    } catch(e) { showToast('❌ '+e.message,'error'); }
                };
        
                // ── Delete ────────────────────────────────────────────────────
                window.annDelete = async (id) => {
                    const a = allAnns.find(x=>x.id===id);
                    if (!confirm(`ลบประกาศ "${a?.title}" ?`)) return;
                    try {
                        await deleteDoc(doc(db,'artifacts',APP_ID,'public','data','announcements',id));
                        showToast('ลบแล้ว','info');
                        activeId=null;
                        renderList();
                        const panel=document.getElementById('ann-editor-panel');
                        if(panel) panel.innerHTML=`<div class="bg-white rounded-2xl border border-zinc-200 p-10 flex flex-col items-center justify-center h-64 text-zinc-300"><i class="fa-solid fa-pen-to-square text-5xl mb-3 opacity-20"></i><p class="font-bold text-sm">เลือกประกาศหรือสร้างใหม่</p></div>`;
                    } catch(e) { showToast('❌ '+e.message,'error'); }
                };
        
                return () => {
                    unsub();
                    ['annFilter','annSelect','annNew','annCmd','annBlock','annKeyDown','annUpdateToolbar',
                     'annInsertImage','annPreviewImg','annConfirmImg','annCancelImg','annInsertLink','annUploadImages',
                     'annSave','annDelete'].forEach(k => delete window[k]);
                };
            }
        };


    </script>
</body>
</html>
